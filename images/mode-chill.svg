<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 675">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#aee7ff"/><stop offset="1" stop-color="#e8f9ff"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe9b3"/><stop offset="1" stop-color="#ffd98a"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#ffdf6b"/><stop offset=".7" stop-color="#ffd23f"/><stop offset="1" stop-color="#ffd23f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- sky & beach -->
  <rect width="900" height="675" fill="url(#sky)"/>
  <circle cx="780" cy="105" r="90" fill="url(#sunGlow)"/>
  <circle cx="780" cy="105" r="55" fill="#ffcf33"/>
  <g fill="#ffffff" opacity=".9">
    <ellipse cx="180" cy="95" rx="62" ry="24"/><ellipse cx="235" cy="82" rx="48" ry="20"/>
    <ellipse cx="480" cy="120" rx="50" ry="18"/><ellipse cx="525" cy="110" rx="36" ry="14"/>
  </g>
  <path d="M0 450 Q 220 415 450 445 T 900 435 L 900 675 L 0 675 Z" fill="url(#sand)"/>
  <path d="M0 450 Q 220 415 450 445 T 900 435" fill="none" stroke="#7ad7f0" stroke-width="14" opacity=".55"/>

  <!-- palm tree -->
  <g>
    <path d="M115 450 C 107 355 113 295 135 250" fill="none" stroke="#a9744f" stroke-width="26" stroke-linecap="round"/>
    <g fill="#3fbf6f">
      <path d="M135 250 C 85 210 40 215 13 250 C 65 250 100 260 133 265 Z"/>
      <path d="M135 250 C 115 195 75 175 35 183 C 85 205 110 230 131 255 Z"/>
      <path d="M135 250 C 160 195 210 180 250 195 C 200 213 170 235 141 257 Z"/>
      <path d="M135 250 C 190 220 240 230 267 265 C 215 257 175 260 139 265 Z"/>
    </g>
    <circle cx="123" cy="273" r="13" fill="#8c5a3a"/><circle cx="147" cy="277" r="12" fill="#a9744f"/>
  </g>

  <!-- hammock posts -->
  <line x1="280" y1="300" x2="262" y2="600" stroke="#a9744f" stroke-width="20" stroke-linecap="round"/>
  <line x1="830" y1="300" x2="848" y2="600" stroke="#a9744f" stroke-width="20" stroke-linecap="round"/>
  <!-- hammock cloth -->
  <path d="M288 330 C 410 500 700 500 822 330 L 808 370 C 700 525 415 525 302 370 Z" fill="#ff8fb8"/>
  <path d="M288 330 C 410 500 700 500 822 330" fill="none" stroke="#e56d9b" stroke-width="8"/>
  <g stroke="#e56d9b" stroke-width="5" opacity=".8">
    <path d="M330 372 C 430 470 680 470 780 368" fill="none"/>
    <path d="M370 408 C 460 485 655 485 745 402" fill="none"/>
  </g>

  <!-- hedgehog chilling in hammock -->
  <g>
    <!-- back spikes along the body -->
    <g fill="#8a5a3b">
      <path d="M505 345 L 505 262 L 570 330 Z"/><path d="M572 335 L 598 255 L 632 332 Z"/>
      <path d="M632 350 L 678 285 L 690 355 Z"/><path d="M685 375 L 738 330 L 732 395 Z"/>
    </g>
    <g fill="#a06e47">
      <path d="M540 338 L 552 255 L 605 330 Z"/><path d="M602 342 L 640 268 L 662 342 Z"/>
      <path d="M660 362 L 712 310 L 712 375 Z"/>
    </g>
    <!-- body lying down -->
    <ellipse cx="565" cy="410" rx="160" ry="80" fill="#c58a5a"/>
    <!-- belly -->
    <ellipse cx="530" cy="425" rx="115" ry="62" fill="#f7e2c2"/>

    <!-- crossed feet up on hammock edge -->
    <g stroke="#c58a5a" stroke-width="30" stroke-linecap="round">
      <path d="M690 420 C 740 405 772 378 788 345" fill="none"/>
      <path d="M700 445 C 755 440 792 418 812 388" fill="none"/>
    </g>
    <ellipse cx="792" cy="341" rx="20" ry="15" fill="#e8c99b"/>
    <ellipse cx="816" cy="384" rx="20" ry="15" fill="#e8c99b"/>

    <!-- head: frontal, tilted back cozy -->
    <!-- head spikes -->
    <g fill="#8a5a3b">
      <path d="M330 300 L 300 225 L 372 268 Z"/><path d="M382 268 L 380 185 L 442 255 Z"/>
      <path d="M448 258 L 472 180 L 500 262 Z"/><path d="M295 340 L 245 295 L 318 302 Z"/>
    </g>
    <g fill="#a06e47">
      <path d="M355 282 L 338 202 L 405 260 Z"/><path d="M415 260 L 428 180 L 470 258 Z"/>
    </g>
    <circle cx="395" cy="365" r="95" fill="#c58a5a"/>
    <ellipse cx="395" cy="382" rx="74" ry="68" fill="#f7e2c2"/>
    <!-- ears -->
    <circle cx="322" cy="302" r="14" fill="#f7e2c2" stroke="#d9b98c" stroke-width="4"/>
    <circle cx="468" cy="302" r="14" fill="#f7e2c2" stroke="#d9b98c" stroke-width="4"/>
    <!-- cool sunglasses -->
    <g>
      <rect x="330" y="336" rx="14" width="58" height="42" fill="#2e2e3e"/>
      <rect x="402" y="336" rx="14" width="58" height="42" fill="#2e2e3e"/>
      <path d="M388 354 L 402 354" stroke="#2e2e3e" stroke-width="8"/>
      <circle cx="348" cy="350" r="8" fill="#6f6fa8"/>
      <circle cx="420" cy="350" r="8" fill="#6f6fa8"/>
    </g>
    <!-- snout & easy smile -->
    <ellipse cx="395" cy="408" rx="22" ry="15" fill="#eccfa4"/>
    <circle cx="395" cy="401" r="10" fill="#5a3d28"/>
    <path d="M372 428 Q 395 444 418 428" fill="none" stroke="#5a3d28" stroke-width="6" stroke-linecap="round"/>

    <!-- arm resting on belly holding drink -->
    <path d="M470 440 C 500 465 540 470 565 462" fill="none" stroke="#c58a5a" stroke-width="26" stroke-linecap="round"/>
    <ellipse cx="572" cy="458" rx="20" ry="15" fill="#e8c99b"/>
  </g>

  <!-- tropical drink in paw -->
  <g>
    <path d="M552 400 L 600 400 L 590 462 L 562 462 Z" fill="#ff6f61"/>
    <path d="M552 400 L 600 400 L 596 424 L 556 424 Z" fill="#ffd23f"/>
    <line x1="590" y1="398" x2="606" y2="360" stroke="#3fbf6f" stroke-width="7" stroke-linecap="round"/>
    <circle cx="608" cy="356" r="9" fill="#ff8fb8"/>
    <path d="M556 396 l 14 -18 l 6 18 Z" fill="#3fbf6f"/>
  </g>

  <!-- crab buddy -->
  <g>
    <ellipse cx="130" cy="608" rx="34" ry="22" fill="#ff6f61"/>
    <circle cx="118" cy="588" r="8" fill="#fff"/><circle cx="142" cy="588" r="8" fill="#fff"/>
    <circle cx="118" cy="588" r="4" fill="#333"/><circle cx="142" cy="588" r="4" fill="#333"/>
    <path d="M100 604 C 80 596 72 580 78 564" fill="none" stroke="#ff6f61" stroke-width="8" stroke-linecap="round"/>
    <path d="M160 604 C 180 596 188 580 182 564" fill="none" stroke="#ff6f61" stroke-width="8" stroke-linecap="round"/>
    <circle cx="76" cy="560" r="10" fill="#ff6f61"/><circle cx="184" cy="560" r="10" fill="#ff6f61"/>
    <path d="M112 620 Q 130 630 148 620" fill="none" stroke="#c94f43" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- starfish & shell -->
  <path d="M770 618 l 10 -26 l 10 26 l 27 2 l -21 18 l 7 27 l -23 -15 l -23 15 l 7 -27 l -21 -18 Z" fill="#ffb84d"/>
  <ellipse cx="680" cy="645" rx="20" ry="12" fill="#ffdfef"/>
  <path d="M660 645 A 20 12 0 0 1 700 645" fill="none" stroke="#e5a8c8" stroke-width="4"/>

  <!-- music notes -->
  <g fill="#7c5cd6" opacity=".85">
    <path d="M590 200 q 4 -28 30 -30 l 0 44 a 12 12 0 1 1 -8 -11 l 0 -22 q -14 2 -14 20 a 12 12 0 1 1 -8 -1 Z"/>
    <circle cx="662" cy="238" r="9"/><rect x="668" y="202" width="6" height="36" rx="3"/>
  </g>
</svg>
