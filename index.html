<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<title>English Fun - Grade 2</title>
<style>
  :root{
    --pink:#ff8fb8; --pink-light:#ffe3ee; --purple:#a78bfa; --purple-light:#f0e9ff;
    --yellow:#ffd166; --yellow-light:#fff5d6; --green:#4ade80; --green-dark:#16a34a;
    --red:#fb7185; --text:#4c3a63; --text-light:#8b7ba5; --white:#ffffff;
    --shadow:0 6px 20px rgba(167,139,250,.25);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%; text-size-adjust:100%;}  /* no surprise zoom on rotate */
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:linear-gradient(160deg,#ffe3ee 0%,#f0e9ff 55%,#fff5d6 100%);
    background-attachment:fixed;
    color:var(--text); min-height:100vh; min-height:100dvh;
    font-size:clamp(17px,2.2vw,20px); line-height:1.45;
    touch-action:manipulation; overscroll-behavior:none;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  #app{max-width:760px;margin:0 auto;padding:16px 16px 40px;}
  .icon{width:1.35em;height:1.35em;vertical-align:-0.3em;}
  .icon-lg{width:56px;height:56px;}
  .icon-xl{width:88px;height:88px;}
  h1{font-size:clamp(26px,5vw,38px);margin:8px 0 4px;text-align:center;}
  .subtitle{text-align:center;color:var(--text-light);margin:0 0 20px;font-size:.95em;}
  .card{background:var(--white);border-radius:24px;box-shadow:var(--shadow);padding:20px;margin-bottom:16px;}
  button{font-family:inherit;color:inherit;}
  .btn{
    display:flex;align-items:center;justify-content:center;gap:12px;width:100%;
    min-height:64px;padding:14px 20px;border:none;border-radius:20px;
    font-size:clamp(18px,2.6vw,22px);font-weight:700;cursor:pointer;
    box-shadow:var(--shadow);transition:transform .08s ease;
    -webkit-user-select:none;user-select:none;
  }
  .btn:active{transform:scale(.97);}
  .btn-pink{background:linear-gradient(135deg,#ff8fb8,#ff6fa5);color:#fff;}
  .btn-purple{background:linear-gradient(135deg,#b79bff,#9b7df7);color:#fff;}
  .btn-yellow{background:linear-gradient(135deg,#ffd97a,#ffc93c);color:#6b4e00;}
  .btn-green{background:linear-gradient(135deg,#8fe0a6,#4fc47a);color:#0d5a2e;}
  .btn-ghost{background:#fff;color:var(--text);box-shadow:0 3px 10px rgba(167,139,250,.18);}
  .btn-small{min-height:48px;font-size:16px;width:auto;padding:8px 18px;border-radius:14px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;}
  .topbar .title{font-weight:800;font-size:1.05em;display:flex;align-items:center;gap:8px;min-width:0;}
  .topbar .title span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
  .topic-card{
    background:#fff;border:none;border-radius:22px;box-shadow:var(--shadow);
    padding:18px 10px 14px;text-align:center;cursor:pointer;transition:transform .08s;
  }
  .topic-card:active{transform:scale(.96);}
  .topic-card .nameEn{font-weight:800;font-size:.95em;margin-top:8px;}
  .topic-card .nameVi{color:var(--text-light);font-size:.8em;margin-top:2px;}
  .topic-card .stat{font-size:.75em;color:var(--purple);margin-top:6px;font-weight:700;}
  .qimg{display:block;margin:10px auto;width:clamp(96px,22vw,150px);height:auto;}
  .qtext{font-size:clamp(19px,2.8vw,24px);font-weight:700;white-space:pre-line;margin:6px 0 14px;}
  .passage{
    background:var(--purple-light);border-radius:18px;padding:16px;margin-bottom:14px;
    white-space:pre-line;font-size:clamp(17px,2.4vw,21px);max-height:38vh;overflow-y:auto;
    -webkit-overflow-scrolling:touch;   /* smooth momentum scroll on iOS */
  }
  .passage b{color:var(--purple);}
  .opts{display:grid;gap:12px;grid-template-columns:1fr;}
  @media(min-width:600px){.opts.short{grid-template-columns:1fr 1fr;}}
  .opt{
    display:flex;align-items:center;gap:12px;text-align:left;
    min-height:62px;padding:12px 16px;border-radius:18px;border:3px solid var(--purple-light);
    background:#fff;font-size:clamp(18px,2.6vw,22px);font-weight:600;cursor:pointer;
    transition:transform .08s;word-break:break-word;
  }
  .opt:active{transform:scale(.98);}
  .opt .letter{
    flex:0 0 38px;height:38px;border-radius:50%;background:var(--purple-light);color:var(--purple);
    display:flex;align-items:center;justify-content:center;font-weight:800;
  }
  .opt.correct{background:#e9fbef;border-color:var(--green);}
  .opt.correct .letter{background:var(--green);color:#fff;}
  .opt.wrong{background:#fff1f2;border-color:var(--red);}
  .opt.wrong .letter{background:var(--red);color:#fff;}
  .opt.picked{border-color:var(--purple);background:var(--purple-light);}
  .opt:disabled{cursor:default;opacity:1;color:inherit;}
  .feedback{
    text-align:center;font-size:clamp(20px,3vw,26px);font-weight:800;border-radius:18px;
    padding:14px;margin-top:14px;animation:pop .3s ease;
  }
  .feedback.good{background:#e9fbef;color:var(--green-dark);}
  .feedback.bad{background:#fff1f2;color:#be123c;}
  .feedback .sub{font-size:.7em;font-weight:600;margin-top:4px;color:var(--text-light);}
  @keyframes pop{0%{transform:scale(.7);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .progressbar{height:12px;background:#fff;border-radius:8px;overflow:hidden;box-shadow:inset 0 1px 4px rgba(0,0,0,.08);flex:1;}
  .progressbar>div{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple));border-radius:8px;transition:width .3s;}
  .statrow{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .pill{
    background:#fff;border-radius:999px;padding:6px 14px;font-weight:800;font-size:.9em;
    box-shadow:0 3px 10px rgba(167,139,250,.18);display:flex;align-items:center;gap:6px;white-space:nowrap;
  }
  .pill.timer-low{background:#fff1f2;color:#be123c;}
  .home-stars{display:flex;justify-content:center;gap:18px;margin:14px 0;flex-wrap:wrap;}
  .bigmenu{display:grid;gap:16px;margin-top:18px;}
  .bigmenu .btn{min-height:84px;font-size:clamp(20px,3vw,26px);}
  table{width:100%;border-collapse:collapse;font-size:.85em;}
  th,td{padding:9px 6px;text-align:left;border-bottom:1px solid var(--purple-light);}
  th{color:var(--text-light);font-size:.8em;text-transform:uppercase;letter-spacing:.04em;}
  .score-big{font-size:clamp(44px,9vw,64px);font-weight:900;text-align:center;color:var(--purple);margin:6px 0;}
  .center{text-align:center;}
  .muted{color:var(--text-light);font-size:.85em;}
  .review-item{border-left:5px solid var(--red);background:#fff7f8;border-radius:12px;padding:10px 14px;margin-bottom:10px;font-size:.9em;}
  .review-item.ok{border-left-color:var(--green);background:#f2fcf5;}
  .review-item .rq{font-weight:700;white-space:pre-line;}
  .confetti{position:fixed;top:-60px;pointer-events:none;z-index:99;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.9;}}
  .navrow{display:flex;gap:12px;margin-top:16px;}
  .navrow .btn{flex:1;}
  .testnums{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
  .testnums button{
    width:44px;height:44px;border-radius:12px;border:2px solid var(--purple-light);
    background:#fff;font-weight:800;font-size:15px;cursor:pointer;
  }
  .testnums button.done{background:var(--purple);border-color:var(--purple);color:#fff;}
  .testnums button.cur{border-color:var(--pink);box-shadow:0 0 0 3px var(--pink-light);}
  .mark2{display:inline-block;background:var(--yellow-light);color:#8a6400;border-radius:8px;font-size:.65em;padding:2px 8px;font-weight:800;vertical-align:middle;}
  /* ===== difficulty mode cards ===== */
  .mode-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-top:18px;}
  @media(min-width:520px){.mode-grid{grid-template-columns:1fr 1fr;}}
  /* Wide screens: show all three hedgehogs on one row, a bit smaller. */
  @media(min-width:760px){
    .mode-grid{grid-template-columns:repeat(3,1fr);gap:14px;}
    .mode-grid .mode-card img.photo{height:150px;}
    .mode-grid .mode-card .mname{font-size:1.02em;}
    .mode-grid .mode-card .mdesc{font-size:.78em;}
    .mode-grid .mode-card .mbody{padding:10px 14px 12px;}
  }
  .mode-card{
    position:relative;border:4px solid transparent;border-radius:24px;overflow:hidden;
    box-shadow:var(--shadow);cursor:pointer;padding:0;background:#fff;text-align:left;
    transition:transform .08s;
  }
  .mode-card:active{transform:scale(.97);}
  .mode-card img.photo{width:100%;height:180px;object-fit:cover;display:block;}
  .mode-card .mbody{padding:12px 16px 14px;}
  .mode-card .mname{font-weight:900;font-size:1.15em;}
  .mode-card .mdesc{color:var(--text-light);font-size:.82em;margin-top:3px;}
  .mode-card.chill{border-color:#7dd3a8;}
  .mode-card.master{border-color:#b79bff;}
  .mode-card.elite{border-color:#f0b429;}
  .mode-badge{
    display:inline-block;border-radius:999px;padding:2px 10px;font-size:.72em;font-weight:800;
    vertical-align:middle;white-space:nowrap;
  }
  .mode-badge.chill{background:#e9fbef;color:var(--green-dark);}
  .mode-badge.master{background:var(--purple-light);color:#7c5cd6;}
  .mode-badge.elite{background:#fff4d6;color:#b3730a;}
  .mode-pill-img{width:26px;height:26px;border-radius:50%;object-fit:cover;vertical-align:-0.45em;margin-right:6px;}
  /* floating sound on/off button (kept outside #app so it stays on every screen) */
  .sound-toggle{
    position:fixed;top:12px;right:12px;z-index:50;
    width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;
    background:#fff;box-shadow:var(--shadow);font-size:22px;line-height:1;
    display:flex;align-items:center;justify-content:center;transition:transform .08s;
  }
  .sound-toggle:active{transform:scale(.9);}
  .sound-toggle.off{background:#f2f2f2;opacity:.75;}
  @media(min-width:760px){.sound-toggle{top:16px;right:16px;}}

  /* ===================== iPad / tablet tuning ===================== */
  /* iPad portrait & up: give the layout a touch more room and breathing space,
     and make tap targets comfortably large for little fingers. */
  @media(min-width:768px){
    #app{max-width:840px; padding:22px 22px 48px;}
    .card{padding:24px;}
    .btn{min-height:70px;}
    .opt{min-height:68px; padding:14px 18px;}
    .qtext{margin:8px 0 18px;}
    .grid{grid-template-columns:repeat(auto-fill,minmax(168px,1fr)); gap:18px;}
    .testnums button{width:48px;height:48px;font-size:16px;}   /* easier to tap */
    .sound-toggle{width:54px;height:54px;font-size:25px;}
    /* Reading passage can be taller in portrait (plenty of vertical room). */
    .passage{max-height:46vh; padding:18px 20px;}
  }
  /* Landscape tablets (short height, wide screen): keep the passage from eating
     the screen, and lay options out in two columns whenever they're short. */
  @media(min-width:768px) and (orientation:landscape){
    #app{max-width:900px;}
    .passage{max-height:34vh;}
  }
  /* Big iPad Pro portrait: allow three roomy topic columns. */
  @media(min-width:1000px){
    #app{max-width:920px;}
  }

  /* ===================== animations & polish ===================== */
  /* Softly drifting background so the whole page feels alive. */
  body{
    background-size:180% 180%;
    animation:bgDrift 26s ease-in-out infinite;
  }
  @keyframes bgDrift{
    0%{background-position:0% 30%;} 50%{background-position:100% 70%;} 100%{background-position:0% 30%;}
  }

  /* Every screen fades + rises in when it renders. */
  #app{animation:screenIn .42s cubic-bezier(.22,1,.36,1);}
  @keyframes screenIn{
    from{opacity:0; transform:translateY(14px) scale(.99);}
    to{opacity:1; transform:none;}
  }

  /* Headings gently pop. */
  h1{animation:titlePop .5s cubic-bezier(.34,1.56,.64,1);}
  @keyframes titlePop{ from{opacity:0; transform:scale(.9) translateY(-6px);} to{opacity:1; transform:none;} }

  /* Staggered entrance for grids of cards / buttons. */
  @keyframes riseIn{ from{opacity:0; transform:translateY(18px) scale(.96);} to{opacity:1; transform:none;} }
  .bigmenu .btn, .grid .topic-card, .mode-grid .mode-card, .opts .opt{
    animation:riseIn .45s both cubic-bezier(.22,1,.36,1);
  }
  .bigmenu .btn:nth-child(1){animation-delay:.04s;} .bigmenu .btn:nth-child(2){animation-delay:.12s;} .bigmenu .btn:nth-child(3){animation-delay:.20s;}
  .mode-grid .mode-card:nth-child(1){animation-delay:.05s;} .mode-grid .mode-card:nth-child(2){animation-delay:.16s;} .mode-grid .mode-card:nth-child(3){animation-delay:.27s;}
  .grid .topic-card:nth-child(1){animation-delay:.02s;} .grid .topic-card:nth-child(2){animation-delay:.06s;}
  .grid .topic-card:nth-child(3){animation-delay:.10s;} .grid .topic-card:nth-child(4){animation-delay:.14s;}
  .grid .topic-card:nth-child(5){animation-delay:.18s;} .grid .topic-card:nth-child(6){animation-delay:.22s;}
  .grid .topic-card:nth-child(7){animation-delay:.26s;} .grid .topic-card:nth-child(8){animation-delay:.30s;}
  .grid .topic-card:nth-child(9){animation-delay:.34s;} .grid .topic-card:nth-child(10){animation-delay:.38s;}
  .grid .topic-card:nth-child(11){animation-delay:.42s;} .grid .topic-card:nth-child(12){animation-delay:.46s;}
  .opts .opt:nth-child(1){animation-delay:.03s;} .opts .opt:nth-child(2){animation-delay:.09s;}
  .opts .opt:nth-child(3){animation-delay:.15s;} .opts .opt:nth-child(4){animation-delay:.21s;}

  /* Cards lift on hover (desktop) and press in on tap (touch). */
  .topic-card, .mode-card, .btn, .opt{ will-change:transform; }
  @media(hover:hover){
    .topic-card:hover{transform:translateY(-5px) scale(1.02); box-shadow:0 12px 28px rgba(167,139,250,.32);}
    .mode-card:hover{transform:translateY(-6px) scale(1.02); box-shadow:0 16px 34px rgba(167,139,250,.34);}
    .btn:hover{transform:translateY(-2px); filter:brightness(1.04);}
    .opt:hover{border-color:var(--purple); transform:translateY(-2px);}
    .topic-card, .mode-card, .btn, .opt{transition:transform .18s cubic-bezier(.22,1,.36,1), box-shadow .18s, border-color .18s, filter .18s;}
  }

  /* The hedgehog photo breathes a little so the cards feel playful. */
  .mode-card img.photo{transition:transform .4s ease;}
  @media(hover:hover){ .mode-card:hover img.photo{transform:scale(1.06);} }

  /* Big menu buttons get a slow sheen sweeping across. */
  .bigmenu .btn{position:relative; overflow:hidden;}
  .bigmenu .btn::after{
    content:""; position:absolute; top:0; left:-60%; width:40%; height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.55),transparent);
    transform:skewX(-18deg); animation:sheen 4.5s ease-in-out infinite;
  }
  @keyframes sheen{ 0%,60%{left:-60%;} 85%,100%{left:130%;} }

  /* Question image floats gently. */
  .qimg{animation:floaty 3.2s ease-in-out infinite;}
  @keyframes floaty{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-7px);} }

  /* Correct / wrong answer feedback on the option itself. */
  .opt.correct{animation:correctPulse .5s ease;}
  @keyframes correctPulse{ 0%{transform:scale(1);} 35%{transform:scale(1.05);} 100%{transform:scale(1);} }
  .opt.wrong{animation:wrongShake .4s ease;}
  @keyframes wrongShake{ 0%,100%{transform:translateX(0);} 20%{transform:translateX(-7px);} 40%{transform:translateX(6px);} 60%{transform:translateX(-4px);} 80%{transform:translateX(3px);} }

  /* Feedback banner: springy pop (upgraded from the old plain pop). */
  .feedback{animation:fbPop .45s cubic-bezier(.34,1.56,.64,1);}
  @keyframes fbPop{ 0%{transform:scale(.6) translateY(8px); opacity:0;} 60%{transform:scale(1.04);} 100%{transform:scale(1) translateY(0); opacity:1;} }

  /* Star pill gets a little sparkle wiggle when the screen loads. */
  .home-stars .pill:first-child img{animation:starSpin 3.5s ease-in-out infinite;}
  @keyframes starSpin{ 0%,80%,100%{transform:rotate(0);} 88%{transform:rotate(18deg) scale(1.15);} 94%{transform:rotate(-12deg) scale(1.1);} }

  /* Progress bar gets a moving shimmer so it looks lively as it fills. */
  .progressbar>div{
    background:linear-gradient(90deg,var(--pink),var(--purple),var(--pink));
    background-size:200% 100%; animation:barShimmer 2.2s linear infinite;
  }
  @keyframes barShimmer{ from{background-position:0% 0;} to{background-position:200% 0;} }

  /* Score number on the result screen counts in with a bounce. */
  .score-big{animation:scoreIn .6s cubic-bezier(.34,1.56,.64,1);}
  @keyframes scoreIn{ from{opacity:0; transform:scale(.5);} to{opacity:1; transform:scale(1);} }

  /* Confetti: fall + gentle sideways sway + spin (set per-piece in JS). */
  .confetti{animation:fall linear forwards, sway ease-in-out infinite alternate;}
  @keyframes sway{ from{margin-left:-16px;} to{margin-left:16px;} }

  /* ===== game layer: hedgehog track, items, gold, star of hope ===== */
  .track{position:relative;height:66px;margin:4px 0 14px;border-radius:16px;
    background:linear-gradient(180deg,#eaf6ff,#dff0e6);overflow:hidden;
    box-shadow:inset 0 1px 4px rgba(0,0,0,.06);}
  .track .rail{position:absolute;left:12px;right:12px;bottom:15px;height:4px;border-radius:4px;
    background:repeating-linear-gradient(90deg,#c9d6e5 0 10px,transparent 10px 20px);}
  /* legacy .track kept minimal; the real map is now .scene (SVG) */
  .track{display:none}

  /* ===== SVG adventure map ===== */
  .scene{position:relative;width:100%;height:150px;margin:4px 0 14px;border-radius:18px;overflow:hidden;
    box-shadow:0 4px 16px rgba(80,120,90,.18);}
  .scene svg{display:block;width:100%;height:100%}
  /* the hedgehog group is positioned along the path by JS via CSS var --t (0..1) */
  #hogG{transition:transform .6s cubic-bezier(.34,1.4,.5,1)}
  .hog-body{transform-box:fill-box;transform-origin:center;animation:hogBreathe 2.4s ease-in-out infinite}
  @keyframes hogBreathe{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.05) translateY(-1px)}}
  .hog-foot{transform-box:fill-box;transform-origin:top center;animation:hogFeet 0.9s ease-in-out infinite}
  .hog-foot.b{animation-delay:.45s}
  @keyframes hogFeet{0%,100%{transform:rotate(0)}50%{transform:rotate(8deg)}}
  #hogG.hop{animation:hogHop .6s ease}
  @keyframes hogHop{0%{transform:translateY(0)}35%{transform:translateY(-26px) scale(1.06)}70%{transform:translateY(0)}85%{transform:translateY(-6px)}100%{transform:translateY(0)}}
  .cloud{animation:drift linear infinite}
  .cloud.a{animation-duration:26s} .cloud.b{animation-duration:38s}
  @keyframes drift{from{transform:translateX(-40px)}to{transform:translateX(360px)}}
  .grass{transform-box:fill-box;transform-origin:bottom center;animation:sway 3.2s ease-in-out infinite}
  .grass.g2{animation-delay:.7s} .grass.g3{animation-delay:1.3s}
  @keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
  .item-node{transform-box:fill-box;transform-origin:center;animation:bob 1.8s ease-in-out infinite}
  .item-node .spark{animation:twinkle 1.5s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  @keyframes twinkle{0%,100%{opacity:.3;transform:scale(.7)}50%{opacity:1;transform:scale(1.1)}}
  .item-node.got{animation:itemGot .6s ease forwards}
  @keyframes itemGot{0%{transform:scale(1)}45%{transform:scale(1.8) translateY(-14px)}100%{transform:scale(0) translateY(-32px);opacity:0}}
  .flagWave{transform-box:fill-box;transform-origin:left center;animation:wave 1.1s ease-in-out infinite}
  @keyframes wave{0%,100%{transform:skewY(0)}50%{transform:skewY(-7deg)}}

  /* ===== stars / gold counters (SVG icons, always coloured) ===== */
  .coinrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .coin{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:.92em;
    border-radius:20px;padding:5px 12px;box-shadow:0 2px 8px rgba(0,0,0,.08);white-space:nowrap}
  .coin svg{width:20px;height:20px;flex-shrink:0}
  .coin.gold{background:linear-gradient(135deg,#fff2c2,#ffe08a);color:#8a5a06}
  .coin.star{background:linear-gradient(135deg,#eef1ff,#dfe4ff);color:#4b47c9}
  .coin.pulse{animation:coinPulse .5s ease}
  @keyframes coinPulse{0%{transform:scale(1)}40%{transform:scale(1.28)}100%{transform:scale(1)}}

  /* flying reward that arcs into the counter */
  .flyer{position:fixed;z-index:120;pointer-events:none;width:26px;height:26px;
    transition:transform .7s cubic-bezier(.4,0,.5,1),opacity .7s ease}

  .rewardpop{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;font-weight:800;font-size:.92em;align-items:center}

  /* Respect users who prefer less motion — but the game map, hedgehog and reward
     effects are functional feedback, so keep them gently animated even then. */

<body>
<div id="app"></div>

<script>window.APP_DATA = { topics: [], passages: [] };</script>
<script src="data/words.js"></script>
<script src="data/picture-words.js"></script>
<script src="data/jumbled.js"></script>
<script src="data/gender.js"></script>

<script src="data/animal-babies.js"></script>
<script src="data/animals.js"></script>
<script src="data/nouns-verbs.js"></script>
<script src="data/articles.js"></script>
<script src="data/comprehension.js"></script>
<script src="data/chill-bank.js"></script>
<script src="data/hard-questions.js"></script>
<script src="data/elite-questions.js"></script>

<script>
"use strict";
/* ================= data & utilities ================= */
const TOPICS = window.APP_DATA.topics;
const PASSAGES = window.APP_DATA.passages;
const CHILL = window.APP_DATA.chill || { topics:{}, passages:[] };
const HARD = window.APP_DATA.hard || { topics:{}, passages:[] };
const ELITE = window.APP_DATA.elite || { topics:{}, passages:[] };

/* ===== difficulty modes ===== */
const MODES = {
  chill:  { id:"chill",  name:"Nhím Chill Chill", img:"mode-chill.png",
            desc:"Fun thinking questions to warm up your brain." },
  master: { id:"master", name:"Nhím Cao Thủ",     img:"mode-master.png",
            desc:"Trickier puzzles for clever champions!" },
  elite:  { id:"elite",  name:"Nhím Tinh Hoa",    img:"mode-elite.png",
            desc:"The very hardest challenges — for true masterminds!" }
};
// Question banks keyed by mode id. Every mode now has its own bank; the old
// easy "base topic" questions are no longer used for gameplay (Chill = the
// promoted former-Elite content, Master and Elite are brand-new harder banks).
const BANKS = { chill: CHILL, master: HARD, elite: ELITE };
let MODE = "chill";
const modeBadge = m => `<span class="mode-badge ${m}">${esc((MODES[m]||MODES.chill).name)}</span>`;
function topicPool(t){ const b = BANKS[MODE]; return b ? (b.topics[t.id] || t.questions) : t.questions; }
function passagePool(){ const b = BANKS[MODE]; return b && b.passages.length ? b.passages : PASSAGES; }
function practiceKey(topicId){ return MODE==="chill" ? topicId : topicId+"#"+MODE; }
const $app = document.getElementById("app");
// Re-play the "screen in" entrance animation every time the screen content
// changes (innerHTML swaps don't restart a CSS animation on their own).
if(typeof MutationObserver !== "undefined" && $app){
  let _animRaf = null;
  const _replayScreenIn = ()=>{
    $app.style.animation = "none";
    // force reflow, then let the stylesheet animation take over again
    void $app.offsetWidth;
    $app.style.animation = "";
  };
  new MutationObserver(()=>{
    if(_animRaf) cancelAnimationFrame(_animRaf);
    _animRaf = requestAnimationFrame(_replayScreenIn);
  }).observe($app, { childList:true });
}
const IMG = (name, cls) => name ? `<img class="${cls||'icon'}" src="images/${name}.svg" alt="" onerror="this.style.display='none'">` : "";
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const shuffle = arr => { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
const pick = arr => arr[Math.floor(Math.random()*arr.length)];

/* ================= save progress =================
   Primary storage is a REAL SQLite database (sql.js / WASM) whose binary image
   is persisted in IndexedDB so it survives across sessions and works offline.
   localStorage is kept as a safe fallback + mirror (e.g. when opened via file://
   and the CDN that serves the WASM is unreachable, or IndexedDB is blocked).
   The in-memory `store` object and all game logic stay exactly the same;
   only the persistence layer underneath changed.                              */
const STORE_KEY = "englishFun.v1";
const DB_IDB_NAME = "englishFunDB", DB_IDB_STORE = "sqlite", DB_IDB_KEY = "db.v1";

let SQL = null, db = null, dbReady = false;

function loadStoreLS(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }catch(e){ return {}; }
}
function saveStoreLS(s){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(s)); }catch(e){} }

/* ---- tiny IndexedDB helpers (store one Uint8Array = the SQLite file) ---- */
function idbOpen(){
  return new Promise((res,rej)=>{
    if(!("indexedDB" in window)) return rej(new Error("no idb"));
    const r = indexedDB.open(DB_IDB_NAME, 1);
    r.onupgradeneeded = ()=>{ r.result.createObjectStore(DB_IDB_STORE); };
    r.onsuccess = ()=>res(r.result);
    r.onerror  = ()=>rej(r.error);
  });
}
function idbGet(){
  return idbOpen().then(idb=>new Promise((res,rej)=>{
    const tx = idb.transaction(DB_IDB_STORE,"readonly").objectStore(DB_IDB_STORE).get(DB_IDB_KEY);
    tx.onsuccess = ()=>res(tx.result || null); tx.onerror = ()=>rej(tx.error);
  }));
}
function idbPut(bytes){
  return idbOpen().then(idb=>new Promise((res,rej)=>{
    const tx = idb.transaction(DB_IDB_STORE,"readwrite").objectStore(DB_IDB_STORE).put(bytes, DB_IDB_KEY);
    tx.onsuccess = ()=>res(true); tx.onerror = ()=>rej(tx.error);
  }));
}

/* ---- schema ---- */
function dbCreateSchema(){
  db.run(`
    CREATE TABLE IF NOT EXISTS profile(id INTEGER PRIMARY KEY CHECK(id=1),
      stars INTEGER DEFAULT 0, gold INTEGER DEFAULT 0, sound_on INTEGER DEFAULT 1);
    CREATE TABLE IF NOT EXISTS bag(item TEXT PRIMARY KEY, qty INTEGER DEFAULT 0);
    CREATE TABLE IF NOT EXISTS practice(topic_id TEXT PRIMARY KEY, done INTEGER DEFAULT 0, correct INTEGER DEFAULT 0);
    CREATE TABLE IF NOT EXISTS tests(id INTEGER PRIMARY KEY AUTOINCREMENT,
      date TEXT, mode TEXT, score INTEGER, total_marks INTEGER, correct INTEGER, total INTEGER, time_used INTEGER);
    CREATE TABLE IF NOT EXISTS events(id INTEGER PRIMARY KEY AUTOINCREMENT,
      ts TEXT, kind TEXT, detail TEXT);
    CREATE TABLE IF NOT EXISTS shop(item_id TEXT PRIMARY KEY);           -- purchased items
    CREATE TABLE IF NOT EXISTS boosters(booster_id TEXT PRIMARY KEY, qty INTEGER DEFAULT 0);
    CREATE TABLE IF NOT EXISTS kv(k TEXT PRIMARY KEY, v TEXT);           -- misc (equipped skin/decor)
    INSERT OR IGNORE INTO profile(id,stars,gold,sound_on) VALUES(1,0,0,1);
  `);
}

/* ---- read the whole DB into the in-memory `store` shape used everywhere ---- */
function dbReadIntoStore(){
  const s = { practice:{}, tests:[], stars:0, gold:0, bag:{}, soundOn:true, shop:{}, equip:{skin:"classic",decor:null}, boosters:{} };
  const prof = db.exec("SELECT stars,gold,sound_on FROM profile WHERE id=1");
  if(prof.length && prof[0].values.length){
    const [stars,gold,snd] = prof[0].values[0];
    s.stars = stars||0; s.gold = gold||0; s.soundOn = !!snd;
  }
  const bag = db.exec("SELECT item,qty FROM bag");
  if(bag.length) bag[0].values.forEach(([it,q])=>{ s.bag[it]=q; });
  const sh = db.exec("SELECT item_id FROM shop");
  if(sh.length) sh[0].values.forEach(([id])=>{ s.shop[id]=true; });
  const bo = db.exec("SELECT booster_id,qty FROM boosters");
  if(bo.length) bo[0].values.forEach(([id,q])=>{ s.boosters[id]=q; });
  const kv = db.exec("SELECT k,v FROM kv");
  if(kv.length) kv[0].values.forEach(([k,v])=>{ if(k==="skin") s.equip.skin=v; if(k==="decor") s.equip.decor=(v||null); });
  const pr = db.exec("SELECT topic_id,done,correct FROM practice");
  if(pr.length) pr[0].values.forEach(([tid,d,c])=>{ s.practice[tid]={done:d,correct:c}; });
  const ts = db.exec("SELECT date,mode,score,total_marks,correct,total,time_used FROM tests ORDER BY id ASC");
  if(ts.length) ts[0].values.forEach(([date,mode,score,tm,c,t,tu])=>{
    s.tests.push({date,mode,score,totalMarks:tm,correct:c,total:t,timeUsed:tu});
  });
  return s;
}

/* ---- write the current in-memory `store` back into SQLite tables ---- */
function dbWriteFromStore(s){
  db.run("BEGIN");
  try{
    db.run("UPDATE profile SET stars=?,gold=?,sound_on=? WHERE id=1",
      [s.stars|0, s.gold|0, s.soundOn?1:0]);
    db.run("DELETE FROM bag");
    const bi = db.prepare("INSERT INTO bag(item,qty) VALUES(?,?)");
    Object.keys(s.bag||{}).forEach(k=>{ if(s.bag[k]>0) bi.run([k, s.bag[k]]); });
    bi.free();
    db.run("DELETE FROM practice");
    const pi = db.prepare("INSERT INTO practice(topic_id,done,correct) VALUES(?,?,?)");
    Object.keys(s.practice||{}).forEach(k=>{ pi.run([k, s.practice[k].done|0, s.practice[k].correct|0]); });
    pi.free();
    db.run("DELETE FROM tests");
    const ti = db.prepare("INSERT INTO tests(date,mode,score,total_marks,correct,total,time_used) VALUES(?,?,?,?,?,?,?)");
    (s.tests||[]).forEach(t=> ti.run([t.date, t.mode||null, t.score|0, t.totalMarks|0, t.correct|0, t.total|0, t.timeUsed|0]));
    ti.free();
    db.run("DELETE FROM shop");
    const si = db.prepare("INSERT INTO shop(item_id) VALUES(?)");
    Object.keys(s.shop||{}).forEach(k=>{ if(s.shop[k]) si.run([k]); });
    si.free();
    db.run("DELETE FROM boosters");
    const boi = db.prepare("INSERT INTO boosters(booster_id,qty) VALUES(?,?)");
    Object.keys(s.boosters||{}).forEach(k=>{ if(s.boosters[k]>0) boi.run([k, s.boosters[k]]); });
    boi.free();
    db.run("DELETE FROM kv");
    const kvi = db.prepare("INSERT INTO kv(k,v) VALUES(?,?)");
    kvi.run(["skin", (s.equip&&s.equip.skin)||"classic"]);
    kvi.run(["decor", (s.equip&&s.equip.decor)||""]);
    kvi.free();
    db.run("COMMIT");
  }catch(e){ db.run("ROLLBACK"); throw e; }
}

/* ---- public API kept identical to before ---- */
function loadStore(){ return loadStoreLS(); }   // synchronous seed (upgraded by initDB later)
function saveStore(s){
  saveStoreLS(s);                               // always mirror to localStorage
  if(dbReady && db){
    try{ dbWriteFromStore(s); persistDB(); }catch(e){ /* keep going on localStorage */ }
  }
}
let _persistT = null;
function persistDB(){                            // debounce writes to IndexedDB
  if(!db) return;
  clearTimeout(_persistT);
  _persistT = setTimeout(()=>{ try{ idbPut(db.export()); }catch(e){} }, 250);
}

/* ---- boot: load sql.js, restore or migrate, then hand back a ready store ---- */
async function initDB(){
  try{
    const initSqlJs = window.initSqlJs;
    if(typeof initSqlJs !== "function") throw new Error("sql.js not loaded");
    SQL = await initSqlJs({ locateFile: f => "https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/"+f });
    const saved = await idbGet().catch(()=>null);
    if(saved){ db = new SQL.Database(new Uint8Array(saved)); dbCreateSchema(); }
    else{
      db = new SQL.Database(); dbCreateSchema();
      dbWriteFromStore(store);                   // migrate whatever localStorage had
      await idbPut(db.export());
    }
    dbReady = true;
    store = dbReadIntoStore();                    // DB is now the source of truth
  }catch(e){
    dbReady = false;                              // fall back silently to localStorage
  }
}

let store = loadStore();
store.practice = store.practice || {};   // {topicId:{done,correct}}
store.tests = store.tests || [];         // [{date,score,totalMarks,correct,total,timeUsed}]
store.stars = store.stars || 0;
store.gold  = store.gold  || 0;          // bonus gold — spent in the shop
store.bag   = store.bag   || {};         // collected items: {emoji: count}
store.shop  = store.shop  || {};         // purchased shop items: {itemId:true}
store.equip = store.equip || { skin:"classic", decor:null };  // equipped skin + map decoration
store.boosters = store.boosters || {};   // owned consumable boosters: {boosterId:count}
if(store.soundOn === undefined) store.soundOn = true;   // sound ON by default (has mute button)

/* ---- reward economy (shared by practice & test) ---- */
// Collectible items that can randomly drop on a correct answer.
const ITEMS = [
  {e:"🍎",n:"Apple"}, {e:"🌰",n:"Acorn"}, {e:"🍄",n:"Mushroom"},
  {e:"🍓",n:"Strawberry"}, {e:"🎀",n:"Ribbon"}, {e:"🌸",n:"Blossom"},
  {e:"🍯",n:"Honey"}, {e:"🧩",n:"Puzzle"}, {e:"💎",n:"Gem"}
];
// Streak multiplier: 1x, then x2 from a 3-streak, x3 from a 5-streak.
function streakMult(streak){ return streak>=5 ? 3 : streak>=3 ? 2 : 1; }
function addStars(n){ store.stars += n; }
function addGold(n){ store.gold += n; }
function collectItem(){   // returns the item dropped, or null
  const it = pick(ITEMS);
  store.bag[it.e] = (store.bag[it.e]||0) + 1;
  return it;
}
// Central place to award a correct answer. Returns a summary for the UI.
// hope = the "Star of Hope" was active (double or nothing).
function awardCorrect(streak, hope){
  const mult = streakMult(streak) * (hope ? 2 : 1);
  const starsWon = 1 * mult;                       // base 1 star, boosted
  let goldWon = 0;
  if(streak>=3) goldWon += 1;                      // combo bonus gold
  if(streak>=5) goldWon += 1;
  if(hope) goldWon += 2;                           // brave bet bonus
  // ~30% chance to also drop a collectible item (never on a failed hope).
  const item = Math.random() < 0.30 ? collectItem() : null;
  addStars(starsWon); addGold(goldWon);
  saveStore(store);
  return { mult, starsWon, goldWon, item };
}

function bumpPractice(topicId, correct){
  const p = store.practice[topicId] = store.practice[topicId] || {done:0,correct:0};
  p.done++; if(correct){ p.correct++; }
  saveStore(store);
}

/* ================= game visuals (hand-drawn SVG, no external art) ================= */
// SVG icons that always keep their colour (emoji 🪙 renders grey on some systems).
function starSVG(){
  return `<svg viewBox="0 0 24 24" aria-hidden="true"><defs>
    <linearGradient id="stG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffe27a"/><stop offset="1" stop-color="#ffb300"/></linearGradient></defs>
    <path d="M12 2l2.9 6.1 6.6.8-4.9 4.5 1.3 6.6L12 17.8 6.1 20.6l1.3-6.6L2.5 8.9l6.6-.8z"
      fill="url(#stG)" stroke="#e69100" stroke-width="1" stroke-linejoin="round"/></svg>`;
}
function goldSVG(){
  return `<svg viewBox="0 0 24 24" aria-hidden="true"><defs>
    <linearGradient id="gdG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffe58a"/><stop offset="1" stop-color="#f0a500"/></linearGradient></defs>
    <circle cx="12" cy="12" r="9.5" fill="url(#gdG)" stroke="#c47d00" stroke-width="1.5"/>
    <circle cx="12" cy="12" r="6.4" fill="none" stroke="#fff3c4" stroke-width="1.4" opacity=".8"/>
    <text x="12" y="16.3" text-anchor="middle" font-size="9" font-weight="800" fill="#a86800">★</text></svg>`;
}
// Hand-drawn SVG for each collectible, drawn around origin (0,0), ~radius 11.
// A shared sparkle sits on top so items twinkle on the map.
const ITEM_SVG = {
  "🍎":`<path d="M0 -3 q-9-6-9 3 q0 9 9 11 q9-2 9-11 q0-9-9-3z" fill="#e5484d"/><path d="M0 -4 q1-5 5-6" stroke="#7a4a22" stroke-width="2" fill="none" stroke-linecap="round"/><ellipse cx="4" cy="-6" rx="4" ry="2" fill="#63b34a"/>`,
  "🌰":`<path d="M-8 2 q0-10 8-10 q8 0 8 10 q0 6-8 7 q-8-1-8-7z" fill="#a0672f"/><path d="M-8 2 q8 5 16 0 q0-4-8-4 q-8 0-8 4z" fill="#7a4a22"/>`,
  "🍄":`<rect x="-3" y="0" width="6" height="9" rx="2" fill="#f3e6d0"/><path d="M-10 1 q0-11 10-11 q10 0 10 11z" fill="#e0413f"/><circle cx="-4" cy="-4" r="1.6" fill="#fff"/><circle cx="4" cy="-3" r="1.4" fill="#fff"/>`,
  "🍓":`<path d="M0 -5 q-8-2-8 4 q0 8 8 10 q8-2 8-10 q0-6-8-4z" fill="#e5395a"/><path d="M-6 -5 q6-4 12 0" fill="#4fae4a"/><circle cx="-2" cy="2" r=".9" fill="#ffe0a0"/><circle cx="3" cy="4" r=".9" fill="#ffe0a0"/>`,
  "🎀":`<path d="M0 0 L-10 -6 L-10 6 Z" fill="#ff7eb3"/><path d="M0 0 L10 -6 L10 6 Z" fill="#ff7eb3"/><circle cx="0" cy="0" r="3" fill="#e85f97"/>`,
  "🌸":`<g fill="#ff9ecb">${[0,72,144,216,288].map(a=>`<ellipse cx="0" cy="-8" rx="4" ry="6" transform="rotate(${a})"/>`).join("")}</g><circle r="3" fill="#ffe27a"/>`,
  "🍯":`<path d="M-7 -6 h14 l-2 14 q-5 3-10 0z" fill="#f2b100"/><rect x="-8" y="-8" width="16" height="3" rx="1.5" fill="#c98700"/><path d="M0 -5 v10" stroke="#c98700" stroke-width="1" opacity=".4"/>`,
  "🧩":`<path d="M-8-8 h6 a2 2 0 0 1 4 0 h6 v6 a2 2 0 0 1 0 4 v6 h-16 z" fill="#5b8def"/>`,
  "💎":`<path d="M0 -9 L9 -2 L0 10 L-9 -2 Z" fill="#38d0d8"/><path d="M-9 -2 L9 -2 M0 -9 L0 10 M-4.5 -2 L0 -9 L4.5 -2" stroke="#fff" stroke-width="1" opacity=".7" fill="none"/>`
};
function itemDotSVG(emoji){
  return `<g class="item-node">${ITEM_SVG[emoji]||`<circle r="8" fill="#ffb300"/>`}

function buyItem(id){
  const it = shopItem(id); if(!it) return {ok:false,reason:"missing"};
  if(it.type!=="booster" && owns(id)) return {ok:false,reason:"owned"};
  if(store.gold < it.price) return {ok:false,reason:"gold"};
  store.gold -= it.price;
  if(it.type==="booster"){ store.boosters[it.ref] = (store.boosters[it.ref]||0)+1; }

  saveStore(store);
  return {ok:true};

  const it = shopItem(id); if(!it || !owns(id)) return false;
  if(it.type==="skin"){ store.equip.skin = it.ref; saveStore(store); return true; }
  if(it.type==="decor"){ store.equip.decor = (store.equip.decor===it.ref)?null:it.ref; saveStore(store); return true; }

}

const MAP_W = 640, MAP_H = 150;
// Sample point along the trail path for a fraction t (0..1). The trail is a gentle S.
function trailXY(t){
  const x = 40 + t * (MAP_W - 90);
  const y = 108 - Math.sin(t * Math.PI * 1.6) * 26;   // rolling hills
  return { x, y };
}
function trailPathD(){
  let d = "";
  for(let i=0;i<=40;i++){ const p = trailXY(i/40); d += (i? "L":"M") + p.x.toFixed(1) + " " + p.y.toFixed(1) + " "; }
  return d;
}

// Move the hedgehog to its new spot on the trail, hop, and pop any item it reaches.
function hopRunner(steps, total){
  const wrap = document.getElementById("hogWrap");
  const g = document.getElementById("hogG");

  const p = trailXY(Math.min(1, steps/n));

  if(g){ g.classList.remove("hop"); void g.getBBox && g.getBBox(); g.classList.add("hop"); setTimeout(()=>g.classList.remove("hop"),650); }

// Fly a small icon from a source element into the stars/gold counter (arc + fade).
function flyToCounter(srcEl, kind){
  try{
    const src = srcEl.getBoundingClientRect();
    const target = document.getElementById(kind==="star"?"starCoin":"goldCoin");
    if(!target) return;
    const tb = target.getBoundingClientRect();
    const f = document.createElement("div");
    f.className = "flyer";
    f.innerHTML = kind==="star"?starSVG():goldSVG();
    f.style.left = src.left + src.width/2 - 13 + "px";
    f.style.top  = src.top + src.height/2 - 13 + "px";
    document.body.appendChild(f);
    requestAnimationFrame(()=>{
      const dx = (tb.left+tb.width/2) - (src.left+src.width/2);
      const dy = (tb.top+tb.height/2) - (src.top+src.height/2);
      f.style.transform = `translate(${dx}px,${dy}px) scale(.7)`;
      f.style.opacity = "0.2";
    });
    setTimeout(()=>{ f.remove(); const c=target; c.classList.remove("pulse"); void c.offsetWidth; c.classList.add("pulse"); }, 720);
  }catch(e){}
}

/* ================= sound engine (Web Audio, no external files) =================
   Diverse, non-repeating sound effects + a gentle procedural background melody.
   Everything is generated live so it never sounds exactly the same twice.
   All Web Audio calls are guarded so the app still works where audio is
   unavailable (e.g. headless test runners without AudioContext).           */
let audioCtx = null, masterGain = null, sfxGain = null, musicGain = null;
let musicTimer = null, musicOn = false;

function audioAvailable(){ return typeof (window.AudioContext||window.webkitAudioContext) === "function"; }

// Create the context on a user gesture (browsers block autoplay otherwise).
function initAudio(){
  if(audioCtx || !audioAvailable()) { if(audioCtx && audioCtx.state==="suspended") audioCtx.resume(); return !!audioCtx; }
  try{
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    masterGain = audioCtx.createGain(); masterGain.gain.value = 1; masterGain.connect(audioCtx.destination);
    sfxGain = audioCtx.createGain();    sfxGain.gain.value = 0.8;  sfxGain.connect(masterGain);
    musicGain = audioCtx.createGain();  musicGain.gain.value = 0.0; musicGain.connect(masterGain); // fade in later
    unlockAudio();   // must happen INSIDE the user gesture that first created the context
  }catch(e){ audioCtx = null; }
  return !!audioCtx;
}
// iOS/Safari (and Chrome autoplay) keep a new AudioContext "suspended" and only
// truly unlock it if we (a) call resume() AND (b) actually start a sound source,
// all SYNCHRONOUSLY within the tap that created the context. Playing one silent
// buffer here is the standard trick that flips the context to "running" for real.
function unlockAudio(){
  if(!audioCtx) return;
  try{
    if(audioCtx.resume) audioCtx.resume();
    const buf = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.connect(audioCtx.destination); src.start(0);
  }catch(e){}
}
function soundEnabled(){ return !!store.soundOn; }

// Play one note. wave: sine/triangle/square; t0 offset seconds; dur seconds.
function tone(freq, t0, dur, wave, peak, dest){
  if(!audioCtx) return;
  try{
    const now = audioCtx.currentTime + t0;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = wave || "sine"; o.frequency.setValueAtTime(freq, now);
    g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(peak || 0.22, now + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    o.connect(g); g.connect(dest || sfxGain);
    o.start(now); o.stop(now + dur + 0.02);
  }catch(e){}
}
// A short glide (used for "boing"/"whoosh").
function glide(f1, f2, t0, dur, wave, peak){
  if(!audioCtx) return;
  try{
    const now = audioCtx.currentTime + t0;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = wave || "sine";
    o.frequency.setValueAtTime(f1, now);
    o.frequency.exponentialRampToValueAtTime(Math.max(1,f2), now + dur);
    g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(peak || 0.2, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    o.connect(g); g.connect(sfxGain);
    o.start(now); o.stop(now + dur + 0.02);
  }catch(e){}
}
// A bright "bell/pluck": a note plus its octave+fifth harmonics with a shimmer tail.
function bell(freq, t0, dur, peak, dest){
  if(!audioCtx) return;
  tone(freq, t0, dur, "triangle", (peak||0.2), dest);
  tone(freq*2, t0, dur*0.7, "sine", (peak||0.2)*0.45, dest);
  tone(freq*3, t0, dur*0.45, "sine", (peak||0.2)*0.2, dest);
}
// Soft filtered-noise percussion (light hat / shaker) — very quiet, adds groove.
let _noiseBuf = null;
function perc(t0, dur, peak, cutoff, dest){
  if(!audioCtx) return;
  try{
    if(!_noiseBuf){
      _noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.3, audioCtx.sampleRate);
      const d = _noiseBuf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
    }
    const now = audioCtx.currentTime + t0;
    const src = audioCtx.createBufferSource(); src.buffer = _noiseBuf;
    const g = audioCtx.createGain();
    let node = src;
    if(audioCtx.createBiquadFilter){
      const f = audioCtx.createBiquadFilter(); f.type = "highpass"; f.frequency.value = cutoff || 6000;
      src.connect(f); node = f;
    }
    g.gain.setValueAtTime(peak || 0.04, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + (dur||0.06));
    node.connect(g); g.connect(dest || sfxGain);
    src.start(now); src.stop(now + (dur||0.06) + 0.02);
  }catch(e){}
}

// Shuffle-bag: returns items in random order without repeating until exhausted,
// so consecutive sounds are always different.
function makeBag(n){
  let order=[], last=-1;
  return ()=>{
    if(!order.length){
      order = shuffle([...Array(n).keys()]);
      // avoid repeating the previous draw across a reshuffle (pop() takes the last item)
      if(n>1 && order[order.length-1]===last) order.unshift(order.pop());
    }
    return (last = order.pop());
  };
}
const _correctBag = makeBag(6), _wrongBag = makeBag(4), _fanfareBag = makeBag(3);
const J = () => 0.97 + Math.random()*0.06;              // tiny pitch jitter per play
const S = { C:261.63,D:293.66,E:329.63,F:349.23,G:392,A:440,B:493.88,
            C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880,C6:1046.5 };

// Happy "correct" — bright bell arpeggios (6 patterns), escalates on a hot streak.
function sfxCorrect(streak){
  if(!soundEnabled() || !initAudio()) return;
  duckMusic();
  perc(0, 0.05, 0.05, 8000);                              // tiny sparkle transient
  if(streak && streak>=5){ // big, joyful celebration for hot streaks
    [S.C5,S.E5,S.G5,S.C6,S.E5,S.G5,S.C6].forEach((f,i)=> bell(f*J(), i*0.075, 0.34, 0.2));
    bell(S.G5*J(), 0.6, 0.5, 0.14); bell(S.C6*J(), 0.66, 0.7, 0.15);
    return;
  }
  const patterns = [
    ["C5","E5","G5"],
    ["G","C5","E5","G5"],
    ["E5","G5","C6"],
    ["C5","D5","E5","G5"],
    ["G5","E5","C6"],
    ["C5","G5","C6"],
  ];
  const p = patterns[_correctBag()];
  p.forEach((n,i)=> bell(S[n]*J(), i*0.085, 0.3, 0.2));
  bell(p.map(x=>S[x]).reduce((a,b)=>Math.max(a,b))*J()*1.0, p.length*0.085+0.02, 0.5, 0.12); // shimmer tail
}

// Gentle "not quite" — soft, cute & friendly (never harsh), 4 variants.
function sfxWrong(){
  if(!soundEnabled() || !initAudio()) return;
  duckMusic();
  switch(_wrongBag()){
    case 0: tone(S.E*J(),0,0.16,"triangle",0.17); tone(S.C*J(),0.13,0.26,"triangle",0.17); break; // soft two-step down
    case 1: glide(360, 200, 0, 0.30, "triangle", 0.16); tone(S.C*J(),0.24,0.2,"sine",0.1); break; // cute "bloop"
    case 2: tone(S.D*J(),0,0.15,"sine",0.16); tone(S.A/2*J(),0.14,0.28,"triangle",0.15); break;
    case 3: glide(300, 240, 0, 0.16, "sine", 0.15); glide(240, 300, 0.16, 0.18, "sine", 0.13); break; // playful wobble
  }
}

// Whoosh + pop for the "Next" button — light and satisfying, 3 variants.
const _nextBag = makeBag(3);
function sfxNext(){

  perc(0, 0.05, 0.05, 7000);
  switch(_nextBag()){

    case 1: bell(S.G5*J(), 0, 0.18, 0.15); bell(S.C6*J(), 0.05, 0.2, 0.12); break; // twinkle up
    case 2: glide(520, 780, 0, 0.10, "triangle", 0.13); tone(S.C6*J(),0.09,0.16,"sine",0.1); break;

function sfxStar(){

// End of round / test — celebratory (win) or warm & encouraging (else).
function sfxFanfare(win){
  if(!soundEnabled() || !initAudio()) return;

  if(win){
    const tunes = [
      ["C5","E5","G5","C6","E5","G5","C6"],

      ["E5","G5","C6","D5","E5","G5","C6"],
    ];
    const t = tunes[_fanfareBag()];
    t.forEach((n,i)=>{ bell(S[n]*J(), i*0.13, 0.46, 0.2); if(i%2===0) perc(i*0.13, 0.05, 0.05, 7000); });
    bell(S.C6*J(), t.length*0.13+0.05, 0.7, 0.14);
  }else{
    ["C5","D5","E5","D5","E5","G5"].forEach((n,i)=> tone(S[n]*J(), i*0.16, 0.4, "sine", 0.18));

// Soft "pop" for taps / navigation.
function sfxTap(){ if(!soundEnabled() || !audioCtx) return; glide(520, 660, 0, 0.09, "sine", 0.10); }

// Briefly lower the music so effects stand out, then restore.
function duckMusic(mult){
  if(!audioCtx || !musicGain || !musicOn) return;
  try{
    const now = audioCtx.currentTime, base = MUSIC_VOL;
    musicGain.gain.cancelScheduledValues(now);
    musicGain.gain.setValueAtTime(base*0.35, now);
    musicGain.gain.linearRampToValueAtTime(base, now + 0.6*(mult||1));
  }catch(e){}
}

/* ---- Background music: a little "jukebox" of cheerful tunes ------------------
   Several different songs (each its own chord loop, tempo, mood & melody scale).
   A tune plays for a while, then the app smoothly switches to a DIFFERENT one —
   and switchTune() is also called whenever the child moves to a new screen, so
   every screen tends to feel musically fresh. Everything is generated live so
   no bar ever repeats exactly. Mixed a good deal LOUDER than before, but still
   ducks under the sound-effects so answers always cut through.                 */
const MUSIC_VOL = 0.34;                 // was 0.17 — raised ~2x so background music is clearly audible vs sfx (sfx lowered to 0.8)
// Scales used for the melodies (all pleasant, no wrong notes possible).
const SCALE_MAJOR = [S.C,S.D,S.E,S.G,S.A,S.C5,S.D5,S.E5,S.G5,S.A5];          // bright & happy
const SCALE_MAJ7  = [S.C,S.E,S.G,S.B,S.D5,S.E5,S.G5,S.A5,S.C6];               // dreamy / floaty
const SCALE_MIXO  = [S.C,S.D,S.E,S.G,S.A,S.C5,S.D5,S.E5,S.G5];                // playful bounce
// A "song" = chord progression + tempo + which scale the melody draws from +
// how busy/long the notes are + which wave gives its melody its character.
const SONGS = [
  { name:"sunny",   eighth:0.205, scale:SCALE_MAJOR, wave:"triangle", density:0.66, swing:0.55,
    prog:[ {bass:65.41,pad:[S.C,S.G]}, {bass:98.00,pad:[S.G,S.D5]}, {bass:110.00,pad:[S.A,S.E5]}, {bass:87.31,pad:[S.F,S.C5]} ] }, // C G Am F
  { name:"skip",    eighth:0.185, scale:SCALE_MIXO,  wave:"square",   density:0.72, swing:0.62,
    prog:[ {bass:87.31,pad:[S.F,S.A]}, {bass:65.41,pad:[S.C,S.E5]}, {bass:98.00,pad:[S.G,S.D5]}, {bass:98.00,pad:[S.G,S.B]} ] },   // F C G G
  { name:"dreamy",  eighth:0.235, scale:SCALE_MAJ7,  wave:"sine",     density:0.55, swing:0.50,
    prog:[ {bass:65.41,pad:[S.E,S.G]}, {bass:110.00,pad:[S.A,S.C5]}, {bass:87.31,pad:[S.F,S.A]}, {bass:98.00,pad:[S.G,S.D5]} ] },  // C Am F G
  { name:"bounce",  eighth:0.170, scale:SCALE_MAJOR, wave:"triangle", density:0.74, swing:0.60,
    prog:[ {bass:73.42,pad:[S.D,S.A]}, {bass:98.00,pad:[S.G,S.B]}, {bass:65.41,pad:[S.C,S.E5]}, {bass:98.00,pad:[S.G,S.D5]} ] },   // D G C G
];
let _mStep = 0, _mBar = 0, _songIdx = 0, _barsThisSong = 0, _lastMel = -1;
const _songBag = makeBag(SONGS.length);
const MUSIC_EIGHTH = 0.2;               // fixed step clock (200ms) — one interval for all songs
// Switch to a fresh, different tune. Does NOT touch the interval or gain, so it
// can be called any time (including mid-song) without ever stopping the music.
function switchTune(){
  _songIdx = _songBag();
  _mBar = 0;                            // start the new tune's chord loop cleanly
}

// The core sequencer step — runs on a plain setInterval (rock-solid) at a fixed
// clock; each song just picks different notes/feel, not a different clock.
function musicStep(){
  if(!musicOn || !audioCtx) return;
  const song = SONGS[_songIdx];
  const EIGHTH = MUSIC_EIGHTH;
  const STEPS = 8;
  const pos = _mStep % STEPS;
  const bar = song.prog[_mBar % song.prog.length];
  const swingOff = (pos%2===1) ? EIGHTH*(song.swing-0.5)*0.5 : 0;
  if(pos === 0){                                    // new bar → soft pad chord
    bar.pad.forEach(f=> tone(f/2, 0, EIGHTH*7.5, "sine", 0.05, musicGain));
    tone(bar.pad[0], 0, EIGHTH*7.5, "sine", 0.03, musicGain);
  }
  // plucky bass line
  if(pos===0) bell(bar.bass, 0, EIGHTH*1.4, 0.13, musicGain);
  else if(pos===3) bell(bar.bass*1.5, swingOff, EIGHTH*0.9, 0.08, musicGain);
  else if(pos===4) bell(bar.bass, 0, EIGHTH*1.2, 0.11, musicGain);
  else if(pos===6 && Math.random()>0.5) bell(bar.bass*2, swingOff, EIGHTH*0.7, 0.06, musicGain);
  // groove: shaker on off-beats + soft "kick" on the down-beat
  if(pos%2===1) perc(swingOff, 0.05, 0.032, 9000, musicGain);
  if(pos===0 || pos===4) perc(0, 0.06, 0.04, 2600, musicGain);
  // playful melody from this song's scale
  if(Math.random() < song.density){
    const scale = song.scale;
    let mi = Math.floor(Math.random()*scale.length);
    if(mi === _lastMel) mi = (mi+1)%scale.length;
    _lastMel = mi;
    const f = scale[mi];
    const long = Math.random()>0.72;
    tone(f, swingOff, EIGHTH*(long?1.7:0.85), song.wave, 0.07, musicGain);
    if(Math.random()>0.8) tone(f*2, swingOff+EIGHTH*0.5, EIGHTH*0.6, "sine", 0.035, musicGain);
  }
  _mStep++;
  if(pos === STEPS-1){
    _mBar++; _barsThisSong++;
    if(_barsThisSong >= 8){ _barsThisSong = 0; switchTune(); }   // freshen tune every 8 bars
  }
}

function startMusic(){
  if(!soundEnabled() || !initAudio() || musicOn) return;
  musicOn = true;
  _songIdx = _songBag();                 // pick a starting tune
  _mStep = 0; _mBar = 0; _barsThisSong = 0;
  // initAudio() already called unlockAudio() (resume + a silent source) inside the
  // tap, so the context is unlocking now. Start the sequencer straight away — notes
  // are scheduled on the context clock and will sound as soon as it flips to running
  // (a few ms). We also re-resume defensively in case the browser is slow.
  if(audioCtx.state === "suspended" && audioCtx.resume){ try{ audioCtx.resume(); }catch(e){} }
  try{
    musicGain.gain.cancelScheduledValues(audioCtx.currentTime);
    musicGain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    musicGain.gain.linearRampToValueAtTime(MUSIC_VOL, audioCtx.currentTime + 0.9);
  }catch(e){}
  if(musicTimer){ clearInterval(musicTimer); musicTimer = null; }
  musicStep();
  musicTimer = setInterval(musicStep, MUSIC_EIGHTH*1000);
}
function stopMusic(){
  musicOn = false;
  if(musicTimer){ clearInterval(musicTimer); musicTimer = null; }
  if(audioCtx && musicGain){ try{
    const now = audioCtx.currentTime;
    musicGain.gain.cancelScheduledValues(now);
    musicGain.gain.linearRampToValueAtTime(0.0001, now + 0.4);
  }catch(e){} }
}
// Make sure music is playing when sound is on (called on user gestures).
// If it's already playing, just freshen the tune — never restart the engine.
function ensureMusic(){
  if(!soundEnabled()) return;
  initAudio();
  // If we think music is on but the sequencer isn't actually running (e.g. it was
  // paused when the tab was hidden), treat it as stopped so startMusic can revive it.
  if(musicOn && !musicTimer) musicOn = false;
  if(musicOn){
    if(audioCtx && audioCtx.state === "suspended" && audioCtx.resume){ try{ audioCtx.resume(); }catch(e){} }
    switchTune();                        // already playing → change song, keep it running
  }else{
    startMusic();                        // startMusic handles resume-then-begin itself
  }
}
// Save battery / be polite: pause music when the tab is hidden.
if(typeof document !== "undefined"){
  document.addEventListener("visibilitychange", ()=>{
    if(document.hidden) stopMusic(); else ensureMusic();
  });
}

// Back-compat wrapper (older call sites / tests).

/* ================= confetti effect ================= */
// A richer burst: more pieces, varied sizes, each falls at its own speed while
// gently swaying side-to-side and spinning (fall+sway are CSS keyframes).
function confetti(big){
  const imgs = ["glowing-star","star","heart","party","sparkles","confetti","trophy","blossom"];
  const n = big ? 30 : 18;
  for(let i=0;i<n;i++){
    const el = document.createElement("img");
    el.src = "images/"+pick(imgs)+".svg";
    el.className = "confetti";
    const fall = 1.2 + Math.random()*1.6;
    el.style.left = Math.random()*100 + "vw";
    el.style.top = (-40 - Math.random()*80) + "px";
    el.style.width = (18 + Math.random()*30) + "px";
    // fall duration + a separate sway speed so pieces drift independently
    el.style.animationDuration = fall + "s, " + (0.6 + Math.random()*0.9) + "s";
    el.style.animationDelay = (Math.random()*0.5) + "s, 0s";
    el.style.opacity = (0.75 + Math.random()*0.25).toFixed(2);
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), (fall+1.2)*1000);
  }
}

function scatterItems(total){
  const items = {};
  const slots = shuffle([1,2,3,4,5,6,7,8,9].filter(s=>s<total));
  const howMany = 2 + Math.floor(Math.random()*2);   // 2–3 items per round
  slots.slice(0,howMany).forEach(s=>{ items[s] = pick(ITEMS).e; });
  return items;
}

function answerPractice(pos){
  const q = P.queue[P.idx];
  const good = pos === q.correctPos;
  const hope = P.hopeActive;
  lockOptions(pos, q.correctPos);
  P.done++;
  bumpPractice(P.topicId, good);
  const fb = document.getElementById("fb");
  if(good){
    P.correct++; P.streak++;
    const res = awardCorrect(P.streak, hope);           // stars/gold/item with multipliers → saved to DB
    P.goldRound = (P.goldRound||0) + res.goldWon;
    if(res.item){ P.itemsRound = P.itemsRound||[]; P.itemsRound.push(res.item.e); }
    sfxCorrect(P.streak); sfxStar(); confetti(res.mult>=3);
    hopRunner(P.correct, P.queue.length);               // hedgehog hops forward + grabs any item here
    bumpCounters(res);                                  // update + pulse the star/gold counters
    const extra = P.streak>=3 ? `<div class="sub">${P.streak} correct in a row! Amazing!</div>` : "";
    fb.innerHTML = `<div class="feedback good">${IMG("party")} ${pick(PRAISE)}${extra}</div>

let T = null;
function goTestIntro(){

      <p class="muted">Time: ${TEST_MINUTES} minutes - countdown timer.<br>When you're done, tap "Submit" to see your score!</p>

    </div>`;

function buildTest(){
  // 24 classic questions from 10 topics (evenly split), 6 reading questions (1 passage), 5 scholar questions (2 marks)
  const pools = shuffle(TOPICS).map(t => shuffle(topicPool(t).filter(q=>!q.s)).map(q=>({...q, topicName:t.nameEn})));
  const classic = [];
  let i = 0, guard = 0;
  while(classic.length < 24 && guard++ < 2000){
    const pool = pools[i % pools.length]; i++;
    if(pool.length) classic.push(pool.pop());
  }
  const passage = pick(passagePool());
  const comp = passage.questions.map(q=>({...q, topicName:"Reading", passage}));
  const scholar = shuffle(TOPICS.flatMap(t=>topicPool(t).filter(q=>q.s).map(q=>({...q, topicName:t.nameEn})))).slice(0,5);
  const qs = [
    ...shuffle(classic).map(q=>({...q, marks:1})),
    ...comp.map(q=>({...q, marks:1})),
    ...scholar.map(q=>({...q, marks:2}))
  ].map(prepQuestion);
  return qs;
}
function startTest(){
  ensureMusic();
  T = { qs: buildTest(), mode: MODE, idx:0, answers:{}, secondsLeft: TEST_MINUTES*60, timer:null, startedAt: Date.now() };
  T.timer = setInterval(()=>{
    T.secondsLeft--;
    const el = document.getElementById("timer");
    if(el){
      el.textContent = fmtTime(T.secondsLeft);
      el.parentElement.classList.toggle("timer-low", T.secondsLeft < 300);
    }
    if(T.secondsLeft <= 0){ submitTest(true); }
  }, 1000);
  renderTestQ();
}
const fmtTime = s => { s=Math.max(0,s); return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0"); };
function renderTestQ(){
  const q = T.qs[T.idx];
  const answered = Object.keys(T.answers).length;
  const passageHtml = q.passage ? `<div class="passage"><b>${esc(q.passage.title)}</b>\n${esc(q.passage.text)}</div>` : "";
  const nums = T.qs.map((_,i)=>
    `<button class="${T.answers[i]!=null?'done':''} ${i===T.idx?'cur':''}" onclick="jumpTest(${i})">${i+1}</button>`).join("");
  $app.innerHTML = `
    <div class="topbar">
      <button class="btn btn-ghost btn-small" onclick="confirmQuitTest()">${IMG("back")} Exit</button>
      <span class="pill ${T.secondsLeft<300?'timer-low':''}">${IMG("timer")} <span id="timer">${fmtTime(T.secondsLeft)}</span></span>
      <span class="pill">${answered}/${T.qs.length}</span>
    </div>
    ${trackHtml(answered, T.qs.length, runnerEmoji(), {})}
    <div class="statrow">
      <div class="progressbar"><div style="width:${answered/T.qs.length*100}%"></div></div>
    </div>
    <div class="card">
      <p class="muted" style="margin:0 0 4px">${modeBadge(T.mode)} Question ${T.idx+1} / ${T.qs.length} - ${esc(q.topicName)} ${q.marks===2?'<span class="mark2">Scholar - 2 marks</span>':''}</p>
      ${passageHtml}
      ${q.img && !q.passage ? IMG(q.img,"qimg") : ""}
      <div class="qtext">${esc(q.q)}</div>
      ${renderOptions(q,"answerTest")}
    </div>
    <div class="navrow">
      <button class="btn btn-ghost" ${T.idx===0?"disabled style='opacity:.4'":""} onclick="navTest(-1)">Previous</button>
      <button class="btn btn-purple" ${T.idx===T.qs.length-1?"disabled style='opacity:.4'":""} onclick="navTest(1)">Next</button>
    </div>
    <div class="card" style="margin-top:16px">
      <p class="muted" style="margin:0 0 6px">Tap a number to jump to a question:</p>
      <div class="testnums">${nums}</div>
      <div class="navrow"><button class="btn btn-pink" onclick="confirmSubmit()">Submit ${IMG("check")}</button></div>
    </div>`;
  const picked = T.answers[T.idx];
  if(picked != null){
    document.querySelectorAll(".opt").forEach(b=>{ if(+b.dataset.pos === picked) b.classList.add("picked"); });
  }
  window.scrollTo(0,0);
}
function answerTest(pos){
  T.answers[T.idx] = pos;
  if(T.idx < T.qs.length-1){ T.idx++; }
  renderTestQ();
}
function navTest(d){ if(d>0) sfxNext(); else sfxTap(); T.idx = Math.min(T.qs.length-1, Math.max(0, T.idx+d)); renderTestQ(); }
function jumpTest(i){ T.idx = i; renderTestQ(); }
function confirmQuitTest(){
  if(confirm("Exiting will lose this attempt. Are you sure?")){ clearInterval(T.timer); T=null; goHome(); }
}
function confirmSubmit(){
  const left = T.qs.length - Object.keys(T.answers).length;
  const msg = left>0 ? `You still have ${left} unanswered question(s). Submit anyway?` : "Submit and see your score?";
  if(confirm(msg)) submitTest(false);
}
function submitTest(timeout){
  clearInterval(T.timer);
  let score=0, correct=0, totalMarks=0;
  const review = T.qs.map((q,i)=>{
    totalMarks += q.marks;
    const picked = T.answers[i];
    const ok = picked === q.correctPos;
    if(ok){ correct++; score += q.marks; }
    return { q, picked, ok };
  });
  const timeUsed = Math.min(TEST_MINUTES*60, Math.round((Date.now()-T.startedAt)/1000));
  store.tests.push({ date: new Date().toISOString(), mode: T.mode, score, totalMarks, correct, total: T.qs.length, timeUsed });
  // Reward: 1 star per correct answer (kept), plus gold + item drops for a good test.
  const pct = totalMarks ? score/totalMarks : 0;
  let goldWon = correct;                              // 1 gold per correct in a test
  if(pct >= 0.6) goldWon += 5;                        // pass bonus
  if(pct >= 0.85) goldWon += 10;                      // top-score bonus
  const itemsWon = [];
  const drops = 1 + (pct>=0.6?1:0) + (pct>=0.85?1:0); // 1–3 item drops by performance
  for(let d=0; d<drops; d++){ itemsWon.push(collectItem().e); }
  addStars(correct); addGold(goldWon);
  saveStore(store);
  renderTestResult({score,totalMarks,correct,total:T.qs.length,timeUsed,review,timeout,mode:T.mode,goldWon,itemsWon});
  T = null;
}
function renderTestResult(r){
  const pct = r.score / r.totalMarks;
  sfxFanfare(pct >= 0.6);
  if(pct >= 0.85){ confetti(true); setTimeout(()=>confetti(true), 550); }   // double burst for a top score
  else if(pct >= 0.6){ confetti(); }
  const msg = pct>=0.85 ? "Excellent! You're a superstar!" : pct>=0.6 ? "Great job! Keep it up!" : "Keep practicing and you'll score higher next time!";
  const reviewHtml = r.review.map((it,i)=>{
    const yourAns = it.picked==null ? "(not answered)" : it.q.o[it.q.order[it.picked]];
    return `<div class="review-item ${it.ok?'ok':''}">
      <div class="rq">Question ${i+1}: ${esc(it.q.q)}</div>
      ${it.ok ? `<div>You chose correctly: <b>${esc(it.q.o[it.q.a])}</b></div>`
              : `<div>You chose: <b>${esc(yourAns)}</b> - Correct answer: <b>${esc(it.q.o[it.q.a])}</b></div>`}
    </div>`;
  }).join("");
  $app.innerHTML = `
    <div class="card center">
      ${IMG(pct>=0.6?"trophy":"muscle","icon-xl")}
      ${r.timeout?'<p class="muted">Time is up! Your test was submitted automatically.</p>':''}
      <div class="score-big">${r.score}/${r.totalMarks} marks</div>
      <p style="font-weight:700">${msg}</p>
      <div class="coinrow" style="justify-content:center">
        <span class="coin star">${IMG("glowing-star")} +${r.correct} stars</span>
        ${r.goldWon?`<span class="coin gold">${goldSVG()} +${r.goldWon} gold</span>`:""}
      </div>
      ${(r.itemsWon&&r.itemsWon.length)?`<div class="rewardpop" style="justify-content:center">${r.itemsWon.map(e=>`<span>${e}</span>`).join("")}</div><p class="muted">Added to your bag!</p>`:""}
      <p class="muted">${modeBadge(r.mode)} &middot; ${r.correct}/${r.total} correct - Time: ${fmtTime(r.timeUsed)}</p>
      <div class="navrow">
        <button class="btn btn-purple" onclick="goTestIntro()">Try another test</button>
        <button class="btn btn-yellow" onclick="goHome()">${IMG("house")} Home</button>
      </div>
    </div>
    <div class="card">
      <h3 style="margin-top:0">${IMG("open-book")} Review your answers</h3>
      ${reviewHtml}
    </div>`;
  window.scrollTo(0,0);
}

      <div class="coinrow">
        <span class="coin star">${IMG("glowing-star")} ${store.stars}</span>
        <span class="coin gold">${goldSVG()} ${store.gold}</span>
      </div></div>
    <h1>${IMG("chart")} My progress</h1>
    <div class="card">
      <h3 style="margin-top:0">🎒 My bag</h3>
      <p class="muted" style="margin:0 0 4px">Items your hedgehog collected. Spend gold in a shop coming soon!</p>
      ${bagHtml}
    </div>
    <div class="card">
      <h3 style="margin-top:0">${IMG("timer")} Test attempts</h3>
      ${rows ? `<table><tr><th>Date</th><th>Mode</th><th>Score</th><th>Correct</th><th>Time</th></tr>${rows}</table>`
             : `<p class="muted">No tests yet. Tap "Take a test" to begin!</p>`}
    </div>
    <div class="card">
      <h3 style="margin-top:0">${IMG("target")} Practice by topic</h3>
      ${pracRows ? `<table><tr><th>Topic</th><th>Mode</th><th>Correct/Total</th><th>Rate</th></tr>${pracRows}</table>`
                 : `<p class="muted">No topics practiced yet.</p>`}
    </div>
    <div class="card center">
      <button class="btn btn-ghost" onclick="resetProgress()">${IMG("reset")} Clear all progress</button>
    </div>`;
  window.scrollTo(0,0);
}
function resetProgress(){
  if(confirm("Clear all scores, stars and test history? This cannot be undone!")){
    store = { practice:{}, tests:[], stars:0, gold:0, bag:{}, shop:{}, equip:{skin:"classic",decor:null}, boosters:{}, soundOn: store.soundOn };
    saveStore(store);
    goHistory();
  }
}

/* ================= sound on/off button ================= */
let soundBtn = null;
function refreshSoundBtn(){
  if(!soundBtn) return;
  const on = soundEnabled();
  soundBtn.textContent = on ? "🔊" : "🔇";
  soundBtn.className = "sound-toggle" + (on ? "" : " off");
  soundBtn.setAttribute("aria-label", on ? "Sound on — tap to mute" : "Sound off — tap to turn on");
  soundBtn.title = soundBtn.getAttribute("aria-label");
}
function toggleSound(){
  store.soundOn = !store.soundOn;
  saveStore(store);
  refreshSoundBtn();
  if(store.soundOn){ initAudio(); ensureMusic(); sfxTap(); }
  else { stopMusic(); }
}
function mountSoundBtn(){
  if(typeof document === "undefined" || soundBtn) return;
  soundBtn = document.createElement("button");
  soundBtn.type = "button";
  soundBtn.addEventListener("click", toggleSound);
  document.body.appendChild(soundBtn);
  refreshSoundBtn();
}

/* ================= startup ================= */
mountSoundBtn();
goHome();                                  // render immediately from localStorage seed
// Upgrade to the SQLite-backed store as soon as sql.js is ready, then re-render
// so any data restored from IndexedDB (stars, gold, bag, history) shows up.
initDB().then(()=>{ if(dbReady) goHome(); });
</script>
</body>
</html>
