<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Practice · Cambridge Global English Stage 4</title>
<style>
  :root{
    --bg:#f4f7fb; --card:#ffffff; --ink:#1f2a44; --muted:#6b7794;
    --line:#e4e9f2; --brand:#3b6ef6; --brand-soft:#e8f0ff;
    --chill:#22b07d; --chill-soft:#e3f6ee;
    --master:#f0972b; --master-soft:#fdf0dd;
    --tinhhoa:#9b4dff; --tinhhoa-soft:#f0e7ff;
    --ok:#22b07d; --bad:#e5484d; --ok-soft:#e3f6ee; --bad-soft:#fdecec;
    --radius:16px; --shadow:0 6px 24px rgba(31,42,68,.08);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{max-width:860px;margin:0 auto;padding:24px 18px 80px}
  h1{font-size:26px;margin:0 0 4px;font-weight:800;letter-spacing:-.4px}
  .sub{color:var(--muted);font-size:14px;margin-bottom:22px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .pad{padding:20px}
  /* screens */
  .screen{display:none} .screen.active{display:block}
  /* topic grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
  .topic{cursor:pointer;transition:.15s;border:1px solid var(--line);border-radius:var(--radius);background:var(--card);padding:16px;display:flex;flex-direction:column;gap:6px}
  .topic:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--brand)}
  .topic .u{font-size:12px;font-weight:700;color:var(--brand);text-transform:uppercase;letter-spacing:.5px}
  .topic .t{font-size:18px;font-weight:700}
  .topic .d{font-size:13px;color:var(--muted)}
  .topic .prog{margin-top:6px;font-size:12px;color:var(--muted)}
  /* level picker */
  .levels{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:16px}
  @media(max-width:640px){.levels{grid-template-columns:1fr}}
  .lvl{cursor:pointer;border-radius:var(--radius);padding:18px;color:#fff;transition:.15s;border:none;text-align:left}
  .lvl:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
  .lvl h3{margin:0 0 4px;font-size:19px}
  .lvl p{margin:0;font-size:13px;opacity:.92}
  .lvl.chill{background:linear-gradient(135deg,#22b07d,#1c9c8f)}
  .lvl.master{background:linear-gradient(135deg,#f0972b,#ef6f3c)}
  .lvl.tinhhoa{background:linear-gradient(135deg,#9b4dff,#6a5cff)}
  .lvl .star{font-size:13px;margin-top:8px;opacity:.9}
  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:6px;cursor:pointer;border:1px solid var(--line);background:var(--card);
    color:var(--ink);padding:9px 16px;border-radius:12px;font-size:14px;font-weight:600;transition:.15s}
  .btn:hover{border-color:var(--brand);color:var(--brand)}
  .btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
  .btn.primary:hover{opacity:.9;color:#fff}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .back{color:var(--muted);font-weight:600;cursor:pointer;font-size:14px;display:inline-flex;gap:5px;align-items:center;margin-bottom:14px}
  .back:hover{color:var(--brand)}
  /* quiz header */
  .qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px}
  .pill{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px}
  .pill.chill{background:var(--chill-soft);color:var(--chill)}
  .pill.master{background:var(--master-soft);color:var(--master)}
  .pill.tinhhoa{background:var(--tinhhoa-soft);color:var(--tinhhoa)}
  .bar{height:8px;background:var(--line);border-radius:20px;overflow:hidden;margin:6px 0 20px}
  .bar > i{display:block;height:100%;background:var(--brand);width:0;transition:.3s}
  /* question */
  .qtext{font-size:19px;font-weight:700;margin:0 0 4px}
  .qhint{font-size:13px;color:var(--muted);margin:0 0 16px}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{cursor:pointer;border:1.5px solid var(--line);border-radius:12px;padding:13px 15px;font-size:15px;transition:.12s;background:var(--card);display:flex;align-items:center;gap:10px}
  .opt:hover{border-color:var(--brand);background:var(--brand-soft)}
  .opt .key{width:26px;height:26px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
  .opt.sel{border-color:var(--brand);background:var(--brand-soft)}
  .opt.correct{border-color:var(--ok);background:var(--ok-soft)}
  .opt.wrong{border-color:var(--bad);background:var(--bad-soft)}
  .opt.correct .key{background:var(--ok);color:#fff}
  .opt.wrong .key{background:var(--bad);color:#fff}
  input.text{width:100%;padding:13px 15px;font-size:16px;border:1.5px solid var(--line);border-radius:12px;font-family:inherit}
  input.text:focus{outline:none;border-color:var(--brand)}
  textarea.text{width:100%;min-height:110px;padding:13px 15px;font-size:15px;border:1.5px solid var(--line);border-radius:12px;font-family:inherit;resize:vertical}
  textarea.text:focus{outline:none;border-color:var(--brand)}
  .feedback{margin-top:16px;padding:14px;border-radius:12px;font-size:14px;display:none}
  .feedback.show{display:block}
  .feedback.good{background:var(--ok-soft);color:#137a56}
  .feedback.bad{background:var(--bad-soft);color:#b02a2e}
  .feedback b{display:block;margin-bottom:3px}
  .model{background:var(--tinhhoa-soft);color:#5a2ea6;margin-top:14px;padding:14px;border-radius:12px;font-size:14px;display:none}
  .model.show{display:block}
  .model b{display:block;margin-bottom:4px}
  .qfooter{display:flex;justify-content:space-between;margin-top:22px;gap:10px}
  /* results */
  .score{text-align:center;padding:10px 0}
  .score .big{font-size:52px;font-weight:800;letter-spacing:-1px}
  .score .lbl{color:var(--muted);font-size:15px}
  .stars{font-size:30px;margin:10px 0}
  .msg{font-size:16px;margin:10px 0 20px}
  .self-note{background:var(--tinhhoa-soft);color:#5a2ea6;padding:14px;border-radius:12px;font-size:14px;margin-top:16px;text-align:left}
  .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px}
  .reset{margin-top:26px;text-align:center}
  .reset a{color:var(--muted);font-size:12px;cursor:pointer;text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <h1>English Practice 🌟</h1>
  <div class="sub">Cambridge Global English · Stage 4 — pick a topic, pick a level, and have fun!</div>

  <!-- SCREEN 1: topics -->
  <section id="s-topics" class="screen active">
    <div class="grid" id="topicGrid"></div>
    <div class="reset"><a id="resetAll">Reset all progress</a></div>
  </section>

  <!-- SCREEN 2: level picker -->
  <section id="s-levels" class="screen">
    <div class="back" id="backToTopics">← All topics</div>
    <div class="card pad">
      <div class="topic-title" id="lvlTitle" style="font-size:22px;font-weight:800"></div>
      <div class="d" id="lvlDesc" style="color:var(--muted);font-size:14px"></div>
      <div class="levels">
        <button class="lvl chill" data-lvl="chill">
          <h3>😎 Chill</h3><p>Warm-up. Recognise words &amp; easy grammar. Multiple choice.</p>
          <div class="star" id="star-chill"></div>
        </button>
        <button class="lvl master" data-lvl="master">
          <h3>💪 Master</h3><p>Use what you know. Fill the gaps &amp; read short texts.</p>
          <div class="star" id="star-master"></div>
        </button>
        <button class="lvl tinhhoa" data-lvl="tinhhoa">
          <h3>👑 Tinh hoa</h3><p>Think &amp; write. Reasoning and your own sentences.</p>
          <div class="star" id="star-tinhhoa"></div>
        </button>
      </div>
    </div>
  </section>

  <!-- SCREEN 3: quiz -->
  <section id="s-quiz" class="screen">
    <div class="back" id="backToLevels">← Choose level</div>
    <div class="card pad">
      <div class="qhead">
        <div id="quizTopic" style="font-weight:700"></div>
        <div id="quizPill" class="pill"></div>
      </div>
      <div class="bar"><i id="barFill"></i></div>
      <div id="qbody"></div>
    </div>
  </section>

  <!-- SCREEN 4: results -->
  <section id="s-results" class="screen">
    <div class="card pad">
      <div class="score">
        <div class="big" id="scoreBig"></div>
        <div class="lbl" id="scoreLbl"></div>
        <div class="stars" id="scoreStars"></div>
        <div class="msg" id="scoreMsg"></div>
      </div>
      <div class="self-note" id="selfNote" style="display:none"></div>
      <div class="actions">
        <button class="btn" id="retry">Try again</button>
        <button class="btn primary" id="doneToTopics">Back to topics</button>
      </div>
    </div>
  </section>
</div>

<script>
/* ============ DATA ============ */
/* Cambridge Global English Stage 4 — 9 units.
   Each unit has 3 levels. Question types:
   mc = multiple choice, fill = type the answer (accepts array of valid answers),
   open = free writing (self-check with a model answer). */
const DATA = [
/* ==================== UNIT 1 — OUR COMMUNITY ==================== */
{
  id:"community", title:"Our Community", desc:"People, jobs & places where we live",
  focus:"Grammar: adverbs of frequency, verb + -ing / infinitive · Skills climb: recall → apply in context → reason & justify",
  q:{
    /* CHILL — short recall, 1 idea, 4 options, generous hints */
    chill:[
      {type:"mc",q:"Who helps you when you are sick?",opts:["A doctor","A farmer","A pilot","A painter"],a:0},
      {type:"mc",q:"Where can you borrow books?",opts:["The library","The bakery","The market","The garage"],a:0},
      {type:"mc",q:"A person who puts out fires is a ___.",opts:["firefighter","teacher","dentist","driver"],a:0},
      {type:"mc",q:"Where do you buy fresh bread?",opts:["The bakery","The bank","The park","The station"],a:0},
      {type:"mc",q:"'always, usually, never' are words that tell us ___.",opts:["how often","a colour","a place","a name"],a:0,why:"These are adverbs of frequency."},
      {type:"mc",q:"A person who teaches children is a ___.",opts:["teacher","baker","nurse","farmer"],a:0},
      {type:"mc",q:"Which one is a PLACE in your town?",opts:["market","quickly","happy","blue"],a:0},
      {type:"mc",q:"We keep our streets safe with the help of a ___.",opts:["police officer","singer","chef","artist"],a:0}
    ],
    /* MASTER — read context, apply the rule, longer sentences, light hints */
    master:[
      {type:"fill",q:"Read: 'Mr Lee opens his shop at 6am. He does this every single day.' Rewrite the second sentence using the adverb 'always': 'He ___ opens his shop at 6am.'",hint:"Adverb of frequency goes BEFORE the main verb.",a:["always"],why:"'always' comes before the verb: He always opens…"},
      {type:"fill",q:"Read: 'Nadia grows vegetables, feeds the cows and works in the fields all day.' What is Nadia's job? She is a ___.",hint:"Someone who works with crops and farm animals.",a:["farmer"],why:"Growing crops + farm animals = a farmer."},
      {type:"fill",q:"Complete with the -ing form: 'My uncle is a vet. He loves ___ (look) after sick animals every day.'",hint:"After 'love' we use verb + -ing.",a:["looking"],why:"love + verb-ing → loves looking."},
      {type:"fill",q:"Complete with the infinitive: 'Amara studies hard because she wants ___ (become) a nurse one day.'",hint:"After 'want' we use to + verb.",a:["to become"],why:"want + to + verb → wants to become."},
      {type:"mc",q:"Read: 'The postman comes to our street. He brings letters but only on Mondays and Thursdays.' Which sentence is TRUE?",opts:["He sometimes brings letters.","He always brings letters.","He never brings letters.","He brings letters every day."],a:0,why:"Only 2 days a week = 'sometimes', not always/never."},
      {type:"fill",q:"Rewrite as a frequency question: You want to know how many times a week your friend visits the library. Ask: 'How ___ do you visit the library?'",hint:"One word that asks about frequency.",a:["often"],why:"'How often' asks about frequency."},
      {type:"mc",q:"Read: 'A librarian helps people find books and keeps the library quiet and tidy.' Why is a librarian useful to the community?",opts:["They help people find and enjoy books.","They cook food for everyone.","They drive the school bus.","They put out fires."],a:0,why:"The text is about finding books and keeping the library good."}
    ],
    /* TINH HOA — reasoning + extended writing, Stage-5 stretch, no options, richer vocab */
    tinhhoa:[
      {type:"mc",q:"REASONING. A town has one doctor, one baker and one teacher. The doctor moves away and no new doctor comes. Which problem is MOST likely to grow over time?",opts:["People who get sick have nowhere to go for treatment.","Nobody will be able to buy bread.","The school will run out of books.","The streets will have no names."],a:0,why:"With no doctor, sick people lose treatment — a growing, serious problem. The others are unrelated to losing a doctor."},
      {type:"open",q:"Choose ONE community helper (doctor, farmer, teacher, firefighter…). Explain what would happen to your town if that person disappeared. Give at least TWO consequences.",hint:"Use 'If … there were no …, …' and link ideas with 'because', 'so', 'as a result'.",model:"If there were no farmers in my town, we would have serious problems. First, the shops would have no fresh vegetables or fruit, so people might become unhealthy. As a result, families would have to travel far to buy food, which would cost more time and money. Farmers are quiet heroes who keep everyone fed."},
      {type:"open",q:"Some people think everyone in a community should help others, even if they are not paid. Do you agree? Give your opinion with TWO reasons and one example.",hint:"State your view clearly, then justify: 'I believe … because … For example …'",model:"I believe everyone in a community should help others, even without pay. Firstly, when neighbours help each other, problems that are too big for one person become easy for a group. Secondly, helping makes a town feel safe and friendly. For example, if an elderly woman cannot carry her shopping, a young person can help her, and one day someone will help them too. Kindness spreads."}
    ]
  }
},
/* ==================== UNIT 2 — EARTH AND BEYOND ==================== */
{
  id:"earth", title:"Earth and Beyond", desc:"Planets, space & our world",
  focus:"Grammar: comparative & superlative adjectives · Skills climb: recall → compare in context → reason & justify",
  q:{
    chill:[
      {type:"mc",q:"Which planet do we live on?",opts:["Earth","Mars","Jupiter","Venus"],a:0},
      {type:"mc",q:"The star at the centre of our solar system is the ___.",opts:["Sun","Moon","comet","rocket"],a:0},
      {type:"mc",q:"A person who travels in space is an ___.",opts:["astronaut","author","artist","athlete"],a:0},
      {type:"mc",q:"The comparative of 'big' is ___.",opts:["bigger","biggest","more big","big"],a:0,why:"Short adjectives add -er."},
      {type:"mc",q:"What gives us light at night in the sky?",opts:["the Moon","a desert","a river","a cloud"],a:0},
      {type:"mc",q:"The superlative of 'hot' is 'the ___'.",opts:["hottest","hoter","most hot","hotter"],a:0,why:"hot → hottest."},
      {type:"mc",q:"What carries astronauts into space?",opts:["a rocket","a boat","a train","a bike"],a:0},
      {type:"mc",q:"Which word is an adjective we can compare?",opts:["cold","quickly","under","and"],a:0}
    ],
    master:[
      {type:"fill",q:"Read: 'The Sun's surface is about 5,500°C. The Earth is much cooler.' Complete: 'The Sun is ___ (hot) than the Earth.'",hint:"Short adjective + -er + than.",a:["hotter"],why:"hot → hotter than."},
      {type:"fill",q:"Read: 'Mercury sits closest to the Sun, then Venus, then Earth.' Complete: 'Mercury is the ___ (near) planet to the Sun.'",hint:"the + adjective + -est.",a:["nearest"],why:"near → nearest."},
      {type:"fill",q:"Read: 'Jupiter could hold more than 1,000 Earths inside it.' Complete: 'Jupiter is the ___ (big) planet in our solar system.'",hint:"Double the last letter, add -est.",a:["biggest"],why:"big → biggest."},
      {type:"fill",q:"Use 'more' for a long adjective: 'Travelling to Mars is ___ (dangerous) than flying a plane.'",hint:"Long adjectives use 'more', not -er.",a:["more dangerous"],why:"dangerous → more dangerous."},
      {type:"mc",q:"Read: 'Mars looks red because there is a lot of iron in its dusty soil.' Why does Mars look red?",opts:["Because of the iron in its soil","Because it is very hot","Because the Sun is red","Because of its water"],a:0,why:"The text says iron in the soil makes it red."},
      {type:"mc",q:"Read: 'The Moon is smaller than Earth, and Earth is smaller than the Sun.' Which is the LARGEST?",opts:["The Sun","The Moon","The Earth","They are equal"],a:0,why:"If Moon < Earth < Sun, the Sun is largest."},
      {type:"fill",q:"Complete the superlative sentence: 'Of the Moon, Earth and Sun, the Moon is the ___ (small).'",hint:"the + small + -est.",a:["smallest"],why:"small → smallest."}
    ],
    tinhhoa:[
      {type:"mc",q:"REASONING. Scientists say a planet needs liquid water, the right temperature, and air to breathe for humans to live there. Earth has all three; Mars has none of them easily. What can we conclude?",opts:["Living on Mars would be far harder than living on Earth.","Mars is a better home than Earth.","Humans can move to Mars very easily.","Earth and Mars are exactly the same."],a:0,why:"Earth meets all three conditions and Mars meets none easily, so Mars would be far harder to live on."},
      {type:"open",q:"Compare the Earth and the Moon. Write THREE real differences, using comparative words (bigger, brighter, colder…).",hint:"Use 'than' in each comparison and add one 'because' if you can.",model:"The Earth is much bigger than the Moon. The Earth also has air and water, so it is far more comfortable than the Moon, where nobody can breathe. Finally, the Earth is more colourful because it is full of oceans, forests and life, while the Moon is a grey, empty desert of rock and dust."},
      {type:"open",q:"Some people want to spend a lot of money exploring space. Others say we should spend that money fixing problems on Earth first. What do you think? Give your opinion with two reasons.",hint:"Take a side clearly, then justify: 'In my opinion … because …'",model:"In my opinion, we should care for the Earth first, but still explore space a little. We should fix problems here because millions of people need clean water, food and hospitals right now. However, exploring space is also important because it teaches us amazing science and might one day save the human race. The best answer is balance: help people on Earth, but keep dreaming about the stars."}
    ]
  }
},
/* ==================== UNIT 3 — HOMES ==================== */
{
  id:"homes", title:"Homes", desc:"Houses, rooms & where we live",
  focus:"Grammar: infinitive of purpose, modals of possibility (may/might/could) · Skills climb: recall → apply → reason",
  q:{
    chill:[
      {type:"mc",q:"Where do you usually cook food?",opts:["the kitchen","the bedroom","the garden","the garage"],a:0},
      {type:"mc",q:"Where do you sleep?",opts:["the bedroom","the kitchen","the hall","the roof"],a:0},
      {type:"mc",q:"A home high up in a tall building is a ___.",opts:["flat","cottage","tent","cave"],a:0},
      {type:"mc",q:"A home that floats on water is a ___.",opts:["houseboat","treehouse","castle","igloo"],a:0},
      {type:"mc",q:"Where do you have a bath?",opts:["the bathroom","the kitchen","the garden","the attic"],a:0},
      {type:"mc",q:"Where do you park a car?",opts:["the garage","the bedroom","the attic","the balcony"],a:0},
      {type:"mc",q:"'I go to the kitchen ___ make lunch.'",opts:["to","for","because","of"],a:0,why:"'to make' tells us WHY (purpose)."},
      {type:"mc",q:"A small house in the countryside is a ___.",opts:["cottage","skyscraper","factory","station"],a:0}
    ],
    master:[
      {type:"fill",q:"Read: 'Sam keeps his desk near the window.' Why? Complete with a purpose: 'He sits near the window ___ (get) more light.'",hint:"Purpose = to + verb.",a:["to get"],why:"'to get' explains the reason."},
      {type:"fill",q:"Read: 'The sky is grey and full of dark clouds.' Complete with a modal of possibility: 'It ___ rain this afternoon.'",hint:"Use might / may / could (something is possible).",a:["might","may","could"],why:"Dark clouds → rain is possible, so 'might/may/could'."},
      {type:"fill",q:"Complete: 'People who live in very cold places ___ (may / mays) build homes from ice.' Write the correct modal.",hint:"Modals never add -s.",a:["may"],why:"'may build' — modals have no -s."},
      {type:"mc",q:"Read: 'A houseboat can sail to new places, so the family wakes up somewhere different each week.' What is the BEST thing about their houseboat?",opts:["They can travel to different places.","It is the tallest home in town.","It is made of ice.","It never moves at all."],a:0,why:"The text stresses moving to new places."},
      {type:"fill",q:"Read: 'Lena saved her pocket money for a whole year.' Complete the purpose: 'She saved money ___ (buy) a bigger bookshelf.'",hint:"to + verb = purpose.",a:["to buy"],why:"'to buy' = the reason she saved."},
      {type:"mc",q:"Which sentence correctly shows a FUTURE possibility?",opts:["We could move to a new flat next year.","We moved house last week.","We always live here.","We are a flat."],a:0,why:"'could move' = a future possibility."},
      {type:"fill",q:"Complete: 'We open the windows in summer ___ (keep) the house cool.'",hint:"Purpose again — to + verb.",a:["to keep"],why:"'to keep' explains why."}
    ],
    tinhhoa:[
      {type:"mc",q:"REASONING. In very hot deserts, people often build homes with thick walls and small windows. Why does this design make sense?",opts:["Thick walls and small windows keep the hot sun out and the inside cool.","It makes the house look pretty only.","It helps the house float on water.","It lets in as much heat as possible."],a:0,why:"In hot places you want to keep heat OUT, so thick walls and small windows keep the inside cool."},
      {type:"open",q:"Homes look very different around the world — igloos, houseboats, desert houses, tall flats. Explain WHY people build such different homes. Give two reasons with examples.",hint:"Think about weather and the land. Use 'because', 'so', and 'may/might'.",model:"People build different homes because the weather and the land are different everywhere. In very cold places, people may build igloos or strong wooden houses to keep the freezing wind out. In hot deserts, homes have thick walls and small windows so the inside stays cool. Near rivers, families might live on houseboats because the water is their road. The home always fits the place around it."},
      {type:"open",q:"Would you rather live in a floating houseboat or a flat high in a city? Choose one and defend your choice with two reasons, then mention one problem with your choice.",hint:"Give a balanced answer: two strengths and one honest weakness.",model:"I would rather live in a houseboat because I could travel to new places and fall asleep to the sound of water. It would also feel peaceful and close to nature. However, one real problem is that a houseboat might be cold and shaky in winter storms, and it could be hard to get to school on time. Even so, the adventure would be worth it for me."}
    ]
  }
},
/* ==================== UNIT 4 — FOOD ==================== */
{
  id:"food", title:"Food", desc:"Meals, tastes & healthy eating",
  focus:"Grammar: some/any, countable/uncountable, quantifiers (much/many/a lot of) · Skills climb: recall → apply → reason",
  q:{
    chill:[
      {type:"mc",q:"Which meal do you eat in the morning?",opts:["breakfast","dinner","supper","snack"],a:0},
      {type:"mc",q:"Which of these is a fruit?",opts:["banana","carrot","bread","rice"],a:0},
      {type:"mc",q:"Which one is a vegetable?",opts:["carrot","orange","cake","milk"],a:0},
      {type:"mc",q:"Which one do you drink?",opts:["water","bread","cheese","rice"],a:0},
      {type:"mc",q:"'I have ___ apples in my bag.' (positive, plural)",opts:["some","a","an","much"],a:0,why:"'some' with plurals in positive sentences."},
      {type:"mc",q:"'There isn't ___ milk left.' (negative)",opts:["any","some","many","a"],a:0,why:"'any' in negatives."},
      {type:"mc",q:"We use 'many' with things we can ___.",opts:["count","drink only","cook only","see only"],a:0,why:"'many' = countable nouns."},
      {type:"mc",q:"A meal you eat in the evening is ___.",opts:["dinner","breakfast","spoon","plate"],a:0}
    ],
    master:[

/* ============ APP ============ */
const S = {topic:null, level:null, idx:0, answered:false, score:0, results:[]};
const $ = s => document.querySelector(s);
const screens = ['s-topics','s-levels','s-quiz','s-results'];
function show(id){screens.forEach(x=>$('#'+x).classList.toggle('active', x===id));window.scrollTo(0,0);}

/* progress storage */
function loadProg(){try{return JSON.parse(localStorage.getItem('ge4_prog')||'{}')}catch(e){return{}}}
function saveProg(p){try{localStorage.setItem('ge4_prog',JSON.stringify(p))}catch(e){}}
function bestKey(t,l){return t+'::'+l}
function getBest(t,l){return loadProg()[bestKey(t,l)]}
function setBest(t,l,pct){const p=loadProg();const k=bestKey(t,l);if(!p[k]||pct>p[k]){p[k]=pct;saveProg(p);}}

const LVLNAME={chill:'😎 Chill',master:'💪 Master',tinhhoa:'👑 Tinh hoa'};

function starStr(pct){
  if(pct==null) return '';
  if(pct>=90) return '⭐⭐⭐';
  if(pct>=60) return '⭐⭐';
  if(pct>0) return '⭐';
  return '';
}

/* build topic grid */
function renderTopics(){
  const g=$('#topicGrid');g.innerHTML='';
  DATA.forEach((u,i)=>{
    const done=['chill','master','tinhhoa'].map(l=>getBest(u.id,l)).filter(x=>x!=null);
    const avg=done.length?Math.round(done.reduce((a,b)=>a+b,0)/3):null;
    const card=document.createElement('div');card.className='topic';
    card.innerHTML=`<div class="u">Unit ${i+1}</div>
      <div class="t">${u.title}</div>
      <div class="d">${u.desc}</div>
      <div class="prog">${done.length?('Progress: '+starStr(avg)+' '+avg+'% avg'):'Not started yet'}</div>`;
    card.onclick=()=>openLevels(u.id);
    g.appendChild(card);
  });
}

function openLevels(tid){
  S.topic=tid;
  const u=DATA.find(x=>x.id===tid);
  $('#lvlTitle').textContent=u.title;
  $('#lvlDesc').textContent=u.focus;
  ['chill','master','tinhhoa'].forEach(l=>{
    const b=getBest(tid,l);
    $('#star-'+l).textContent=b!=null?(starStr(b)+' best '+b+'%'):'';
  });
  show('s-levels');
}

function startQuiz(level){
  S.level=level;S.idx=0;S.answered=false;S.score=0;S.results=[];
  const u=DATA.find(x=>x.id===S.topic);
  $('#quizTopic').textContent=u.title;
  const pill=$('#quizPill');pill.className='pill '+level;pill.textContent=LVLNAME[level];
  show('s-quiz');renderQ();
}

function curQ(){return DATA.find(x=>x.id===S.topic).q[S.level][S.idx];}
function curSet(){return DATA.find(x=>x.id===S.topic).q[S.level];}

function renderQ(){
  S.answered=false;
  const set=curSet();const q=curQ();
  $('#barFill').style.width=((S.idx)/set.length*100)+'%';
  const body=$('#qbody');
  let html=`<p class="qtext">${S.idx+1}. ${q.q}</p>`;
  if(q.hint) html+=`<p class="qhint">💡 ${q.hint}</p>`;
  if(q.type==='mc'){
    html+='<div class="opts">';
    q.opts.forEach((o,i)=>{html+=`<div class="opt" data-i="${i}"><span class="key">${String.fromCharCode(65+i)}</span><span>${o}</span></div>`;});
    html+='</div>';
  } else if(q.type==='fill'){
    html+=`<input class="text" id="txtIn" autocomplete="off" placeholder="Type your answer…">`;
  } else if(q.type==='open'){
    html+=`<textarea class="text" id="txtIn" placeholder="Write your answer here…"></textarea>`;
  }
  html+=`<div class="feedback" id="fb"></div>`;
  html+=`<div class="model" id="model"></div>`;
  html+=`<div class="qfooter">
      <span></span>
      <button class="btn primary" id="checkBtn">Check</button>
    </div>`;
  body.innerHTML=html;

  if(q.type==='mc'){
    body.querySelectorAll('.opt').forEach(el=>{
      el.onclick=()=>{if(S.answered)return;body.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');};
    });
  }
  $('#checkBtn').onclick=onCheck;
  const ti=$('#txtIn');
  if(ti) ti.addEventListener('keydown',e=>{if(e.key==='Enter'&&q.type==='fill'){e.preventDefault();onCheck();}});
}

function norm(s){return (s||'').trim().toLowerCase().replace(/[.!?,;:"']/g,'').replace(/\s+/g,' ');}

function onCheck(){
  const q=curQ();const btn=$('#checkBtn');const fb=$('#fb');
  if(!S.answered){
    let correct=false, chosen=null;
    if(q.type==='mc'){
      const sel=$('#qbody .opt.sel');
      if(!sel){fb.className='feedback bad show';fb.innerHTML='<b>Pick an answer first 🙂</b>';return;}
      chosen=parseInt(sel.dataset.i,10);correct=(chosen===q.a);
      $('#qbody').querySelectorAll('.opt').forEach((el,i)=>{
        el.style.pointerEvents='none';
        if(i===q.a)el.classList.add('correct');
        else if(i===chosen)el.classList.add('wrong');
      });
    } else if(q.type==='fill'){
      const val=$('#txtIn').value;chosen=val;
      const accepts=Array.isArray(q.a)?q.a:[q.a];
      correct=accepts.some(a=>norm(a)===norm(val));
      $('#txtIn').disabled=true;
      $('#txtIn').style.borderColor=correct?'var(--ok)':'var(--bad)';
    } else if(q.type==='open'){
      // self-assessed: always show model, learner grades themselves
      chosen=$('#txtIn').value;
      $('#txtIn').disabled=true;
    }

    S.answered=true;
    if(q.type==='open'){
      $('#model').className='model show';
      $('#model').innerHTML='<b>✍️ A model answer:</b>'+q.model+
        '<div style="margin-top:10px">Did your answer show the same idea? Be honest!</div>'+
        '<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">'+
        '<button class="btn" id="selfYes">👍 Yes, I got it</button>'+
        '<button class="btn" id="selfClose">🤏 Close</button>'+
        '<button class="btn" id="selfNo">🔁 Not yet</button></div>';
      btn.style.display='none';
      $('#selfYes').onclick=()=>{S.score++;S.results.push({q:q.q,ok:true,self:'got it'});next();};
      $('#selfClose').onclick=()=>{S.score+=0.5;S.results.push({q:q.q,ok:'half',self:'close'});next();};
      $('#selfNo').onclick=()=>{S.results.push({q:q.q,ok:false,self:'not yet'});next();};
      return;
    }

    if(correct){S.score++;fb.className='feedback good show';fb.innerHTML='<b>Correct! 🎉</b>'+(q.why?q.why:'');}
    else{fb.className='feedback bad show';
      const ans=Array.isArray(q.a)?q.a[0]:(q.type==='mc'?q.opts[q.a]:q.a);
      fb.innerHTML='<b>Not quite.</b>The answer is: <b style="display:inline">'+ans+'</b>. '+(q.why?q.why:'');}
    S.results.push({q:q.q,ok:correct});
    btn.textContent=(S.idx===curSet().length-1)?'See results':'Next →';
  } else {
    next();
  }
}

function next(){
  if(S.idx<curSet().length-1){S.idx++;renderQ();}
  else finish();
}

function finish(){
  const total=curSet().length;
  const pct=Math.round(S.score/total*100);
  setBest(S.topic,S.level,pct);
  $('#scoreBig').textContent=pct+'%';
  $('#scoreLbl').textContent='You got '+(Math.round(S.score*10)/10)+' out of '+total;
  $('#scoreStars').textContent=starStr(pct)||'Keep going!';
  let m='';
  if(pct>=90)m='Amazing work! You really know this topic. 🌟';
  else if(pct>=60)m='Great job! A little more practice and you\'ll master it. 💪';
  else m='Good try! Practice makes perfect — give it another go. 🌱';
  $('#scoreMsg').textContent=m;
  const sn=$('#selfNote');
  if(S.level==='tinhhoa'){sn.style.display='block';sn.innerHTML='👑 <b>Tinh hoa</b> answers are graded by you. The most important thing is that you tried to explain your own ideas in English — that\'s how you grow!';}
  else sn.style.display='none';
  show('s-results');
}

/* nav */
$('#backToTopics').onclick=()=>{renderTopics();show('s-topics');};
$('#backToLevels').onclick=()=>openLevels(S.topic);
$('#doneToTopics').onclick=()=>{renderTopics();show('s-topics');};
$('#retry').onclick=()=>startQuiz(S.level);
document.querySelectorAll('.lvl').forEach(b=>b.onclick=()=>startQuiz(b.dataset.lvl));
$('#resetAll').onclick=()=>{if(confirm('Reset all saved progress?')){localStorage.removeItem('ge4_prog');renderTopics();}};

renderTopics();
</script>
