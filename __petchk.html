<!DOCTYPE html><html><head><meta charset="utf-8"><style>  :root{
    /* Modern game palette — vivid but soft enough for young eyes */
    --pink:#ff6fa5; --pink-light:#ffe3ef; --purple:#8b7bf0; --purple-light:#eee9ff;
    --yellow:#ffc94d; --yellow-light:#fff3d4; --green:#34d399; --green-dark:#0f9d63;
    --red:#ff6b81; --text:#382a56; --text-light:#7a6ba6; --muted:#8b7ba5; --white:#ffffff;
    /* Glassmorphism surfaces */
    --glass:rgba(255,255,255,.66);
    --glass-strong:rgba(255,255,255,.82);
    --glass-brd:rgba(255,255,255,.85);
    --glass-blur:saturate(180%) blur(16px);
    /* Layered depth shadows + neon glows */
    --shadow:0 14px 34px rgba(96,64,170,.20), 0 3px 10px rgba(96,64,170,.12);
    --shadow-soft:0 6px 18px rgba(96,64,170,.14);
    --inner-hi:inset 0 1px 0 rgba(255,255,255,.9);
    --glow-pink:0 8px 26px rgba(255,111,165,.5);
    --glow-purple:0 8px 26px rgba(139,123,240,.5);
    --glow-yellow:0 8px 24px rgba(255,201,77,.55);
    --glow-green:0 8px 24px rgba(52,211,153,.5);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%; text-size-adjust:100%;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    color:var(--text); min-height:100vh; min-height:100dvh;
    font-size:clamp(17px,2.2vw,20px); line-height:1.45;
    touch-action:manipulation; overscroll-behavior:none;
    position:relative; overflow-x:hidden;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    /* Aurora backdrop: coloured light-blooms over a soft gradient */
    background:
      radial-gradient(1100px 620px at 12% 8%, rgba(255,180,220,.55), transparent 60%),
      radial-gradient(1000px 560px at 88% 4%, rgba(150,190,255,.55), transparent 58%),
      radial-gradient(1200px 700px at 50% 108%, rgba(150,240,210,.5), transparent 60%),
      linear-gradient(160deg,#efe6ff 0%,#e8f0ff 48%,#ffeaf6 100%);
    background-attachment:fixed;
  }
  /* Two big blurred orbs drift behind everything for real depth */
  body::before,body::after{
    content:"";position:fixed;z-index:-1;border-radius:50%;
    filter:blur(46px);opacity:.55;pointer-events:none;
  }
  body::before{width:340px;height:340px;left:-90px;top:6%;
    background:radial-gradient(circle at 35% 35%,#ffb4d8,#ff8ec2 60%,transparent 72%);
    animation:orbA 20s ease-in-out infinite;}
  body::after{width:400px;height:400px;right:-120px;bottom:2%;
    background:radial-gradient(circle at 60% 40%,#a8ffe6,#7fdcff 60%,transparent 72%);
    animation:orbB 26s ease-in-out infinite;}
  @keyframes orbA{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,30px) scale(1.12)}}
  @keyframes orbB{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-40px,-26px) scale(1.1)}}

  #app{max-width:760px;margin:0 auto;padding:16px 16px 40px;position:relative;z-index:1;}
  .icon{width:1.35em;height:1.35em;vertical-align:-0.3em;}
  .icon-lg{width:56px;height:56px;}
  .icon-xl{width:88px;height:88px;filter:drop-shadow(0 6px 12px rgba(96,64,170,.28));}
  h1{
    font-size:clamp(27px,5vw,40px);margin:8px 0 4px;text-align:center;font-weight:900;
    letter-spacing:-.01em;
    background:linear-gradient(120deg,#ff6fa5 0%,#8b7bf0 55%,#34d399 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 3px 10px rgba(139,123,240,.28));
  }
  h1 .icon{-webkit-text-fill-color:initial;vertical-align:-0.35em;}
  .subtitle{text-align:center;color:var(--text-light);margin:0 0 20px;font-size:.95em;font-weight:600;}
  .card{
    background:var(--glass);
    -webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);
    border:1px solid var(--glass-brd);border-radius:26px;
    box-shadow:var(--shadow),var(--inner-hi);padding:16px;margin-bottom:14px;
  }
  button{font-family:inherit;color:inherit;}
  .btn{
    display:flex;align-items:center;justify-content:center;gap:12px;width:100%;
    min-height:64px;padding:14px 20px;border:none;border-radius:22px;
    font-size:clamp(18px,2.6vw,22px);font-weight:800;cursor:pointer;position:relative;overflow:hidden;
    box-shadow:var(--shadow-soft);transition:transform .12s cubic-bezier(.22,1,.36,1),box-shadow .2s,filter .2s;
    -webkit-user-select:none;user-select:none;isolation:isolate;
  }
  /* Glossy top highlight on every solid button */
  .btn::before{content:"";position:absolute;inset:0;border-radius:inherit;z-index:-1;
    background:linear-gradient(180deg,rgba(255,255,255,.38),rgba(255,255,255,0) 46%);pointer-events:none;}
  .btn:active{transform:scale(.96) translateY(1px);}
  .btn-pink{background:linear-gradient(135deg,#ff9ac4,#ff5f9c);color:#fff;box-shadow:var(--glow-pink),var(--inner-hi);}
  .btn-purple{background:linear-gradient(135deg,#b0a2ff,#8365f2);color:#fff;box-shadow:var(--glow-purple),var(--inner-hi);}
  .btn-yellow{background:linear-gradient(135deg,#ffe08a,#ffc327);color:#6b4e00;box-shadow:var(--glow-yellow),var(--inner-hi);}
  .btn-green{background:linear-gradient(135deg,#7bf0c0,#22c885);color:#065f3c;box-shadow:var(--glow-green),var(--inner-hi);}
  .btn-ghost{background:var(--glass-strong);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);
    color:var(--text);border:1px solid var(--glass-brd);box-shadow:var(--shadow-soft),var(--inner-hi);}
  .btn-small{min-height:48px;font-size:16px;width:auto;padding:8px 18px;border-radius:16px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
  .topbar .title{font-weight:900;font-size:1.05em;display:flex;align-items:center;gap:8px;min-width:0;}
  .topbar .title span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
  .topic-card{
    background:var(--glass);
    -webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);
    border:1px solid var(--glass-brd);border-radius:24px;box-shadow:var(--shadow-soft),var(--inner-hi);
    padding:18px 10px 14px;text-align:center;cursor:pointer;transition:transform .12s,box-shadow .2s;
  }
  .topic-card:active{transform:scale(.95);}
  .topic-card .nameEn{font-weight:900;font-size:.95em;margin-top:8px;}
  .topic-card .nameVi{color:var(--text-light);font-size:.8em;margin-top:2px;font-weight:600;}
  .topic-card .stat{font-size:.75em;color:var(--purple);margin-top:6px;font-weight:800;}
  .qimg{display:block;margin:6px auto;width:clamp(78px,17vw,124px);height:auto;filter:drop-shadow(0 8px 16px rgba(96,64,170,.22));}
  .qtext{font-size:clamp(19px,2.8vw,24px);font-weight:800;white-space:pre-line;margin:4px 0 10px;}
  .passage{
    background:linear-gradient(180deg,rgba(238,233,255,.9),rgba(232,240,255,.9));
    border:1px solid var(--glass-brd);
    border-radius:20px;padding:16px;margin-bottom:14px;
    white-space:pre-line;font-size:clamp(17px,2.4vw,21px);max-height:38vh;overflow-y:auto;
    -webkit-overflow-scrolling:touch;box-shadow:var(--inner-hi);
  }
  .passage b{color:var(--purple);}
  .opts{display:grid;gap:10px;grid-template-columns:1fr;}
  /* short-answer questions go 2-up even on phones, so 4 options = 2 rows not 4 */
  @media(min-width:360px){.opts.short{grid-template-columns:1fr 1fr;}}
  .opt{
    display:flex;align-items:center;gap:10px;text-align:left;
    min-height:54px;padding:10px 14px;border-radius:16px;border:2px solid rgba(255,255,255,.7);
    background:var(--glass-strong);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);
    font-size:clamp(18px,2.6vw,22px);font-weight:700;cursor:pointer;
    box-shadow:var(--shadow-soft),var(--inner-hi);transition:transform .1s,border-color .2s,box-shadow .2s;
    word-break:break-word;
  }
  .opt:active{transform:scale(.98);}
  .opt .letter{
    flex:0 0 40px;height:40px;border-radius:50%;
    background:linear-gradient(135deg,#b0a2ff,#8365f2);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:900;
    box-shadow:0 3px 8px rgba(139,123,240,.4);
  }
  .opt.correct{background:linear-gradient(135deg,#dff9f0,#c6f7de);border-color:var(--green);box-shadow:var(--glow-green);}
  .opt.correct .letter{background:linear-gradient(135deg,#5ee3a5,#22c885);}
  .opt.wrong{background:linear-gradient(135deg,#ffe4e8,#ffd4da);border-color:var(--red);}
  .opt.wrong .letter{background:linear-gradient(135deg,#ff97a6,#ff5f77);}
  .opt.picked{border-color:var(--purple);background:var(--purple-light);}
  .opt:disabled{cursor:default;opacity:1;color:inherit;}
  .feedback{
    text-align:center;font-size:clamp(20px,3vw,26px);font-weight:900;border-radius:20px;
    padding:14px;margin-top:14px;box-shadow:var(--inner-hi);
  }
  .feedback.good{background:linear-gradient(135deg,#d6f9e8,#b9f3d5);color:var(--green-dark);}
  .feedback.bad{background:linear-gradient(135deg,#ffe0e6,#ffd0d8);color:#c02b45;}
  .feedback .sub{font-size:.7em;font-weight:700;margin-top:4px;color:var(--text-light);}
  @keyframes pop{0%{transform:scale(.7);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .progressbar{height:14px;background:rgba(255,255,255,.7);border-radius:10px;overflow:hidden;
    box-shadow:inset 0 2px 5px rgba(96,64,170,.16);flex:1;border:1px solid rgba(255,255,255,.7);}
  .progressbar>div{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple));border-radius:10px;transition:width .35s cubic-bezier(.22,1,.36,1);}
  .statrow{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
  .pill{
    background:var(--glass-strong);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);
    border:1px solid var(--glass-brd);border-radius:999px;padding:7px 15px;font-weight:800;font-size:.9em;
    box-shadow:var(--shadow-soft),var(--inner-hi);display:flex;align-items:center;gap:6px;white-space:nowrap;
  }
  .pill.timer-low{background:linear-gradient(135deg,#ffe0e6,#ffccd4);color:#c02b45;}
  .home-stars{display:flex;justify-content:center;gap:14px;margin:14px 0;flex-wrap:wrap;}
  .bigmenu{display:grid;gap:16px;margin-top:18px;}
  .bigmenu .btn{min-height:84px;font-size:clamp(20px,3vw,26px);}
  table{width:100%;border-collapse:collapse;font-size:.85em;}
  th,td{padding:9px 6px;text-align:left;border-bottom:1px solid rgba(139,123,240,.16);}
  th{color:var(--text-light);font-size:.8em;text-transform:uppercase;letter-spacing:.04em;}
  .score-big{font-size:clamp(44px,9vw,64px);font-weight:900;text-align:center;margin:6px 0;
    background:linear-gradient(120deg,#8b7bf0,#ff6fa5);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .center{text-align:center;}
  .muted{color:var(--text-light);font-size:.85em;}
  .review-item{border-left:5px solid var(--red);background:rgba(255,247,248,.85);border-radius:14px;padding:10px 14px;margin-bottom:10px;font-size:.9em;box-shadow:var(--shadow-soft);}
  .review-item.ok{border-left-color:var(--green);background:rgba(242,252,245,.85);}
  .review-item .rq{font-weight:800;white-space:pre-line;}
  .confetti{position:fixed;top:-60px;pointer-events:none;z-index:99;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.9;}}
  .navrow{display:flex;gap:12px;margin-top:16px;}
  .navrow .btn{flex:1;}
  .testnums{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
  .testnums button{
    width:44px;height:44px;border-radius:14px;border:2px solid rgba(255,255,255,.7);
    background:var(--glass-strong);font-weight:900;font-size:15px;cursor:pointer;
    box-shadow:var(--shadow-soft);transition:transform .1s;
  }
  .testnums button:active{transform:scale(.92);}
  .testnums button.done{background:linear-gradient(135deg,#b0a2ff,#8365f2);border-color:transparent;color:#fff;}
  .testnums button.cur{border-color:var(--pink);box-shadow:0 0 0 3px var(--pink-light),var(--glow-pink);}
  .mark2{display:inline-block;background:var(--yellow-light);color:#8a6400;border-radius:8px;font-size:.65em;padding:2px 8px;font-weight:800;vertical-align:middle;}
  /* ===== difficulty mode cards ===== */
  .mode-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-top:18px;}
  @media(min-width:520px){.mode-grid{grid-template-columns:1fr 1fr;}}
  @media(min-width:760px){
    .mode-grid{grid-template-columns:repeat(3,1fr);gap:14px;}
    .mode-grid .mode-card img.photo{height:150px;}
    .mode-grid .mode-card .mname{font-size:1.02em;}
    .mode-grid .mode-card .mdesc{font-size:.78em;}
    .mode-grid .mode-card .mbody{padding:10px 14px 12px;}
  }
  .mode-card{
    position:relative;border:none;border-radius:26px;overflow:hidden;
    box-shadow:var(--shadow),var(--inner-hi);cursor:pointer;padding:0;
    background:var(--glass);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);
    text-align:left;transition:transform .14s,box-shadow .25s;
  }
  .mode-card::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    border:3px solid transparent;transition:border-color .2s;}
  .mode-card:active{transform:scale(.97);}
  .mode-card img.photo{width:100%;height:180px;object-fit:cover;display:block;}
  .mode-card .mbody{padding:12px 16px 14px;}
  .mode-card .mname{font-weight:900;font-size:1.15em;}
  .mode-card .mdesc{color:var(--text-light);font-size:.82em;margin-top:3px;font-weight:600;}
  .mode-card.chill::after{border-color:#34d399;}
  .mode-card.master::after{border-color:#8b7bf0;}
  .mode-card.elite::after{border-color:#f0b429;}
  .mode-badge{
    display:inline-block;border-radius:999px;padding:2px 10px;font-size:.72em;font-weight:800;
    vertical-align:middle;white-space:nowrap;
  }
  .mode-badge.chill{background:#dbfaea;color:var(--green-dark);}
  .mode-badge.master{background:var(--purple-light);color:#6b57d6;}
  .mode-badge.elite{background:#fff1cf;color:#b3730a;}
  .mode-pill-img{width:26px;height:26px;border-radius:50%;object-fit:cover;vertical-align:-0.45em;margin-right:6px;}
  /* floating sound on/off button */
  .sound-toggle{
    position:fixed;top:12px;right:12px;z-index:50;
    width:48px;height:48px;border-radius:50%;border:1px solid var(--glass-brd);cursor:pointer;
    background:var(--glass-strong);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);
    box-shadow:var(--shadow-soft),var(--inner-hi);font-size:22px;line-height:1;
    display:flex;align-items:center;justify-content:center;transition:transform .1s;
  }
  .sound-toggle:active{transform:scale(.9);}
  .sound-toggle.off{opacity:.6;}
  @media(min-width:760px){.sound-toggle{top:16px;right:16px;}}

  /* ===================== iPad / tablet tuning ===================== */
  @media(min-width:768px){
    #app{max-width:840px; padding:22px 22px 48px;}
    .card{padding:24px;}
    .btn{min-height:70px;}
    .opt{min-height:68px; padding:14px 18px;}
    .qtext{margin:8px 0 18px;}
    .grid{grid-template-columns:repeat(auto-fill,minmax(168px,1fr)); gap:18px;}
    .testnums button{width:48px;height:48px;font-size:16px;}
    .sound-toggle{width:54px;height:54px;font-size:25px;}
    .passage{max-height:46vh; padding:18px 20px;}
  }
  @media(min-width:768px) and (orientation:landscape){
    #app{max-width:900px;}
    .passage{max-height:34vh;}
  }
  @media(min-width:1000px){
    #app{max-width:920px;}
  }

  /* Short viewports (most phones in portrait): compress the quiz so a question —
     even with the Star of Hope box — fits on one screen without scrolling. */
  @media(max-height:780px){
    #app{padding:10px 14px 20px;}
    .scene{height:clamp(74px,12vh,112px);margin:2px 0 8px;}
    .card{padding:12px;margin-bottom:10px;}
    .qtext{margin:2px 0 8px;font-size:clamp(17px,2.5vw,21px);}
    .qimg{width:clamp(64px,13vw,100px);margin:3px auto;}
    .opt{min-height:46px;padding:7px 12px;}
    .opts{gap:8px;}
    .opt .letter{flex:0 0 32px;height:32px;}
    .statrow{margin-bottom:6px;}
    .topbar{margin-bottom:7px;}
    .hope-box{margin:6px 0;padding:7px 10px;}
    .hope-box .hs{margin-bottom:5px;}
    .passage{max-height:26vh;}
  }
  @media(max-height:640px){
    .scene{height:64px;}
    .opt{min-height:42px;}
    .qtext{font-size:16px;}
  }

  /* ===================== animations & polish ===================== */
  #app{animation:screenIn .42s cubic-bezier(.22,1,.36,1);}
  @keyframes screenIn{
    from{opacity:0; transform:translateY(14px) scale(.99);}
    to{opacity:1; transform:none;}
  }
  h1{animation:titlePop .5s cubic-bezier(.34,1.56,.64,1);}
  @keyframes titlePop{ from{opacity:0; transform:scale(.9) translateY(-6px);} to{opacity:1; transform:none;} }

  @keyframes riseIn{ from{opacity:0; transform:translateY(18px) scale(.96);} to{opacity:1; transform:none;} }
  .bigmenu .btn, .grid .topic-card, .mode-grid .mode-card, .opts .opt{
    animation:riseIn .45s both cubic-bezier(.22,1,.36,1);
  }
  .bigmenu .btn:nth-child(1){animation-delay:.04s;} .bigmenu .btn:nth-child(2){animation-delay:.10s;} .bigmenu .btn:nth-child(3){animation-delay:.16s;}
  .bigmenu .btn:nth-child(4){animation-delay:.22s;} .bigmenu .btn:nth-child(5){animation-delay:.28s;}
  .mode-grid .mode-card:nth-child(1){animation-delay:.05s;} .mode-grid .mode-card:nth-child(2){animation-delay:.16s;} .mode-grid .mode-card:nth-child(3){animation-delay:.27s;}
  .grid .topic-card:nth-child(1){animation-delay:.02s;} .grid .topic-card:nth-child(2){animation-delay:.06s;}
  .grid .topic-card:nth-child(3){animation-delay:.10s;} .grid .topic-card:nth-child(4){animation-delay:.14s;}
  .grid .topic-card:nth-child(5){animation-delay:.18s;} .grid .topic-card:nth-child(6){animation-delay:.22s;}
  .grid .topic-card:nth-child(7){animation-delay:.26s;} .grid .topic-card:nth-child(8){animation-delay:.30s;}
  .grid .topic-card:nth-child(9){animation-delay:.34s;} .grid .topic-card:nth-child(10){animation-delay:.38s;}
  .grid .topic-card:nth-child(11){animation-delay:.42s;} .grid .topic-card:nth-child(12){animation-delay:.46s;}
  .opts .opt:nth-child(1){animation-delay:.03s;} .opts .opt:nth-child(2){animation-delay:.09s;}
  .opts .opt:nth-child(3){animation-delay:.15s;} .opts .opt:nth-child(4){animation-delay:.21s;}

  .topic-card, .mode-card, .btn, .opt{ will-change:transform; }
  @media(hover:hover){
    .topic-card:hover{transform:translateY(-6px) scale(1.02); box-shadow:0 20px 40px rgba(96,64,170,.28),var(--inner-hi);}
    .mode-card:hover{transform:translateY(-7px) scale(1.02); box-shadow:0 26px 48px rgba(96,64,170,.32),var(--inner-hi);}
    .btn:hover{transform:translateY(-3px); filter:brightness(1.05);}
    .opt:hover{border-color:var(--purple); transform:translateY(-3px); box-shadow:var(--glow-purple);}
    .topic-card, .mode-card, .btn, .opt{transition:transform .2s cubic-bezier(.22,1,.36,1), box-shadow .22s, border-color .2s, filter .2s;}
  }
  .mode-card img.photo{transition:transform .45s ease;}
  @media(hover:hover){ .mode-card:hover img.photo{transform:scale(1.07);} }

  .bigmenu .btn{position:relative; overflow:hidden;}
  .bigmenu .btn::after{
    content:""; position:absolute; top:0; left:-60%; width:40%; height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.6),transparent);
    transform:skewX(-18deg); animation:sheen 4.5s ease-in-out infinite;
  }
  @keyframes sheen{ 0%,60%{left:-60%;} 85%,100%{left:130%;} }

  .qimg{animation:floaty 3.2s ease-in-out infinite;}
  @keyframes floaty{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-7px);} }

  .opt.correct{animation:correctPulse .5s ease;}
  @keyframes correctPulse{ 0%{transform:scale(1);} 35%{transform:scale(1.05);} 100%{transform:scale(1);} }
  .opt.wrong{animation:wrongShake .4s ease;}
  @keyframes wrongShake{ 0%,100%{transform:translateX(0);} 20%{transform:translateX(-7px);} 40%{transform:translateX(6px);} 60%{transform:translateX(-4px);} 80%{transform:translateX(3px);} }

  .feedback{animation:fbPop .45s cubic-bezier(.34,1.56,.64,1);}
  @keyframes fbPop{ 0%{transform:scale(.6) translateY(8px); opacity:0;} 60%{transform:scale(1.04);} 100%{transform:scale(1) translateY(0); opacity:1;} }

  .home-stars .pill:first-child img{animation:starSpin 3.5s ease-in-out infinite;}

  .bag-item.locked .be{filter:grayscale(1) opacity(.55);box-shadow:inset 0 2px 5px rgba(255,255,255,.7), 0 0 0 2px rgba(160,150,185,.4);animation:none}
  .bag-item.locked .be img.item-art-img,.bag-item.locked .be svg{filter:grayscale(1) brightness(1.1) opacity(.4)}
  .bag-item:not(.locked) .be{transition:transform .18s}
  .bag-item:not(.locked):hover .be{transform:translateY(-3px) scale(1.07)}
  /* corner rarity pip */
  .bag-item::after{content:"";position:absolute;top:9px;right:11px;width:10px;height:10px;border-radius:50%;box-shadow:0 0 0 2px rgba(255,255,255,.85),0 1px 3px rgba(0,0,0,.2);z-index:3}
  .bag-item.r-common::after{background:#34d399}
  .bag-item.r-rare::after{background:#5b8def}
  .bag-item.r-epic::after{background:#9b7df7}
  .bag-item.r-legendary::after{background:radial-gradient(circle at 40% 35%,#ffe58a,#f0a500)}
  .bag-item.locked::after{background:#c8c2d6;box-shadow:0 0 0 2px rgba(255,255,255,.55)}
  /* shop art: pedestal + rarity ring on the card */
  .shop-art-img{width:82px;height:82px;object-fit:contain;filter:drop-shadow(0 5px 8px rgba(96,64,170,.25))}
  .shop-art-wrap{position:relative;overflow:hidden}
  .shop-art-wrap::after{content:"";position:absolute;left:50%;bottom:7px;transform:translateX(-50%);width:52px;height:9px;border-radius:50%;background:rgba(96,64,170,.16);filter:blur(3px)}
  .shop-card:not(.equipped).r-rare{box-shadow:var(--shadow-soft),0 0 0 2px rgba(91,141,239,.38),var(--inner-hi)}
  .shop-card:not(.equipped).r-epic{box-shadow:var(--shadow-soft),0 0 14px rgba(155,125,247,.4),0 0 0 2px rgba(155,125,247,.5),var(--inner-hi)}
  .shop-card:not(.equipped).r-legendary{box-shadow:var(--shadow-soft),0 0 20px rgba(255,201,77,.55),0 0 0 2px rgba(240,165,0,.6),var(--inner-hi)}
  .rewardpop .item-art{width:24px;height:24px;vertical-align:middle}

  @media(prefers-reduced-motion:reduce){
    *:not(.scene *):not(.scene):not(.rewardpop span):not(.coin){
      animation-duration:.001s !important; animation-iteration-count:1 !important;}
    body::before,body::after{animation:none;}
  }
