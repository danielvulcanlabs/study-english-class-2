<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<title>English Fun - Grade 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* Fancy candy-glass: coral rose + seafoam + champagne */
    --pink:#ff5d8f; --pink-light:#ffe8f1; --purple:#6aa8ff; --purple-light:#e8f2ff;
    --yellow:#ffc44d; --yellow-light:#fff6d9; --green:#2ecf9a; --green-dark:#149a70;
    --red:#ff6b88; --text:#3d2f3a; --text-light:#8a7484; --muted:#a9919f; --white:#ffffff;
    --surface:rgba(255,255,255,.78); --surface-2:rgba(255,245,250,.85); --border:rgba(255,255,255,.65);
    --ink:#3d2f3a; --gold:#e8a820; --gold-soft:#fff0c2;
    --glass:linear-gradient(155deg,rgba(255,255,255,.92) 0%,rgba(255,240,248,.86) 42%,rgba(232,255,248,.88) 100%);
    --glass-strong:rgba(255,255,255,.92);
    --glass-brd:rgba(255,140,180,.28);
    --glass-blur:blur(18px) saturate(1.35);
    --shadow:0 8px 28px rgba(255,93,143,.14), 0 2px 8px rgba(61,47,58,.06);
    --shadow-soft:0 4px 16px rgba(255,93,143,.10), 0 1px 4px rgba(61,47,58,.04);
    --inner-hi:inset 0 1px 0 rgba(255,255,255,.85), inset 0 -1px 0 rgba(255,140,180,.08);
    --glow-pink:0 10px 28px rgba(255,93,143,.38);
    --glow-purple:0 10px 28px rgba(106,168,255,.34);
    --glow-yellow:0 10px 28px rgba(255,196,77,.40);
    --glow-green:0 10px 28px rgba(46,207,154,.34);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%; text-size-adjust:100%;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Quicksand",system-ui,sans-serif;
    font-weight:500;
    color:var(--text); min-height:100vh; min-height:100dvh;
    font-size:clamp(17px,2.2vw,20px); line-height:1.45;
    touch-action:manipulation; overscroll-behavior:none;
    position:relative; overflow-x:hidden;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    background:
      radial-gradient(980px 560px at 0% -8%, rgba(255,120,170,.38), transparent 56%),
      radial-gradient(860px 500px at 100% -4%, rgba(80,220,180,.32), transparent 54%),
      radial-gradient(720px 420px at 85% 100%, rgba(255,196,77,.22), transparent 52%),
      radial-gradient(640px 380px at 10% 90%, rgba(106,168,255,.18), transparent 50%),
      linear-gradient(165deg,#fff0f6 0%,#eefcff 42%,#fff8ec 100%);
    background-attachment:fixed;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,.55) 0 1.5px, transparent 2px),
      radial-gradient(circle at 70% 60%, rgba(255,255,255,.4) 0 1px, transparent 2px),
      radial-gradient(circle at 40% 80%, rgba(255,180,210,.35) 0 1.2px, transparent 2px);
    background-size:120px 120px, 90px 90px, 140px 140px;
    animation:sparkleDrift 22s linear infinite;
    opacity:.7;
  }
  body::after{
    content:"";position:fixed;pointer-events:none;z-index:0;border-radius:50%;
    width:min(480px,80vw);height:min(480px,80vw);top:-12%;right:-16%;
    background:radial-gradient(circle,rgba(255,200,230,.55),rgba(120,230,200,.2) 45%,transparent 70%);
    filter:blur(8px);
    animation:orbFloat 16s ease-in-out infinite alternate;
  }
  @keyframes orbFloat{
    from{transform:translate(0,0) scale(1);}
    to{transform:translate(-24px,28px) scale(1.08);}
  }
  @keyframes sparkleDrift{
    from{background-position:0 0, 0 0, 0 0;}
    to{background-position:120px 80px, -90px 60px, 70px -100px;}
  }

  #app{max-width:760px;margin:0 auto;padding:16px 16px 40px;position:relative;z-index:1;}
  .icon{width:1.35em;height:1.35em;vertical-align:-0.3em;}
  .icon-lg{width:56px;height:56px;}
  .icon-xl{width:88px;height:88px;filter:drop-shadow(0 8px 18px rgba(255,93,143,.28));}
  h1{
    font-family:"Fraunces",Georgia,serif;
    font-size:clamp(32px,5.8vw,48px);margin:10px 0 8px;text-align:center;font-weight:700;
    letter-spacing:-.03em;
    background:linear-gradient(115deg,#ff5d8f 0%,#ff9a5c 38%,#2ecf9a 78%,#6aa8ff 100%);
    background-size:200% auto;
    -webkit-background-clip:text;background-clip:text;color:transparent;
    animation:titleShine 6s ease-in-out infinite;
    filter:drop-shadow(0 2px 10px rgba(255,93,143,.18));
  }
  @keyframes titleShine{
    0%,100%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
  }
  h1 .icon{vertical-align:-0.32em;filter:none;-webkit-text-fill-color:initial;color:initial;}
  .subtitle{text-align:center;color:var(--text-light);margin:0 0 24px;font-size:.95em;font-weight:500;}
  .card{
    background:var(--glass);
    backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
    border:1.5px solid var(--glass-brd);border-radius:22px;
    box-shadow:var(--shadow), var(--inner-hi);padding:18px;margin-bottom:14px;
    position:relative;overflow:hidden;
  }
  .card::before{
    content:"";position:absolute;left:12%;right:12%;top:0;height:3px;border-radius:0 0 8px 8px;
    background:linear-gradient(90deg,transparent,#ff5d8f,#ffc44d,#2ecf9a,transparent);
    opacity:.85;
  }
  button{font-family:inherit;color:inherit;}
  .btn{
    display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
    min-height:58px;padding:12px 20px;border:none;border-radius:16px;
    font-size:clamp(17px,2.5vw,21px);font-weight:700;cursor:pointer;position:relative;overflow:hidden;
    letter-spacing:.015em;
    box-shadow:0 1px 0 rgba(255,255,255,.45) inset, 0 6px 18px rgba(61,47,58,.08);
    transition:transform .16s ease, box-shadow .22s ease, filter .15s ease, background .2s ease;
    -webkit-user-select:none;user-select:none;isolation:isolate;
  }
  .btn::before{
    content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:linear-gradient(180deg,rgba(255,255,255,.38) 0%,rgba(255,255,255,.06) 38%,transparent 58%);
  }
  .btn::after{
    content:"";position:absolute;top:0;left:-40%;width:38%;height:100%;pointer-events:none;
    background:linear-gradient(105deg,transparent,rgba(255,255,255,.38),transparent);
    transform:skewX(-18deg);animation:btnSheen 4.2s ease-in-out infinite;
  }
  @keyframes btnSheen{
    0%,70%{left:-45%;opacity:0;}
    75%{opacity:.9;}
    100%{left:125%;opacity:0;}
  }
  .btn:active{transform:scale(.975) translateY(1px);filter:brightness(.97);}
  .btn-pink{
    background:linear-gradient(165deg,#ffb0cd 0%,#ff6b9a 52%,#f44d82 100%);color:#fff;
    box-shadow:0 1px 0 rgba(255,255,255,.4) inset, 0 8px 22px rgba(255,93,143,.32);
  }
  .btn-purple{
    background:linear-gradient(165deg,#b4d0ff 0%,#7ab4ff 52%,#5a98f0 100%);color:#fff;
    box-shadow:0 1px 0 rgba(255,255,255,.4) inset, 0 8px 22px rgba(106,168,255,.30);
  }
  .btn-yellow{
    background:linear-gradient(165deg,#ffe9a8 0%,#ffd06a 52%,#f5b83a 100%);color:#6a4808;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset, 0 8px 22px rgba(255,196,77,.34);
  }
  .btn-green{
    background:linear-gradient(165deg,#8ef0ce 0%,#3ed9a8 52%,#22c08f 100%);color:#fff;
    box-shadow:0 1px 0 rgba(255,255,255,.4) inset, 0 8px 22px rgba(46,207,154,.30);
  }
  .btn-ghost{
    background:linear-gradient(165deg,rgba(255,255,255,.97),rgba(255,244,250,.92));
    color:var(--ink);border:1.5px solid rgba(255,140,180,.28);
    box-shadow:0 1px 0 rgba(255,255,255,.7) inset, 0 4px 14px rgba(61,47,58,.05);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  }
  .btn-ghost::after{animation:none;opacity:0;}
  .btn-small{
    min-height:42px;font-size:15px;width:auto;padding:8px 16px;border-radius:12px;
    letter-spacing:.02em;gap:6px;
  }
  .btn:disabled{cursor:not-allowed;filter:grayscale(.15) brightness(.96);}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
  .topbar .title{font-family:"Fraunces",Georgia,serif;font-weight:700;font-size:1.08em;display:flex;align-items:center;gap:8px;min-width:0;color:var(--ink);}
  .topbar .title span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
  .topic-card{
    background:linear-gradient(165deg,rgba(255,255,255,.95) 0%,rgba(255,236,245,.9) 100%);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1.5px solid rgba(255,140,180,.32);border-radius:20px;
    box-shadow:var(--shadow-soft), var(--inner-hi);
    padding:18px 10px 14px;text-align:center;cursor:pointer;transition:transform .16s,box-shadow .22s,border-color .2s;
    position:relative;overflow:hidden;
  }
  .topic-card::after{
    content:"";position:absolute;inset:auto -20% -40% -20%;height:55%;
    background:radial-gradient(ellipse at center,rgba(255,120,170,.16),transparent 70%);
    pointer-events:none;
  }
  .topic-card:nth-child(3n+2){
    background:linear-gradient(165deg,rgba(255,255,255,.95) 0%,rgba(220,255,242,.9) 100%);
    border-color:rgba(46,207,154,.32);
  }
  .topic-card:nth-child(3n){
    background:linear-gradient(165deg,rgba(255,255,255,.95) 0%,rgba(255,244,214,.92) 100%);
    border-color:rgba(255,196,77,.38);
  }
  .topic-card:active{transform:scale(.97);}
  .topic-card .nameEn{font-weight:700;font-size:.95em;margin-top:8px;color:var(--ink);}
  .topic-card .nameVi{color:var(--text-light);font-size:.8em;margin-top:2px;font-weight:500;}
  .topic-card .stat{font-size:.75em;color:var(--green-dark);margin-top:6px;font-weight:700;}
  .qimg{display:block;margin:6px auto;width:clamp(78px,17vw,124px);height:auto;filter:drop-shadow(0 8px 16px rgba(255,93,143,.18));}
  .qtext{font-size:clamp(19px,2.8vw,24px);font-weight:600;white-space:pre-line;margin:4px 0 10px;color:var(--ink);}
  .passage{
    background:linear-gradient(165deg,rgba(255,255,255,.9),rgba(232,255,248,.85));
    border:1.5px solid rgba(46,207,154,.25);
    border-radius:18px;padding:16px;margin-bottom:14px;
    white-space:pre-line;font-size:clamp(17px,2.4vw,21px);max-height:38vh;overflow-y:auto;
    -webkit-overflow-scrolling:touch;box-shadow:var(--inner-hi);
  }
  .passage b{color:var(--green-dark);}
  .opts{display:grid;gap:10px;grid-template-columns:1fr;}
  @media(min-width:360px){.opts.short{grid-template-columns:1fr 1fr;}}
  .opt{
    display:flex;align-items:center;gap:10px;text-align:left;
    min-height:54px;padding:10px 14px;border-radius:16px;border:1.5px solid rgba(255,160,200,.28);
    background:linear-gradient(165deg,rgba(255,255,255,.96),rgba(255,245,250,.9));
    font-size:clamp(18px,2.6vw,22px);font-weight:600;cursor:pointer;
    box-shadow:var(--shadow-soft), var(--inner-hi);transition:transform .12s,border-color .2s,box-shadow .2s,background .15s;
    word-break:break-word;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  }
  .opt:active{transform:scale(.98);}
  .opt .letter{
    flex:0 0 40px;height:40px;border-radius:13px;
    background:linear-gradient(145deg,#ffe0ec,#ffd0e4);color:var(--ink);border:1.5px solid rgba(255,140,180,.4);
    display:flex;align-items:center;justify-content:center;font-weight:700;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.7);
  }
  .opt.correct{background:linear-gradient(165deg,#e8fff5,#c8f8e4);border-color:var(--green);box-shadow:0 6px 20px rgba(46,207,154,.28);}
  .opt.correct .letter{background:linear-gradient(145deg,#7aefc4,#2ecf9a);color:#fff;border-color:var(--green);}
  .opt.wrong{background:linear-gradient(165deg,#fff5f7,#ffdce4);border-color:var(--red);box-shadow:0 6px 20px rgba(255,107,136,.22);}
  .opt.wrong .letter{background:linear-gradient(145deg,#ff9aad,#ff6b88);color:#fff;border-color:var(--red);}
  .opt.picked{border-color:var(--purple);background:linear-gradient(165deg,#f2f8ff,#ddefff);box-shadow:0 6px 20px rgba(106,168,255,.24);}
  .opt:disabled{cursor:default;opacity:1;color:inherit;}
  .feedback{
    text-align:center;font-size:clamp(20px,3vw,26px);font-weight:700;border-radius:18px;
    padding:14px;margin-top:14px;border:1.5px solid var(--border);
  }
  .feedback.good{background:linear-gradient(165deg,#e8fff5,#c8f8e4);color:var(--green-dark);border-color:#7fdcbc;box-shadow:0 8px 24px rgba(46,207,154,.22);}
  .feedback.bad{background:linear-gradient(165deg,#fff5f7,#ffdce4);color:#d44566;border-color:#ffb0c0;box-shadow:0 8px 24px rgba(255,107,136,.18);}
  .feedback .sub{font-size:.7em;font-weight:600;margin-top:4px;color:var(--text-light);}
  @keyframes pop{0%{transform:scale(.7);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .progressbar{height:12px;background:rgba(255,255,255,.55);border-radius:999px;overflow:hidden;
    flex:1;border:1px solid rgba(255,160,200,.35);box-shadow:inset 0 1px 3px rgba(61,47,58,.06);}
  .progressbar>div{height:100%;background:linear-gradient(90deg,#ff5d8f,#ffc44d 45%,#2ecf9a);border-radius:999px;transition:width .35s ease;
    box-shadow:0 0 14px rgba(255,93,143,.45);}
  .statrow{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
  .pill{
    background:linear-gradient(160deg,rgba(255,255,255,.95),rgba(255,236,245,.9));
    border:1.5px solid rgba(255,140,180,.35);border-radius:16px;padding:7px 14px;font-weight:700;font-size:.9em;
    box-shadow:var(--shadow-soft), var(--inner-hi);display:flex;align-items:center;gap:6px;white-space:nowrap;color:var(--ink);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  }
  .pill.timer-low{background:linear-gradient(160deg,#fff0f5,#ffe0e8);color:#d44566;border-color:#ffb0c0;}
  .home-stars{display:flex;justify-content:center;gap:12px;margin:14px 0;flex-wrap:wrap;}
  .bigmenu{display:grid;gap:14px;margin-top:18px;}
  .bigmenu .btn{min-height:80px;font-size:clamp(20px,3vw,26px);}
  table{width:100%;border-collapse:collapse;font-size:.85em;}
  th,td{padding:9px 6px;text-align:left;border-bottom:1px solid rgba(255,180,200,.25);}
  th{color:var(--text-light);font-size:.8em;text-transform:uppercase;letter-spacing:.04em;}
  .score-big{font-family:"Fraunces",Georgia,serif;font-size:clamp(48px,9vw,68px);font-weight:700;text-align:center;margin:6px 0;
    background:linear-gradient(120deg,#ff5d8f,#ffc44d,#2ecf9a);background-size:200% auto;
    -webkit-background-clip:text;background-clip:text;color:transparent;animation:titleShine 5s ease-in-out infinite;}
  .center{text-align:center;}
  .muted{color:var(--text-light);font-size:.85em;}
  .review-item{border-left:4px solid var(--red);background:linear-gradient(90deg,#fff5f7,#fff);border-radius:16px;padding:10px 14px;margin-bottom:10px;font-size:.9em;border:1.5px solid rgba(255,160,180,.3);border-left-width:4px;}
  .review-item.ok{border-left-color:var(--green);background:linear-gradient(90deg,#e8fff5,#fff);}
  .review-item .rq{font-weight:600;white-space:pre-line;}
  .confetti{position:fixed;top:-60px;pointer-events:none;z-index:99;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.9;}}
  .navrow{display:flex;gap:12px;margin-top:16px;}
  .navrow .btn{flex:1;}
  .testnums{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
  .testnums button{
    width:44px;height:44px;border-radius:14px;border:1.5px solid rgba(255,160,200,.35);
    background:linear-gradient(160deg,#fff,#ffeef5);font-weight:700;font-size:15px;cursor:pointer;
    box-shadow:var(--shadow-soft);transition:transform .1s,background .15s,border-color .15s;color:var(--ink);
  }
  .testnums button:active{transform:scale(.92);}
  .testnums button.done{background:linear-gradient(145deg,#9ec4ff,#6aa8ff);border-color:transparent;color:#fff;box-shadow:var(--glow-purple);}
  .testnums button.cur{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,93,143,.25);}
  .mark2{display:inline-block;background:var(--gold-soft);color:#9a6e08;border-radius:8px;font-size:.65em;padding:2px 8px;font-weight:700;vertical-align:middle;}
  /* ===== difficulty mode cards ===== */
  .mode-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-top:18px;}
  @media(min-width:520px){.mode-grid{grid-template-columns:1fr 1fr;}}
  @media(min-width:760px){
    .mode-grid{grid-template-columns:repeat(3,1fr);gap:14px;}
    .mode-grid .mode-card img.photo{height:150px;}
    .mode-grid .mode-card .mname{font-size:1.02em;}
    .mode-grid .mode-card .mdesc{font-size:.78em;}
    .mode-grid .mode-card .mbody{padding:10px 14px 12px;}
  }
  .mode-card{
    position:relative;border:1.5px solid rgba(255,140,180,.32);border-radius:22px;overflow:hidden;
    box-shadow:var(--shadow);cursor:pointer;padding:0;
    background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(255,240,248,.92));
    text-align:left;transition:transform .16s,box-shadow .22s,border-color .2s;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  }
  .mode-card::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    border:2.5px solid transparent;transition:border-color .2s;}
  .mode-card:active{transform:scale(.98);}
  .mode-card img.photo{width:100%;height:180px;object-fit:cover;display:block;}
  .mode-card .mbody{padding:12px 16px 14px;}
  .mode-card .mname{font-family:"Fraunces",Georgia,serif;font-weight:700;font-size:1.14em;color:var(--ink);}
  .mode-card .mdesc{color:var(--text-light);font-size:.82em;margin-top:3px;font-weight:500;}
  .mode-card.chill::after{border-color:var(--green);}
  .mode-card.master::after{border-color:var(--purple);}
  .mode-card.elite::after{border-color:var(--gold);}
  .mode-badge{
    display:inline-block;border-radius:10px;padding:3px 10px;font-size:.72em;font-weight:700;
    vertical-align:middle;white-space:nowrap;
  }
  .mode-badge.chill{background:linear-gradient(135deg,#d4fceb,#a8f0d4);color:var(--green-dark);}
  .mode-badge.master{background:linear-gradient(135deg,#e8f2ff,#c8ddff);color:#3a78d4;}
  .mode-badge.elite{background:linear-gradient(135deg,#fff3c9,#ffe08a);color:#9a6e08;}
  .mode-pill-img{width:26px;height:26px;border-radius:50%;object-fit:cover;vertical-align:-0.45em;margin-right:6px;}
  .sound-toggle{
    position:fixed;top:12px;right:12px;z-index:50;
    width:48px;height:48px;border-radius:16px;border:1.5px solid rgba(255,140,180,.4);cursor:pointer;
    background:linear-gradient(160deg,rgba(255,255,255,.95),rgba(255,236,245,.9));
    box-shadow:var(--shadow);font-size:22px;line-height:1;
    display:flex;align-items:center;justify-content:center;transition:transform .1s;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  }
  .sound-toggle:active{transform:scale(.9);}
  .sound-toggle.off{opacity:.6;}
  @media(min-width:760px){.sound-toggle{top:16px;right:16px;}}

  /* ===================== iPad / tablet tuning ===================== */
  @media(min-width:768px){
    #app{max-width:840px; padding:22px 22px 48px;}
    .card{padding:24px;}
    .btn{min-height:70px;}
    .opt{min-height:68px; padding:14px 18px;}
    .qtext{margin:8px 0 18px;}
    .grid{grid-template-columns:repeat(auto-fill,minmax(168px,1fr)); gap:18px;}
    .testnums button{width:48px;height:48px;font-size:16px;}
    .sound-toggle{width:54px;height:54px;font-size:25px;}
    .passage{max-height:46vh; padding:18px 20px;}
  }
  @media(min-width:768px) and (orientation:landscape){
    #app{max-width:900px;}
    .passage{max-height:34vh;}
  }
  @media(min-width:1000px){
    #app{max-width:920px;}
  }

  /* Short viewports (most phones in portrait): compress the quiz so a question —
     even with the Star of Hope box — fits on one screen without scrolling. */
  @media(max-height:780px){
    #app{padding:10px 14px 20px;}
    .scene{height:clamp(74px,12vh,112px);margin:2px 0 8px;}
    .card{padding:12px;margin-bottom:10px;}
    .qtext{margin:2px 0 8px;font-size:clamp(17px,2.5vw,21px);}
    .qimg{width:clamp(64px,13vw,100px);margin:3px auto;}
    .opt{min-height:46px;padding:7px 12px;}
    .opts{gap:8px;}
    .opt .letter{flex:0 0 32px;height:32px;}
    .statrow{margin-bottom:6px;}
    .topbar{margin-bottom:7px;}
    .hope-box{margin:6px 0;padding:7px 10px;}
    .hope-box .hs{margin-bottom:5px;}
    .passage{max-height:26vh;}
  }
  @media(max-height:640px){
    .scene{height:64px;}
    .opt{min-height:42px;}
    .qtext{font-size:16px;}
  }

  /* ===================== animations & polish ===================== */
  #app{animation:screenIn .42s cubic-bezier(.22,1,.36,1);}
  @keyframes screenIn{
    from{opacity:0; transform:translateY(14px) scale(.99);}
    to{opacity:1; transform:none;}
  }
  h1{animation:titlePop .4s ease, titleShine 6s ease-in-out infinite;}
  @keyframes titlePop{ from{opacity:0; transform:translateY(-4px);} to{opacity:1; transform:none;} }

  @keyframes riseIn{ from{opacity:0; transform:translateY(18px) scale(.96);} to{opacity:1; transform:none;} }
  .bigmenu .btn, .grid .topic-card, .mode-grid .mode-card, .opts .opt{
    animation:riseIn .45s both cubic-bezier(.22,1,.36,1);
  }
  .bigmenu .btn:nth-child(1){animation-delay:.04s;} .bigmenu .btn:nth-child(2){animation-delay:.10s;} .bigmenu .btn:nth-child(3){animation-delay:.16s;}
  .bigmenu .btn:nth-child(4){animation-delay:.22s;} .bigmenu .btn:nth-child(5){animation-delay:.28s;}
  .mode-grid .mode-card:nth-child(1){animation-delay:.05s;} .mode-grid .mode-card:nth-child(2){animation-delay:.16s;} .mode-grid .mode-card:nth-child(3){animation-delay:.27s;}
  .grid .topic-card:nth-child(1){animation-delay:.02s;} .grid .topic-card:nth-child(2){animation-delay:.06s;}
  .grid .topic-card:nth-child(3){animation-delay:.10s;} .grid .topic-card:nth-child(4){animation-delay:.14s;}
  .grid .topic-card:nth-child(5){animation-delay:.18s;} .grid .topic-card:nth-child(6){animation-delay:.22s;}
  .grid .topic-card:nth-child(7){animation-delay:.26s;} .grid .topic-card:nth-child(8){animation-delay:.30s;}
  .grid .topic-card:nth-child(9){animation-delay:.34s;} .grid .topic-card:nth-child(10){animation-delay:.38s;}
  .grid .topic-card:nth-child(11){animation-delay:.42s;} .grid .topic-card:nth-child(12){animation-delay:.46s;}
  .opts .opt:nth-child(1){animation-delay:.03s;} .opts .opt:nth-child(2){animation-delay:.09s;}
  .opts .opt:nth-child(3){animation-delay:.15s;} .opts .opt:nth-child(4){animation-delay:.21s;}

  .topic-card, .mode-card, .btn, .opt{ will-change:transform; }
  @media(hover:hover){
    .topic-card:hover{transform:translateY(-4px); box-shadow:0 14px 34px rgba(255,93,143,.22); border-color:rgba(255,93,143,.5);}
    .mode-card:hover{transform:translateY(-4px); box-shadow:0 16px 36px rgba(106,168,255,.22); border-color:rgba(106,168,255,.45);}
    .btn:hover{filter:brightness(1.05);}
    .opt:hover{border-color:var(--pink); transform:translateY(-2px); box-shadow:0 8px 20px rgba(255,93,143,.2);}
    .topic-card, .mode-card, .btn, .opt{transition:transform .18s ease, box-shadow .18s, border-color .18s, filter .18s;}
  }
  .mode-card img.photo{transition:transform .35s ease;}
  @media(hover:hover){ .mode-card:hover img.photo{transform:scale(1.03);} }

  .bigmenu .btn{position:relative; overflow:hidden;}

  .qimg{animation:none;}

  .opt.correct{animation:correctPulse .4s ease;}
  @keyframes correctPulse{ 0%{transform:scale(1);} 35%{transform:scale(1.02);} 100%{transform:scale(1);} }
  .opt.wrong{animation:wrongShake .35s ease;}
  @keyframes wrongShake{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 50%{transform:translateX(3px);} 75%{transform:translateX(-2px);} }

  .feedback{animation:fbPop .35s ease;}
  .feedback.good{animation:fbPop .35s ease;}
  @keyframes fbPop{ 0%{transform:translateY(6px); opacity:0;} 100%{transform:translateY(0); opacity:1;} }

  .home-stars .pill{animation:pillFloat 3.6s ease-in-out infinite;}
  .home-stars .pill:nth-child(2){animation-delay:.4s;background:linear-gradient(160deg,#ffffff,#f3fffa);border-color:rgba(120,200,170,.35);}
  .home-stars .pill:nth-child(3){animation-delay:.8s;background:linear-gradient(160deg,#ffffff,#f5f7ff);border-color:rgba(150,165,230,.35);}
  .home-stars .pill:first-child img{animation:none;}
  @keyframes pillFloat{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-3px);}
  }

  .progressbar>div{
    background:linear-gradient(90deg,#ff5d8f,#ffc44d 45%,#2ecf9a);
    background-size:220% 100%;
    animation:barShine 3s ease-in-out infinite;
    transition:width .45s ease;
  }
  @keyframes barShine{
    0%,100%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
  }

  .score-big{animation:scoreIn .6s cubic-bezier(.34,1.56,.64,1), titleShine 5s ease-in-out .6s infinite;}
  @keyframes scoreIn{ from{opacity:0; transform:scale(.5);} to{opacity:1; transform:scale(1);} }

  .confetti{animation:fall linear forwards, sway ease-in-out infinite alternate;}
  @keyframes sway{ from{margin-left:-16px;} to{margin-left:16px;} }

  /* ===== game layer: hedgehog track, items, gold, star of hope ===== */
  .track{position:relative;height:66px;margin:4px 0 14px;border-radius:16px;
    background:linear-gradient(180deg,#eaf6ff,#dff0e6);overflow:hidden;
    box-shadow:inset 0 1px 4px rgba(0,0,0,.06);}
  .track .rail{position:absolute;left:12px;right:12px;bottom:15px;height:4px;border-radius:4px;
    background:repeating-linear-gradient(90deg,#c9d6e5 0 10px,transparent 10px 20px);}
  .track{display:none}

  /* ===== SVG adventure map ===== */
  .scene{position:relative;width:100%;height:clamp(92px,16vh,150px);margin:4px 0 10px;border-radius:18px;overflow:hidden;
    box-shadow:var(--shadow);border:1.5px solid rgba(255,140,180,.28);}
  .scene svg{display:block;width:100%;height:100%}
  /* ===== practice 2-column layout: question left, station map right ===== */
  .practice-layout{display:flex;gap:16px;align-items:flex-start}
  .practice-main{flex:1 1 auto;min-width:0}
  .practice-side{flex:0 0 200px;width:200px;position:sticky;top:8px;align-self:flex-start}
  /* the SQUARE forest map — a winding trail through the woods, follows the hedgehog */
  .smap{aspect-ratio:1/1;width:100%;max-width:260px;margin:0 auto;overflow:hidden;
    border-radius:20px;box-shadow:var(--shadow);border:1.5px solid rgba(255,140,180,.3);position:relative;will-change:transform;}
  .smap svg{display:block;width:100%;height:100%}
  /* On narrow screens stack: map goes on top, stays a centred square. */
  @media (max-width:720px){
    .practice-layout{flex-direction:column-reverse}
    .practice-side{position:static;width:100%;flex-basis:auto}
    .smap{max-width:240px}
  }
  /* ===== full-screen practice: question (left 1/2) | forest map (right 1/2) ===== */
  body.practice-full{overflow:hidden}
  body.practice-full #app{max-width:none;width:100vw;min-height:0;height:100dvh;margin:0;padding:0;z-index:2}
  .pf-wrap{display:flex;flex-direction:column;height:100dvh;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
  .pf-bar{flex:0 0 auto;display:flex;align-items:center;flex-wrap:wrap;gap:10px 12px;padding:10px clamp(12px,2vw,22px);
    background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,240,248,.88));border-bottom:1.5px solid rgba(255,140,180,.28);
    box-shadow:var(--shadow-soft);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);}
  .pf-bar .title{font-family:"Fraunces",Georgia,serif;font-weight:700;display:flex;align-items:center;gap:8px;min-width:0;flex:1 1 auto;color:var(--ink)}
  .pf-bar .title span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pf-bar .coinrow{margin:0;flex:0 0 auto}
  .pf-bar-end{display:flex;align-items:center;gap:8px;flex:0 0 auto;margin-left:auto}
  .sound-toggle.sound-in-bar{
    position:static;width:42px;height:42px;font-size:20px;border-radius:14px;flex-shrink:0;
  }
  body.practice-full .gift-float{display:none}
  .pf-body{flex:1 1 auto;display:flex;min-height:0}
  .pf-q{flex:1 1 50%;min-width:0;min-height:0;overflow-y:auto;
    padding:clamp(14px,2.4vh,26px) clamp(16px,3vw,44px);
    display:flex;flex-direction:column;justify-content:center;gap:12px}
  .pf-q .card{margin:0;width:100%;max-width:640px;align-self:center}
  .pf-q .statrow{width:100%;max-width:640px;align-self:center}
  .pf-map{flex:1 1 50%;min-width:0;min-height:0;display:flex;align-items:center;justify-content:center;
    padding:clamp(10px,2vh,22px);position:relative}
  .pf-map .smap{max-width:100%;max-height:100%;width:min(100%,calc(100dvh - 104px));height:auto;
    aspect-ratio:1/1;margin:0}
  @media (max-width:820px){
    .pf-body{flex-direction:column}
    .pf-q{flex:1 1 auto;justify-content:flex-start;order:2;padding:12px 14px 20px}
    .pf-q .card,.pf-q .statrow{max-width:100%}
    .pf-map{flex:0 0 auto;order:1;padding:8px}
    .pf-map .smap{width:min(94vw,40vh)}
  }
  #hogG{transition:transform .6s cubic-bezier(.34,1.4,.5,1);transform-box:fill-box;transform-origin:center bottom}
  .hog-body,.hog-skin-img{transform-box:fill-box;transform-origin:center bottom}
  /* đứng chờ: nhảy nhảy vui vẻ */
  #hogG.happy-idle{animation:hogHappyBounce 1.05s ease-in-out infinite}
  @keyframes hogHappyBounce{0%,100%{transform:translateY(0) scale(1,1) rotate(0)}
    20%{transform:translateY(-5px) scale(1.03,.97) rotate(-2deg)}
    45%{transform:translateY(-1px) scale(.98,1.02) rotate(1deg)}
    70%{transform:translateY(-9px) scale(1.05,.95) rotate(-1deg)}}
  #hogG.happy-idle .hog-body,#hogG.happy-idle .hog-skin-img{animation:none}
  #hogG.happy-idle .hog-shadow{animation:shadowSquash 1.05s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
  @keyframes shadowSquash{0%,100%{transform:scaleX(1);opacity:.14}70%{transform:scaleX(.82);opacity:.1}}
  .hog-foot{transform-box:fill-box;transform-origin:top center;animation:hogFeet 0.9s ease-in-out infinite}
  .hog-foot.b{animation-delay:.45s}
  @keyframes hogFeet{0%,100%{transform:rotate(0)}50%{transform:rotate(8deg)}}
  #hogG.hop{animation:hogHop .62s ease}
  @keyframes hogHop{0%{transform:translateY(0)}28%{transform:translateY(-32px) scale(1.1) rotate(-6deg)}52%{transform:translateY(0) rotate(0)}74%{transform:translateY(-10px) scale(1.04)}100%{transform:translateY(0)}}
  /* trả lời đúng — nhảy ăn mừng */
  #hogG.celebrate{animation:hogCelebrate 1s cubic-bezier(.34,1.56,.64,1)}
  @keyframes hogCelebrate{0%{transform:translateY(0) rotate(0)}20%{transform:translateY(-34px) rotate(-14deg) scale(1.14)}
    42%{transform:translateY(-8px) rotate(12deg) scale(1.06)}62%{transform:translateY(-20px) rotate(-8deg) scale(1.1)}
    82%{transform:translateY(-4px) rotate(4deg)}100%{transform:translateY(0) rotate(0)}}
  #hogG.celebrate .hog-arm{animation:hogWave 1s ease}
  @keyframes hogWave{0%,100%{transform:rotate(0)}28%{transform:rotate(-60deg)}58%{transform:rotate(-35deg)}}
  /* trả lời sai — buồn, cúi đầu */
  #hogG.sad{animation:hogSad 1.15s ease}
  @keyframes hogSad{0%,100%{transform:translateY(0) rotate(0)}15%{transform:translateY(5px) rotate(-8deg) scale(.96)}
    35%{transform:translateY(6px) rotate(7deg) scale(.95)}55%{transform:translateY(5px) rotate(-6deg) scale(.96)}
    75%{transform:translateY(6px) rotate(5deg) scale(.95)}}
  #hogG.sad .hog-skin-img,#hogG.sad .hog-body{filter:brightness(.9) saturate(.82)}
  #hogG.sad .hog-mood-fx{opacity:1!important}
  #hogG.sad .hog-tear{animation:tearDrop 1.1s ease-in-out infinite}
  @keyframes tearDrop{0%,100%{transform:translateY(0);opacity:.85}50%{transform:translateY(5px);opacity:.45}}
  .hog-mood-fx{opacity:0;transition:opacity .25s}
  .hog-eye{transform-box:fill-box;transform-origin:center;animation:hogBlink 4.2s ease-in-out infinite}
  @keyframes hogBlink{0%,90%,100%{transform:scaleY(1)}94%{transform:scaleY(.12)}}
  /* pet đồng bộ với nhím */
  .scene-pet{transform-box:fill-box;transform-origin:center bottom}
  .scene-pet.happy-idle{animation:petHappyBounce 1.05s ease-in-out infinite}
  @keyframes petHappyBounce{0%,100%{transform:translateY(0) rotate(-4deg) scale(1)}
    35%{transform:translateY(-4px) rotate(2deg) scale(1.02)}70%{transform:translateY(-10px) rotate(5deg) scale(1.06)}}
  .scene-pet.celebrate{animation:petJump 1s cubic-bezier(.34,1.56,.64,1)}
  @keyframes petJump{0%{transform:translateY(0)}25%{transform:translateY(-22px) scale(1.15) rotate(8deg)}55%{transform:translateY(0) rotate(0)}78%{transform:translateY(-10px) scale(1.08)}100%{transform:translateY(0)}}
  .scene-pet.sad{animation:petSad 1.15s ease}
  @keyframes petSad{0%,100%{transform:translateY(0) rotate(0)}20%{transform:translateY(4px) rotate(-12deg) scale(.94)}
    45%{transform:translateY(5px) rotate(11deg) scale(.93)}70%{transform:translateY(4px) rotate(-9deg) scale(.94)}}
  .scene-pet.sad .scene-pet-img{filter:brightness(.88) saturate(.8) drop-shadow(0 3px 4px rgba(0,0,0,.2))}
  .scene-pet-img{filter:drop-shadow(0 3px 4px rgba(0,0,0,.2))}
  /* trail particles — soft orbiting bits around the hedgehog */
  .trail-orb{position:fixed;z-index:110;pointer-events:none;width:0;height:0;left:0;top:0;
    will-change:transform,opacity;animation:trailOrbSpin var(--dur,1s) ease-out forwards;
    transform:rotate(var(--a0,0deg))}
  @keyframes trailOrbSpin{
    0%{transform:rotate(var(--a0,0deg));opacity:0}
    14%{opacity:1}
    78%{opacity:.95}
    100%{transform:rotate(calc(var(--a0,0deg) + var(--spin,200deg)));opacity:0}
  }
  .trail-orb .trail-p{position:absolute;left:0;top:0;margin:0;pointer-events:none;
    width:12px;height:12px;transform:translate(var(--r,30px),0) translate(-50%,-50%);
    animation:trailOrbBob var(--dur,1s) ease-in-out forwards;will-change:transform,opacity}
  @keyframes trailOrbBob{
    0%{filter:brightness(1)}
    50%{filter:brightness(1.15)}
    100%{filter:brightness(1)}
  }
  .trail-orb .trail-p svg{width:100%;height:100%;overflow:visible;display:block;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.12))}
  .trail-orb .trail-p.bubbles,.trail-orb .trail-p.bubble{border-radius:50%;
    background:radial-gradient(circle at 32% 28%,#fff 0%,#bfe8ff 45%,#6ab8e8 100%);
    border:1.5px solid rgba(255,255,255,.75);box-shadow:inset -2px -2px 3px rgba(74,160,224,.28)}
  .trail-orb .trail-p.petals,.trail-orb .trail-p.petal{border-radius:50% 50% 50% 0;
    background:linear-gradient(135deg,#ffc4e0,#ff6e9e);box-shadow:0 1px 2px rgba(255,110,158,.3);
    animation:trailOrbBob var(--dur,1s) ease-in-out forwards}
  .trail-orb.soft{animation-timing-function:ease-in-out}
  /* legacy class kept so old selectors don't break */
  .trail-p{position:fixed;z-index:110;pointer-events:none;width:12px;height:12px}
  /* falling snow for the snow theme */
  .snowfall circle{animation:snowFall linear infinite}
  .snowfall circle:nth-child(2n){animation-duration:5s} .snowfall circle:nth-child(3n){animation-duration:7s} .snowfall circle:nth-child(4n){animation-duration:6s}
  .snowfall circle{animation-duration:5.5s}
  @keyframes snowFall{0%{transform:translateY(-8px);opacity:.9}100%{transform:translateY(40px);opacity:.2}}
  .cloud{animation:drift linear infinite}
  .cloud.a{animation-duration:26s} .cloud.b{animation-duration:38s}
  @keyframes drift{from{transform:translateX(-40px)}to{transform:translateX(360px)}}
  .grass{transform-box:fill-box;transform-origin:bottom center;animation:gsway 3.2s ease-in-out infinite}
  .grass.g2{animation-delay:.7s} .grass.g3{animation-delay:1.3s}
  @keyframes gsway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
  .item-node{transform-box:fill-box;transform-origin:center;animation:bob 1.8s ease-in-out infinite}
  .item-node .spark{animation:twinkle 1.5s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  @keyframes twinkle{0%,100%{opacity:.3;transform:scale(.7)}50%{opacity:1;transform:scale(1.1)}}
  .item-node.got{animation:itemGot .6s ease forwards}
  @keyframes itemGot{0%{transform:scale(1)}45%{transform:scale(1.8) translateY(-14px)}100%{transform:scale(0) translateY(-32px);opacity:0}}
  .flagWave{transform-box:fill-box;transform-origin:left center;animation:wave 1.1s ease-in-out infinite}
  @keyframes wave{0%,100%{transform:skewY(0)}50%{transform:skewY(-7deg)}}

  /* ===== forest square-map ambiance ===== */
  /* big trees gently sway around their trunk base */
  .ftree{transform-box:fill-box;transform-origin:bottom center;animation:treesway 5.5s ease-in-out infinite}
  .ftree.b{animation-duration:6.8s;animation-delay:.9s}
  .ftree.c{animation-duration:6.1s;animation-delay:.4s}
  @keyframes treesway{0%,100%{transform:rotate(-1.8deg)}50%{transform:rotate(1.8deg)}}
  /* shafts of sunlight breathe through the canopy */
  .frays{animation:rayglow 6.5s ease-in-out infinite;mix-blend-mode:screen}
  @keyframes rayglow{0%,100%{opacity:.30}50%{opacity:.62}}
  /* fireflies drift and twinkle when the hog just stands there */
  .ff{transform-box:fill-box;transform-origin:center;animation:ffly 4s ease-in-out infinite}
  .ff:nth-child(2n){animation-duration:5.2s} .ff:nth-child(3n){animation-duration:3.4s}
  .ff:nth-child(4n){animation-duration:6s} .ff:nth-child(5n){animation-duration:4.6s}
  @keyframes ffly{0%{transform:translate(0,0);opacity:.15}25%{opacity:1}
    50%{transform:translate(7px,-9px);opacity:.55}75%{opacity:.95}100%{transform:translate(0,0);opacity:.15}}
  /* leaves flutter down forever */
  .fleaf{transform-box:fill-box;transform-origin:center;animation:leaffall linear infinite}
  @keyframes leaffall{0%{transform:translate(0,-12px) rotate(0);opacity:0}
    12%{opacity:.95}88%{opacity:.9}100%{transform:translate(22px,252px) rotate(340deg);opacity:0}}
  .fern{transform-box:fill-box;transform-origin:bottom center;animation:gsway 3.6s ease-in-out infinite}
  .fern.b{animation-delay:.9s} .fern.c{animation-delay:1.6s}
  /* stream ripples, vines, butterflies, snail on the forest map */
  .fripple{animation:fripple 3s ease-in-out infinite}
  .fripple.b{animation-delay:.8s} .fripple.c{animation-delay:1.6s}
  @keyframes fripple{0%,100%{transform:scaleX(1);opacity:.3}50%{transform:scaleX(1.15);opacity:.55}}
  .fvine{stroke-dasharray:4 6;animation:fvine 5s ease-in-out infinite}
  @keyframes fvine{0%,100%{stroke-dashoffset:0}50%{stroke-dashoffset:12}}
  .map-bfly{transform-box:fill-box;transform-origin:center;animation:mbfly 4s ease-in-out infinite}
  .map-bfly.b{animation-delay:1.2s;animation-duration:5s} .map-bfly.c{animation-delay:2.4s;animation-duration:4.5s}
  @keyframes mbfly{0%,100%{transform:translate(0,0) rotate(-6deg)}25%{transform:translate(6px,-8px) rotate(8deg)}50%{transform:translate(12px,-4px) rotate(-4deg)}75%{transform:translate(4px,-10px) rotate(6deg)}}
  .fsnail{animation:fsnail 6s ease-in-out infinite}
  @keyframes fsnail{0%,100%{transform:translate(0,0)}50%{transform:translate(4px,-1px)}}
  .flamp-glow{animation:flamp 3.2s ease-in-out infinite}
  @keyframes flamp{0%,100%{opacity:.35}50%{opacity:.85}}

  /* MOVE effect: dirt + leaf puff kicked up under the hedgehog's feet */
  .dustfx{position:fixed;z-index:110;pointer-events:none;border-radius:50%;
    background:radial-gradient(circle at 40% 35%,rgba(196,160,110,.95),rgba(150,120,80,0) 70%);
    animation:dustPop .72s ease-out forwards}
  @keyframes dustPop{0%{transform:translate(0,0) scale(.3);opacity:0}18%{opacity:.85}
    100%{transform:translate(var(--dx),var(--dy)) scale(1.7);opacity:0}}
  .kickleaf{position:fixed;z-index:110;pointer-events:none;line-height:1;
    animation:kickLeaf .8s cubic-bezier(.3,.7,.4,1) forwards}
  @keyframes kickLeaf{0%{transform:translate(0,0) rotate(0);opacity:0}20%{opacity:1}
    100%{transform:translate(var(--dx),var(--dy)) rotate(var(--dr));opacity:0}}

  /* WRONG effect: the whole map shudders, dizzy sparks pop above the hog */
  .smap.shake{animation:mapShake .5s ease}
  @keyframes mapShake{0%,100%{transform:translateX(0)}15%{transform:translateX(-6px) rotate(-.6deg)}
    35%{transform:translateX(6px) rotate(.6deg)}55%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  .wrongfx{position:fixed;z-index:111;pointer-events:none;font-weight:600;line-height:1;
    text-shadow:0 1px 3px rgba(0,0,0,.2);animation:wrongPop 1.05s ease-out forwards}

  /* ===== station trail nodes — pulse, pop, glow ===== */
  .station-pulse{animation:stationPulse 1.8s ease-in-out infinite}

  .station-inner{transform-box:fill-box;transform-origin:center}
  .station-inner.station-pop{animation:stationPop .58s cubic-bezier(.34,1.56,.64,1)}
  @keyframes stationPop{0%{transform:scale(1)}42%{transform:scale(1.55)}100%{transform:scale(1)}}
  .station-inner.station-done circle:first-of-type{filter:drop-shadow(0 0 3px rgba(76,175,130,.55))}
  .finish-flag .flagWave{animation:wave 1.1s ease-in-out infinite}
  .finish-flag .wreath{animation:wreathSpin 12s linear infinite;transform-box:fill-box;transform-origin:center}
  @keyframes wreathSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  .trail-anim{stroke-dashoffset:0;animation:trailDash 7s linear infinite}

  /* ===== map ambience & correct feedback ===== */
  .pf-map .smap{animation:none}

  @keyframes mapFlash{0%{box-shadow:var(--shadow)}
    35%{box-shadow:0 0 0 3px rgba(31,157,118,.35), var(--shadow)}

  .item-slot .item-node{animation:bob 2.1s ease-in-out infinite}

  #hogWrap.hopping{filter:drop-shadow(0 6px 8px rgba(40,28,16,.22))}

  @keyframes petHopSync{0%{transform:translateY(0) rotate(-4deg)}28%{transform:translateY(-24px) scale(1.12) rotate(8deg)}52%{transform:translateY(0) rotate(0)}74%{transform:translateY(-10px) rotate(-3deg)}100%{transform:translateY(0) rotate(-4deg)}}
  .scene-pet.happy-idle .scene-pet-img{animation:none}

  /* equip FX trong shop */
  .shop-card.just-equipped.png-art .shop-art-wrap{animation:equipPop .58s cubic-bezier(.34,1.56,.64,1)}
  @keyframes equipPop{0%{transform:scale(1)}38%{transform:scale(1.12)}100%{transform:scale(1)}}
  .shop-card.equipped.png-art:not(.just-equipped) .shop-art-wrap{animation:equipIdle 2.4s ease-in-out infinite}
  @keyframes equipIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  .equip-spark{position:absolute;z-index:4;pointer-events:none;width:12px;height:12px;animation:equipSpark .7s ease-out forwards}
  @keyframes equipSpark{0%{transform:translate(0,0) scale(.2);opacity:0}20%{opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(1.1);opacity:0}}

  /* floating map particles */
  .map-sparkle,.celebratefx,.correctfx{position:fixed;z-index:111;pointer-events:none}
  .map-sparkle{width:10px;height:10px;animation:mapSpark .9s ease-out forwards}
  @keyframes mapSpark{0%{transform:translate(0,0) scale(.2);opacity:0}20%{opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(1.2);opacity:0}}
  .celebratefx{width:16px;height:16px;animation:celeBurst .85s cubic-bezier(.22,1,.36,1) forwards}
  @keyframes celeBurst{0%{transform:translate(0,0) scale(.15) rotate(0);opacity:0}18%{opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(1.1) rotate(var(--dr,180deg));opacity:0}}
  .correctfx{width:14px;height:14px;animation:correctBurst .75s ease-out forwards}
  @keyframes correctBurst{0%{transform:translate(0,0) scale(.25);opacity:0}22%{opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(1.15);opacity:0}}
  .correct-ring{position:fixed;z-index:110;pointer-events:none;width:48px;height:48px;border-radius:50%;
    border:2.5px solid rgba(76,210,130,.75);animation:correctRing .7s ease-out forwards}
  @keyframes correctRing{0%{transform:translate(-50%,-50%) scale(.3);opacity:.95}100%{transform:translate(-50%,-50%) scale(2.2);opacity:0}}

  /* ===== stars / gold / bag counters ===== */
  .coinrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .coin{display:inline-flex;align-items:center;gap:6px;font-weight:600;font-size:.92em;
    border-radius:14px;padding:7px 13px;box-shadow:var(--shadow-soft);white-space:nowrap;
    border:1.5px solid var(--border);background:var(--surface);color:var(--ink)}
  .coin svg{width:20px;height:20px;flex-shrink:0}
  .coin .bag-emo{font-size:18px;line-height:1}
  .coin.gold{background:linear-gradient(160deg,#fff8d8,#ffe697);color:#9a6e08;border-color:#e8cd72;box-shadow:0 4px 14px rgba(255,196,77,.35)}
  .coin.star{background:linear-gradient(160deg,#f0f3ff,#dce3ff);color:#5a6ec4;border-color:#b8c4f0;box-shadow:0 4px 12px rgba(139,156,240,.24)}
  .coin.bag{background:linear-gradient(160deg,#e8faf2,#c8f0dd);color:var(--green-dark);border-color:#8fd4b4;box-shadow:0 4px 12px rgba(69,196,150,.22)}
  .coin.pulse{animation:coinPulse .4s ease}
  @keyframes coinPulse{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}
  .coin.star{animation:none}
  .pf-q .card{animation:riseIn .35s both ease}
  .pf-q .qtext{animation:riseIn .4s .05s both ease}

  .flyer{position:fixed;z-index:120;pointer-events:none;width:26px;height:26px;
    display:flex;align-items:center;justify-content:center;
    transition:transform .7s cubic-bezier(.4,0,.5,1),opacity .7s ease}

  .rewardpop{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;font-weight:600;font-size:.92em;align-items:center}
  .rewardpop span{display:inline-flex;align-items:center;gap:5px;background:var(--surface);border-radius:12px;padding:6px 12px;
    box-shadow:var(--shadow-soft);border:1px solid var(--border);
    animation:rewardIn .35s ease both}
  .rewardpop span svg{width:18px;height:18px}
  .rewardpop span:nth-child(2){animation-delay:.06s}
  .rewardpop span:nth-child(3){animation-delay:.12s}
  .rewardpop span:nth-child(4){animation-delay:.18s}
  @keyframes rewardIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .mult-badge{background:var(--yellow-light)!important;color:#9a6e08!important;border-color:#f0d78a!important}

  .hope-box{margin:8px 0;padding:9px 12px;border-radius:12px;text-align:center;
    background:var(--yellow-light);border:1px solid #edd9a0;box-shadow:var(--shadow-soft);
    animation:none}
  .hope-box .ht{font-weight:600;margin-bottom:1px;font-size:.98em}
  .hope-box .hs{font-size:.76em;color:#8a5a2b;margin-bottom:7px}
  .hope-box .btn-hope{min-height:40px;font-size:15px}
  .btn-hope{
    background:linear-gradient(165deg,#ffb0cd,#ff6b9a)!important;color:#fff!important;border:none!important;
    box-shadow:0 1px 0 rgba(255,255,255,.35) inset, 0 6px 16px rgba(255,93,143,.28)!important;
  }
  .hope-on{display:inline-flex;align-items:center;gap:6px;font-weight:600;color:#9a6e08;
    background:var(--gold-soft);border:1.5px solid #d9b74a;border-radius:12px;padding:6px 12px;margin:8px 0}

  .bag-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:10px;margin-top:10px}
  .bag-item{background:linear-gradient(165deg,#ffffff,#fff8fb);border:1.5px solid rgba(240,160,190,.28);border-radius:16px;padding:12px 6px;text-align:center;box-shadow:var(--shadow-soft)}
  .bag-item .be{font-size:30px;line-height:1;filter:none}
  .bag-item .bn{font-size:.72em;color:var(--muted);margin-top:4px;font-weight:500}
  .bag-item .bc{font-weight:600;font-size:.85em;color:var(--ink)}
  .bag-empty{color:var(--muted);font-size:.9em;text-align:center;padding:14px 0}
  .bag-item.locked{opacity:.9;background:var(--surface-2)}
  .bag-item.locked .be{filter:grayscale(1) brightness(1.1) opacity(.4)}
  .bag-item.locked .bc{color:var(--muted)}
  .bag-item .be{transition:transform .15s}
  .bag-item:not(.locked):hover .be{transform:scale(1.06)}
  .bag-stats{display:flex;gap:10px;justify-content:center;margin:6px 0 16px;flex-wrap:wrap}
  .bag-stat{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:12px 18px;text-align:center;box-shadow:var(--shadow-soft);min-width:96px}
  .bag-stat .bs-num{font-weight:600;font-size:1.15em;display:flex;align-items:center;justify-content:center;gap:5px;color:var(--ink)}
  .bag-stat .bs-num svg{width:20px;height:20px}
  .bag-stat .bs-lbl{font-size:.72em;color:var(--muted);margin-top:2px;font-weight:500}
  .shop-hint{margin-top:16px;text-align:center;font-size:.86em;color:#9a6e08;
    background:var(--gold-soft);border:1.5px solid #d9b74a;border-radius:14px;padding:12px 14px}
  /* shop */
  .shop-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;-webkit-overflow-scrolling:touch}
  .shop-tab{flex:0 0 auto;border:1.5px solid rgba(255,140,180,.22);cursor:pointer;
    background:linear-gradient(165deg,rgba(255,255,255,.96),rgba(255,244,250,.9));border-radius:12px;padding:8px 14px;font-weight:600;font-size:.9em;
    color:var(--text-light);box-shadow:0 3px 10px rgba(61,47,58,.05);transition:transform .14s, box-shadow .18s, background .18s, color .18s, border-color .18s}
  .shop-tab.on{background:linear-gradient(165deg,#ffb0cd,#ff6b9a);color:#fff;border-color:transparent;
    box-shadow:0 1px 0 rgba(255,255,255,.35) inset, 0 6px 16px rgba(255,93,143,.28)}
  .shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
  .shop-card{background:linear-gradient(165deg,rgba(255,255,255,.96),rgba(255,236,245,.9));border:1.5px solid rgba(255,140,180,.32);border-radius:18px;padding:14px 10px;text-align:center;box-shadow:var(--shadow-soft);
    display:flex;flex-direction:column;align-items:center;gap:8px;transition:transform .18s ease,box-shadow .18s,border-color .18s;
    position:relative;overflow:visible;animation:riseIn .35s both ease}
  .shop-grid .shop-card:nth-child(n){animation-delay:.03s}
  @media(hover:hover){.shop-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:#b8ddd0}}
  .shop-card.equipped{border-color:var(--gold);background:var(--gold-soft);box-shadow:var(--shadow-soft)}
  .shop-card.equipped::before{content:none}
  .shop-card.png-art .shop-art-img{animation:none}
  /* PNG pets/hats: no filter/transform on <img> — those cause blurry "broken" edges */
  .shop-card.png-art .shop-art-wrap{
    width:100px;height:100px;overflow:visible;padding:8px;box-sizing:border-box;
    background:transparent;border:none;box-shadow:none;
  }
  .shop-card.png-art .shop-art,
  .shop-card.png-art .shop-art-img,
  .shop-card.png-art.r-rare .shop-art-wrap .shop-art,
  .shop-card.png-art.r-epic .shop-art-wrap .shop-art,
  .shop-card.png-art.r-legendary .shop-art-wrap .shop-art,
  .shop-card.png-art.r-rare .shop-art-wrap .shop-art-img,
  .shop-card.png-art.r-epic .shop-art-wrap .shop-art-img,
  .shop-card.png-art.r-legendary .shop-art-wrap .shop-art-img{
    width:100%;height:100%;max-width:100%;max-height:100%;
    object-fit:contain;object-position:center;display:block;
    filter:none;transform:none;animation:none;
    image-rendering:auto;
  }
  .shop-card.png-art{animation:shopCardIn .35s both ease}
  @keyframes shopCardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @media(hover:hover){
    .shop-card.png-art:hover .shop-art,
    .shop-card.png-art:hover .shop-art-img{transform:none}
  }
  .shop-tab.on{animation:none}
  .shop-art-wrap .shop-art,.shop-art-wrap .shop-art-img{transition:transform .18s ease}
  @media(hover:hover){.shop-card:not(.png-art):hover .shop-art,.shop-card:not(.png-art):hover .shop-art-img{transform:scale(1.03)}}
  .shop-art-wrap{width:88px;height:88px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#fff5f8,#eefaf5);border:1.5px solid rgba(240,180,200,.30);border-radius:14px;
    position:relative;overflow:visible;padding:6px;box-sizing:border-box}
  .shop-card.png-art .shop-art-wrap{background:transparent;border:none;box-shadow:none}
  .shop-art{width:72px;height:72px;filter:drop-shadow(0 3px 6px rgba(80,100,120,.10))}
  .shop-card.r-legendary .shop-art-wrap .shop-art,.shop-card.r-epic .shop-art-wrap .shop-art{filter:drop-shadow(0 3px 6px rgba(80,100,120,.12))}
  .shop-name{font-weight:600;font-size:.9em;min-height:2.2em;display:flex;align-items:center;color:var(--ink)}
  .shop-qty{font-size:.75em;color:var(--muted);margin-top:-4px}
  .owned-tag{color:var(--green-dark);font-weight:600;font-size:.9em}
  .shop-art .spark,.shop-art [id^="star"]{animation:none;opacity:.65}

  /* ===== collectible / shop artwork (SVG or AI-gen PNG) ===== */
  .bag-item{position:relative;padding-top:14px}
  /* Each item sits in a glossy glass medallion with a rarity-coloured ring. */
  .bag-item .be{
    width:66px;height:66px;border-radius:16px;margin:0 auto 6px;position:relative;
    display:flex;align-items:center;justify-content:center;
    background:var(--surface-2);border:1.5px solid var(--border);
    overflow:visible;padding:4px;box-sizing:border-box;
  }
  .bag-item .be::before{content:none}
  .bag-item .be svg.item-art, .bag-item .be .art-svg-fallback svg{width:46px;height:48px;display:block;filter:drop-shadow(0 2px 4px rgba(80,100,120,.10));position:relative;z-index:1}
  .bag-item .be img.item-art-img{width:48px;height:48px;object-fit:contain;display:block;filter:drop-shadow(0 2px 4px rgba(80,100,120,.10));position:relative;z-index:1}
  .bag-item.r-common .be{border-color:#3f9f7d;background:#d9f3e8}
  .bag-item.r-rare .be{border-color:#4a6ad4;background:#e7ecfb}
  .bag-item.r-epic .be{border-color:#7a52c4;background:#eee6fa}
  .bag-item.r-legendary .be{border-color:#c48a06;background:var(--gold-soft)}
  .bag-item.locked .be{filter:grayscale(1) opacity(.55);border-color:var(--border);background:var(--surface-2)}
  .bag-item.locked .be img.item-art-img,.bag-item.locked .be svg{filter:grayscale(1) brightness(1.05) opacity(.45)}

  .bag-item::after{content:"";position:absolute;top:9px;right:11px;width:9px;height:9px;border-radius:50%;border:2px solid #fff;z-index:3}
  .bag-item.r-common::after{background:var(--green)}
  .bag-item.r-rare::after{background:var(--purple)}
  .bag-item.r-epic::after{background:#7a52c4}
  .bag-item.r-legendary::after{background:var(--gold)}
  .bag-item.locked::after{background:#9aada4}
  .shop-art-img{width:72px;height:72px;object-fit:contain;object-position:center;filter:drop-shadow(0 3px 6px rgba(80,100,120,.10))}
  .shop-art-wrap::after{content:none}
  .shop-card:not(.equipped).r-rare{border-color:#4a6ad4}
  .shop-card:not(.equipped).r-epic{border-color:#7a52c4}
  .shop-card:not(.equipped).r-legendary{border-color:#c48a06}
  .rewardpop .item-art{width:24px;height:24px;vertical-align:middle}
  /* ===== merged Shop + Bag extras ===== */
  .shop-card .qty{color:var(--text-light);font-weight:600;font-size:.9em}
  .shop-card .locked-lbl{font-size:.74em;color:var(--muted);font-weight:600;min-height:2.2em;display:flex;align-items:center}
  .shop-card .btn-small{width:100%;min-height:40px;font-size:14px;padding:7px 12px;border-radius:11px}
  .shop-card .sell-btn{
    font-size:13px;min-height:34px;padding:5px 12px;font-weight:600;
    background:rgba(255,255,255,.72);color:var(--text-light);

    box-shadow:none;
  }

  .shop-card .sell-btn:active{filter:brightness(.97);transform:scale(.98)}

  .shop-card.bag-card .shop-art-wrap .item-art,
  .shop-card.bag-card .shop-art-wrap .art-svg-fallback svg{width:62px;height:66px;filter:drop-shadow(0 4px 6px rgba(96,64,170,.3))}
  .shop-card.bag-card .shop-art-wrap .item-art-img{width:60px;height:60px;object-fit:contain;object-position:center;filter:drop-shadow(0 4px 7px rgba(96,64,170,.28))}
  .shop-card.bag-card.locked{opacity:.92}
  .shop-card.bag-card.locked .shop-art-wrap>*{filter:grayscale(1) opacity(.45)}
  /* floating "+X gold" confirmation shown when you sell something */
  .gold-toast{position:fixed;left:50%;top:16%;transform:translateX(-50%);z-index:200;pointer-events:none;
    background:var(--gold-soft);color:#9a6e08;font-weight:600;font-size:1.05em;

  .gold-toast .gt-ic{display:inline-flex;width:22px;height:22px}
  @keyframes goldToastPop{0%{opacity:0;transform:translateX(-50%) translateY(8px)}
    12%{opacity:1;transform:translateX(-50%) translateY(0)}
    75%{opacity:1}
    100%{opacity:0;transform:translateX(-50%) translateY(-18px)}}

  /* shared modal / dialog — replaces native alert/confirm */
  .gift-overlay, .ui-overlay{
    position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;
    padding:20px;background:rgba(45,36,48,.38);

    animation:giftFadeIn .22s ease both;
  }
  .gift-modal, .ui-modal{
    width:min(380px,100%);padding:28px 24px 22px;border-radius:24px;
    background:linear-gradient(165deg,rgba(255,255,255,.98) 0%,rgba(255,244,250,.96) 55%,rgba(240,255,250,.95) 100%);
    box-shadow:0 1px 0 rgba(255,255,255,.85) inset, 0 24px 48px rgba(61,47,58,.18), 0 8px 20px rgba(255,93,143,.12);
    border:1.5px solid rgba(255,255,255,.75);
    animation:giftPop .32s cubic-bezier(.22,1,.36,1) both;

  }

    background:linear-gradient(90deg,transparent,#ff5d8f,#ffc44d,#2ecf9a,transparent);opacity:.9;
  }
  .gift-modal{text-align:center}
  .gift-modal .gift-badge{font-size:2.4em;line-height:1;margin-bottom:8px}

    margin:0 0 20px;color:var(--text-light);font-weight:600;font-size:.95em;line-height:1.45;

  .gift-modal .gift-amt{display:inline-flex;align-items:center;gap:8px;margin:0 0 18px;padding:10px 16px;
    border-radius:14px;background:var(--gold-soft);color:#9a6e08;border:1.5px solid #e8cd72;
    font-weight:600;font-size:1.25em}
  .gift-modal .gift-amt svg{width:26px;height:26px}
  .gift-modal .btn{width:100%;min-height:52px}
  .ui-modal{text-align:left}
  .ui-modal .ui-icon{
    width:48px;height:48px;border-radius:16px;display:flex;align-items:center;justify-content:center;
    font-size:1.55em;margin:0 0 14px;

    box-shadow:var(--shadow-soft);
  }
  .ui-modal.danger .ui-icon{background:linear-gradient(160deg,#ffe8ef,#ffd6e0);border-color:rgba(255,107,136,.35)}

  .ui-actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-top:4px}

    .ui-actions{flex-direction:column-reverse}
    .ui-actions .btn{width:100%}
  }
  @keyframes giftFadeIn{from{opacity:0}to{opacity:1}}

<script>
"use strict";
/* ================= data & utilities ================= */
const TOPICS = window.APP_DATA.topics;
const PASSAGES = window.APP_DATA.passages;
const CHILL = window.APP_DATA.chill || { topics:{}, passages:[] };
const HARD = window.APP_DATA.hard || { topics:{}, passages:[] };
const ELITE = window.APP_DATA.elite || { topics:{}, passages:[] };

/* ===== difficulty modes ===== */
const MODES = {
  chill:  { id:"chill",  name:"Nhím Chill Chill", img:"mode-chill.png",
            desc:"Fun thinking questions to warm up your brain." },
  master: { id:"master", name:"Nhím Cao Thủ",     img:"mode-master.png",
            desc:"Trickier puzzles for clever champions!" },
  elite:  { id:"elite",  name:"Nhím Tinh Hoa",    img:"mode-elite.png",
            desc:"The very hardest challenges — for true masterminds!" }
};
// Question banks keyed by mode id. Every mode now has its own bank; the old
// easy "base topic" questions are no longer used for gameplay (Chill = the
// promoted former-Elite content, Master and Elite are brand-new harder banks).
const BANKS = { chill: CHILL, master: HARD, elite: ELITE };
let MODE = "chill";
const modeBadge = m => `<span class="mode-badge ${m}">${esc((MODES[m]||MODES.chill).name)}</span>`;
function topicPool(t){ const b = BANKS[MODE]; return b ? (b.topics[t.id] || t.questions) : t.questions; }
function passagePool(){ const b = BANKS[MODE]; return b && b.passages.length ? b.passages : PASSAGES; }
function practiceKey(topicId){ return MODE==="chill" ? topicId : topicId+"#"+MODE; }
const $app = document.getElementById("app");
// Re-play the "screen in" entrance animation every time the screen content
// changes (innerHTML swaps don't restart a CSS animation on their own).
if(typeof MutationObserver !== "undefined" && $app){
  let _animRaf = null;
  const _replayScreenIn = ()=>{
    $app.style.animation = "none";
    // force reflow, then let the stylesheet animation take over again
    void $app.offsetWidth;
    $app.style.animation = "";
  };
  new MutationObserver(()=>{
    if(_animRaf) cancelAnimationFrame(_animRaf);
    _animRaf = requestAnimationFrame(_replayScreenIn);
  }).observe($app, { childList:true });
}
const IMG = (name, cls) => name ? `<img class="${cls||'icon'}" src="images/${name}.svg" alt="" onerror="this.style.display='none'">` : "";
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const shuffle = arr => { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
const pick = arr => arr[Math.floor(Math.random()*arr.length)];

/* ================= save progress =================
   Primary storage is a REAL SQLite database (sql.js / WASM) whose binary image
   is persisted in IndexedDB so it survives across sessions and works offline.
   localStorage is kept as a safe fallback + mirror (e.g. when opened via file://
   and the CDN that serves the WASM is unreachable, or IndexedDB is blocked).
   The in-memory `store` object and all game logic stay exactly the same;
   only the persistence layer underneath changed.                              */
const STORE_KEY = "englishFun.v1";
const DB_IDB_NAME = "englishFunDB", DB_IDB_STORE = "sqlite", DB_IDB_KEY = "db.v1";

let SQL = null, db = null, dbReady = false;

function loadStoreLS(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }catch(e){ return {}; }
}
function saveStoreLS(s){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(s)); }catch(e){} }

/* ---- tiny IndexedDB helpers (store one Uint8Array = the SQLite file) ---- */
function idbOpen(){
  return new Promise((res,rej)=>{
    if(!("indexedDB" in window)) return rej(new Error("no idb"));
    const r = indexedDB.open(DB_IDB_NAME, 1);
    r.onupgradeneeded = ()=>{ r.result.createObjectStore(DB_IDB_STORE); };
    r.onsuccess = ()=>res(r.result);
    r.onerror  = ()=>rej(r.error);
  });
}
function idbGet(){
  return idbOpen().then(idb=>new Promise((res,rej)=>{
    const tx = idb.transaction(DB_IDB_STORE,"readonly").objectStore(DB_IDB_STORE).get(DB_IDB_KEY);
    tx.onsuccess = ()=>res(tx.result || null); tx.onerror = ()=>rej(tx.error);
  }));
}
function idbPut(bytes){
  return idbOpen().then(idb=>new Promise((res,rej)=>{
    const tx = idb.transaction(DB_IDB_STORE,"readwrite").objectStore(DB_IDB_STORE).put(bytes, DB_IDB_KEY);
    tx.onsuccess = ()=>res(true); tx.onerror = ()=>rej(tx.error);
  }));
}

/* ---- schema ---- */
function dbCreateSchema(){
  db.run(`
    CREATE TABLE IF NOT EXISTS profile(id INTEGER PRIMARY KEY CHECK(id=1),
      stars INTEGER DEFAULT 0, gold INTEGER DEFAULT 0, sound_on INTEGER DEFAULT 1);
    CREATE TABLE IF NOT EXISTS bag(item TEXT PRIMARY KEY, qty INTEGER DEFAULT 0);
    CREATE TABLE IF NOT EXISTS practice(topic_id TEXT PRIMARY KEY, done INTEGER DEFAULT 0, correct INTEGER DEFAULT 0);
    CREATE TABLE IF NOT EXISTS tests(id INTEGER PRIMARY KEY AUTOINCREMENT,
      date TEXT, mode TEXT, score INTEGER, total_marks INTEGER, correct INTEGER, total INTEGER, time_used INTEGER);
    CREATE TABLE IF NOT EXISTS events(id INTEGER PRIMARY KEY AUTOINCREMENT,
      ts TEXT, kind TEXT, detail TEXT);
    CREATE TABLE IF NOT EXISTS shop(item_id TEXT PRIMARY KEY);           -- purchased items
    CREATE TABLE IF NOT EXISTS boosters(booster_id TEXT PRIMARY KEY, qty INTEGER DEFAULT 0);
    CREATE TABLE IF NOT EXISTS kv(k TEXT PRIMARY KEY, v TEXT);           -- misc (equipped skin/decor)
    INSERT OR IGNORE INTO profile(id,stars,gold,sound_on) VALUES(1,0,0,1);
  `);
}

/* ---- read the whole DB into the in-memory `store` shape used everywhere ---- */
function dbReadIntoStore(){
  const s = { practice:{}, tests:[], stars:0, gold:0, bag:{}, soundOn:true, shop:{}, equip:{skin:"classic",decor:null,hat:null,pet:null,trail:null,theme:"meadow"}, boosters:{}, gifts:{} };
  const prof = db.exec("SELECT stars,gold,sound_on FROM profile WHERE id=1");
  if(prof.length && prof[0].values.length){
    const [stars,gold,snd] = prof[0].values[0];
    s.stars = stars||0; s.gold = gold||0; s.soundOn = !!snd;
  }
  const bag = db.exec("SELECT item,qty FROM bag");
  if(bag.length) bag[0].values.forEach(([it,q])=>{ s.bag[it]=q; });
  const sh = db.exec("SELECT item_id FROM shop");
  if(sh.length) sh[0].values.forEach(([id])=>{ s.shop[id]=true; });
  const bo = db.exec("SELECT booster_id,qty FROM boosters");
  if(bo.length) bo[0].values.forEach(([id,q])=>{ s.boosters[id]=q; });
  const kv = db.exec("SELECT k,v FROM kv");
  if(kv.length) kv[0].values.forEach(([k,v])=>{
    if(k==="skin")  s.equip.skin  = v || "classic";
    if(k==="decor") s.equip.decor = (v||null);
    if(k==="hat")   s.equip.hat   = (v||null);
    if(k==="pet")   s.equip.pet   = (v||null);
    if(k==="trail") s.equip.trail = (v||null);
    if(k==="theme") s.equip.theme = (v||"meadow");
    if(k==="gifts"){ try{ s.gifts = JSON.parse(v)||{}; }catch(e){ s.gifts = {}; } }
  });
  const pr = db.exec("SELECT topic_id,done,correct FROM practice");
  if(pr.length) pr[0].values.forEach(([tid,d,c])=>{ s.practice[tid]={done:d,correct:c}; });
  const ts = db.exec("SELECT date,mode,score,total_marks,correct,total,time_used FROM tests ORDER BY id ASC");
  if(ts.length) ts[0].values.forEach(([date,mode,score,tm,c,t,tu])=>{
    s.tests.push({date,mode,score,totalMarks:tm,correct:c,total:t,timeUsed:tu});
  });
  return s;
}

/* ---- write the current in-memory `store` back into SQLite tables ---- */
function dbWriteFromStore(s){
  db.run("BEGIN");
  try{
    db.run("UPDATE profile SET stars=?,gold=?,sound_on=? WHERE id=1",
      [s.stars|0, s.gold|0, s.soundOn?1:0]);
    db.run("DELETE FROM bag");
    const bi = db.prepare("INSERT INTO bag(item,qty) VALUES(?,?)");
    Object.keys(s.bag||{}).forEach(k=>{ if(s.bag[k]>0) bi.run([k, s.bag[k]]); });
    bi.free();
    db.run("DELETE FROM practice");
    const pi = db.prepare("INSERT INTO practice(topic_id,done,correct) VALUES(?,?,?)");
    Object.keys(s.practice||{}).forEach(k=>{ pi.run([k, s.practice[k].done|0, s.practice[k].correct|0]); });
    pi.free();
    db.run("DELETE FROM tests");
    const ti = db.prepare("INSERT INTO tests(date,mode,score,total_marks,correct,total,time_used) VALUES(?,?,?,?,?,?,?)");
    (s.tests||[]).forEach(t=> ti.run([t.date, t.mode||null, t.score|0, t.totalMarks|0, t.correct|0, t.total|0, t.timeUsed|0]));
    ti.free();
    db.run("DELETE FROM shop");
    const si = db.prepare("INSERT INTO shop(item_id) VALUES(?)");
    Object.keys(s.shop||{}).forEach(k=>{ if(s.shop[k]) si.run([k]); });
    si.free();
    db.run("DELETE FROM boosters");
    const boi = db.prepare("INSERT INTO boosters(booster_id,qty) VALUES(?,?)");
    Object.keys(s.boosters||{}).forEach(k=>{ if(s.boosters[k]>0) boi.run([k, s.boosters[k]]); });
    boi.free();
    db.run("DELETE FROM kv");
    const kvi = db.prepare("INSERT INTO kv(k,v) VALUES(?,?)");
    kvi.run(["skin",  (s.equip&&s.equip.skin)||"classic"]);
    kvi.run(["decor", (s.equip&&s.equip.decor)||""]);
    kvi.run(["hat",   (s.equip&&s.equip.hat)||""]);
    kvi.run(["pet",   (s.equip&&s.equip.pet)||""]);
    kvi.run(["trail", (s.equip&&s.equip.trail)||""]);
    kvi.run(["theme", (s.equip&&s.equip.theme)||"meadow"]);
    kvi.run(["gifts", JSON.stringify(s.gifts||{})]);
    kvi.free();
    db.run("COMMIT");
  }catch(e){ db.run("ROLLBACK"); throw e; }
}

/* ---- public API kept identical to before ---- */
function loadStore(){ return loadStoreLS(); }   // synchronous seed (upgraded by initDB later)
function saveStore(s){
  saveStoreLS(s);                               // always mirror to localStorage
  if(dbReady && db){
    try{ dbWriteFromStore(s); persistDB(); }catch(e){ /* keep going on localStorage */ }
  }
}
let _persistT = null;
function persistDB(){                            // debounce writes to IndexedDB
  if(!db) return;
  clearTimeout(_persistT);
  _persistT = setTimeout(()=>{ try{ idbPut(db.export()); }catch(e){} }, 250);
}

/* ---- boot: load sql.js, restore or migrate, then hand back a ready store ---- */
async function initDB(){
  try{
    const initSqlJs = window.initSqlJs;
    if(typeof initSqlJs !== "function") throw new Error("sql.js not loaded");
    SQL = await initSqlJs({ locateFile: f => "https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/"+f });
    const saved = await idbGet().catch(()=>null);
    if(saved){ db = new SQL.Database(new Uint8Array(saved)); dbCreateSchema(); }
    else{
      db = new SQL.Database(); dbCreateSchema();
      dbWriteFromStore(store);                   // migrate whatever localStorage had
      await idbPut(db.export());
    }
    dbReady = true;
    const giftsBefore = (store && store.gifts) || {};
    store = dbReadIntoStore();                    // DB is now the source of truth
    // Merge gifts claimed while DB was still loading (or from LS mirror).
    // For daily/weekly period keys, keep the later (lexicographically greater) stamp.
    store.gifts = store.gifts || {};
    Object.keys(giftsBefore).forEach(k=>{
      const a = giftsBefore[k], b = store.gifts[k];
      if(b==null || b===false) store.gifts[k] = a;
      else if(typeof a === "string" && typeof b === "string") store.gifts[k] = a > b ? a : b;
      else if(a) store.gifts[k] = a;
    });
    if(Object.keys(giftsBefore).length) saveStore(store);
  }catch(e){
    dbReady = false;                              // fall back silently to localStorage
  }
}

let store = loadStore();
store.practice = store.practice || {};   // {topicId:{done,correct}}
store.tests = store.tests || [];         // [{date,score,totalMarks,correct,total,timeUsed}]
store.stars = store.stars || 0;
store.gold  = store.gold  || 0;          // bonus gold — spent in the shop
store.bag   = store.bag   || {};         // collected items: {emoji: count}
store.shop  = store.shop  || {};         // purchased shop items: {itemId:true}
store.equip = store.equip || { skin:"classic", decor:null };  // equipped cosmetics
// New equip slots (added incrementally so old saves upgrade cleanly)
if(store.equip.hat   === undefined) store.equip.hat   = null;    // hat worn over the skin
if(store.equip.pet   === undefined) store.equip.pet   = null;    // companion on the trail
if(store.equip.trail === undefined) store.equip.trail = null;    // hop particle effect
if(store.equip.theme === undefined) store.equip.theme = "meadow";// map background theme
store.boosters = store.boosters || {};   // (legacy) owned consumable boosters
if(store.soundOn === undefined) store.soundOn = true;   // sound ON by default (has mute button)
store.gifts = store.gifts || {};         // gifts: launch flags + daily/weekly period keys

/* ---- gifts: launch (one-time) + daily + weekly ---- */
// store.gifts shape:
//   { [launchId]: true, daily: "YYYY-MM-DD", weekly: "YYYY-MM-DD"(Monday) }
const LAUNCH_GIFT = {
  id: "launch_v2_200",
  gold: 200,
  endsAt: "2026-08-31T23:59:59+07:00",   // auto-off after this date
};
const DAILY_GIFT  = { id:"daily",  gold:50,  label:"Daily"  };
const WEEKLY_GIFT = { id:"weekly", gold:200, label:"Weekly" };

function pad2(n){ return String(n).padStart(2,"0"); }
function localDayKey(d){
  const x = d || new Date();
  return x.getFullYear()+"-"+pad2(x.getMonth()+1)+"-"+pad2(x.getDate());
}
// Week key = Monday of the current local week (Mon–Sun).
function localWeekKey(d){
  const x = new Date((d||new Date()).getFullYear(), (d||new Date()).getMonth(), (d||new Date()).getDate());
  const dow = (x.getDay()+6)%7; // Mon=0 … Sun=6
  x.setDate(x.getDate()-dow);
  return localDayKey(x);
}

function launchGiftActive(){
  if(!LAUNCH_GIFT || !LAUNCH_GIFT.id) return false;
  if(Date.now() > Date.parse(LAUNCH_GIFT.endsAt)) return false;
  if(store.gifts && store.gifts[LAUNCH_GIFT.id]) return false;
  return true;
}
function dailyGiftReady(){  return (store.gifts&&store.gifts.daily)  !== localDayKey(); }
function weeklyGiftReady(){ return (store.gifts&&store.gifts.weekly) !== localWeekKey(); }

function claimLaunchGift(){
  if(!launchGiftActive()) return false;
  store.gifts = store.gifts || {};
  store.gifts[LAUNCH_GIFT.id] = true;
  addGold(LAUNCH_GIFT.gold|0);
  saveStore(store);
  const ov = document.getElementById("launchGiftOverlay");
  if(ov) ov.remove();
  try{ sfxFanfare(true); confetti(true); }catch(e){}
  goldToast(LAUNCH_GIFT.gold);
  goHome();
  return true;
}
function claimDailyGift(){
  if(!dailyGiftReady()) return false;
  store.gifts = store.gifts || {};
  store.gifts.daily = localDayKey();
  addGold(DAILY_GIFT.gold|0);
  saveStore(store);
  try{ sfxStar(); confetti(); }catch(e){}
  goldToast(DAILY_GIFT.gold);
  goHome();
  return true;
}
function claimWeeklyGift(){
  if(!weeklyGiftReady()) return false;
  store.gifts = store.gifts || {};
  store.gifts.weekly = localWeekKey();
  addGold(WEEKLY_GIFT.gold|0);
  saveStore(store);
  try{ sfxFanfare(true); confetti(true); }catch(e){}
  goldToast(WEEKLY_GIFT.gold);
  goHome();
  return true;
}
function maybeOfferLaunchGift(){
  if(!launchGiftActive()) return;
  if(document.getElementById("launchGiftOverlay")) return;
  const ov = document.createElement("div");
  ov.id = "launchGiftOverlay";
  ov.className = "gift-overlay";
  ov.innerHTML = `
    <div class="gift-modal" role="dialog" aria-labelledby="giftTitle">
      <div class="gift-badge">🎁</div>
      <h2 id="giftTitle">New version gift!</h2>
      <p>Welcome to the new update — tap once to collect your launch gold.</p>
      <div class="gift-amt">${goldSVG()} +${LAUNCH_GIFT.gold} gold</div>
      <button type="button" class="btn btn-yellow" onclick="claimLaunchGift()">Claim gift</button>
    </div>`;
  document.body.appendChild(ov);
}

/* ---- styled confirm / alert (replaces native browser dialogs) ---- */
function uiDialog(opts){
  const {
    title = "",
    message = "",
    icon = "✨",
    tone = "",
    confirmLabel = "OK",
    cancelLabel = null,
    confirmClass = "btn-pink",
  } = opts || {};
  return new Promise(resolve => {
    const prev = document.getElementById("uiDialogOverlay");
    if(prev) prev.remove();
    const ov = document.createElement("div");
    ov.id = "uiDialogOverlay";
    ov.className = "ui-overlay";
    ov.setAttribute("role", "dialog");
    ov.setAttribute("aria-modal", "true");
    const toneCls = tone ? ` ${tone}` : "";
    const cancelHtml = cancelLabel
      ? `<button type="button" class="btn btn-ghost" data-ui="cancel">${esc(cancelLabel)}</button>`
      : "";
    ov.innerHTML = `<div class="ui-modal${toneCls}">
      <div class="ui-icon" aria-hidden="true">${icon}</div>
      ${title ? `<div class="ui-title">${esc(title)}</div>` : ""}
      <div class="ui-msg">${esc(message)}</div>
      <div class="ui-actions">
        ${cancelHtml}
        <button type="button" class="btn ${confirmClass}" data-ui="ok">${esc(confirmLabel)}</button>
      </div>
    </div>`;
    const close = (val) => {
      ov.remove();
      document.removeEventListener("keydown", onKey);
      resolve(val);
    };
    const onKey = (e) => {
      if(e.key === "Escape" && cancelLabel){ e.preventDefault(); close(false); }
      else if(e.key === "Enter"){ e.preventDefault(); close(true); }
    };
    ov.addEventListener("click", (e) => {
      if(e.target === ov && cancelLabel) close(false);
    });
    ov.querySelector('[data-ui="ok"]').addEventListener("click", () => close(true));
    const cancelBtn = ov.querySelector('[data-ui="cancel"]');
    if(cancelBtn) cancelBtn.addEventListener("click", () => close(false));
    document.addEventListener("keydown", onKey);
    document.body.appendChild(ov);
    try{ ov.querySelector('[data-ui="ok"]').focus(); }catch(e){}
  });
}
function uiConfirm(message, opts){
  return uiDialog(Object.assign({
    title: "Are you sure?",
    message,
    icon: "💭",
    confirmLabel: "OK",
    cancelLabel: "Cancel",
    confirmClass: "btn-pink",
  }, opts || {}));
}
function uiAlert(message, opts){
  return uiDialog(Object.assign({
    title: "Oops!",
    message,
    icon: "🪙",
    tone: "gold",
    confirmLabel: "Got it",
    cancelLabel: null,
    confirmClass: "btn-yellow",
  }, opts || {}));
}
function giftChipHtml(kind){
  const cfg = kind==="daily" ? DAILY_GIFT : WEEKLY_GIFT;
  const ready = kind==="daily" ? dailyGiftReady() : weeklyGiftReady();
  const onclick = kind==="daily" ? "claimDailyGift()" : "claimWeeklyGift()";
  if(ready){
    return `<button type="button" class="gift-chip ready" onclick="${onclick}" aria-label="Claim ${cfg.label} ${cfg.gold} gold">🎁 ${cfg.label} +${cfg.gold}</button>`;
  }
  return `<button type="button" class="gift-chip done" disabled aria-label="${cfg.label} gift claimed">✓ ${cfg.label}</button>`;
}
function homeGiftsHtml(){
  return `<div class="gift-float">${giftChipHtml("daily")}${giftChipHtml("weekly")}</div>`;
}

/* ---- reward economy (shared by practice & test) ---- */
// Collectible items that can randomly drop on a correct answer.
const ITEMS = [
  {e:"🍎",n:"Apple"}, {e:"🌰",n:"Acorn"}, {e:"🍄",n:"Mushroom"},
  {e:"🍓",n:"Strawberry"}, {e:"🎀",n:"Ribbon"}, {e:"🌸",n:"Blossom"},
  {e:"🍯",n:"Honey"}, {e:"🧩",n:"Puzzle"}, {e:"💎",n:"Gem"},
  // ---- sweet, girly extras (drawn as pretty SVG below) ----
  {e:"💖",n:"Heart"}, {e:"⭐",n:"Star"}, {e:"🍦",n:"Ice Cream"},
  {e:"🍭",n:"Lollipop"}, {e:"🎈",n:"Balloon"}, {e:"🌈",n:"Rainbow"},
  {e:"🧁",n:"Cupcake"}, {e:"🍩",n:"Donut"}, {e:"🐚",n:"Seashell"},
  {e:"🌙",n:"Moon"}, {e:"🦋",n:"Butterfly"}, {e:"💍",n:"Ring"}, {e:"👑",n:"Crown"}
];
// Streak multiplier: 1x, then x2 from a 3-streak, x3 from a 5-streak.
function streakMult(streak){ return streak>=5 ? 3 : streak>=3 ? 2 : 1; }
function addStars(n){ store.stars += n; }
function addGold(n){ store.gold += n; }
function collectItem(){   // returns the item dropped, or null
  const it = pick(ITEMS);
  store.bag[it.e] = (store.bag[it.e]||0) + 1;
  return it;
}
// Central place to award a correct answer. Returns a summary for the UI.
// hope = the "Star of Hope" was active (double or nothing).
function awardCorrect(streak, hope){
  const mult = streakMult(streak) * (hope ? 2 : 1);
  const starsWon = 1 * mult;                       // base 1 star, boosted
  let goldWon = 0;
  if(streak>=3) goldWon += 1;                      // combo bonus gold
  if(streak>=5) goldWon += 1;
  if(hope) goldWon += 2;                           // brave bet bonus
  // Collectible items are no longer dropped randomly here — they now live on the
  // adventure trail and are picked up when the hedgehog runs over them (see
  // collectTrailItem + hopRunner). This keeps the reward the child can SEE.
  addStars(starsWon); addGold(goldWon);
  saveStore(store);
  return { mult, starsWon, goldWon, item:null };
}
// Add one specific collectible (by emoji) to the bag and persist. Returns the item.
function collectToBag(emoji){
  store.bag[emoji] = (store.bag[emoji]||0) + 1;
  saveStore(store);
  return ITEMS.find(it=>it.e===emoji) || {e:emoji, n:""};
}
// The hedgehog reached step `steps`; if a trail item sits there, pocket it.
function collectTrailItem(steps){
  const emoji = (P && P.items) ? P.items[steps] : null;
  if(!emoji) return null;
  return collectToBag(emoji);
}

function bumpPractice(topicId, correct){
  const p = store.practice[topicId] = store.practice[topicId] || {done:0,correct:0};
  p.done++; if(correct){ p.correct++; }
  saveStore(store);
}

function placeArt(inner, tx, ty, scale){ return `<g transform="translate(${tx},${ty}) scale(${scale}) translate(-32,-32)">${inner}</g>`; }

// The caller picks the side so the pet never gets pushed off the map edge.
function petSceneArt(petId, side){
  if(!petId) return "";
  const dx = 22 * (side===1 ? 1 : -1);
  const svg = placeArt(PET_ART[petId]||"", 0, 0, 0.36);
  return `<g transform="translate(${dx},4)"><g id="scenePet" class="scene-pet">
      <g class="scene-pet-svg" style="display:none">${svg}</g>
      <image class="scene-pet-img" href="images/gen/pet-${petId}.png" x="-18" y="-20" width="36" height="36" preserveAspectRatio="xMidYMid meet" onerror="var s=this.parentNode.querySelector('.scene-pet-svg');if(s)s.style.display='';this.remove()"/>

}
