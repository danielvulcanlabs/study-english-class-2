// Shop-card art for pets & hats (polished SVG with rarity frame).
function petPreview(id, price){ return cosmeticShopPreview(PET_ART[id]||"", "p_"+id, price); }

function trailPreview(id){ return svgPreview(TRAIL_DEF[id]?TRAIL_DEF[id].icon:""); }
function themePreview(id){
  const t = THEME_DEF[id]||THEME_DEF.meadow;
  const orb = t.orb.moon ? `<circle cx="46" cy="18" r="8" fill="${t.orb.c}"/><circle cx="43" cy="16" r="2" fill="#0000" stroke="#c8c8f0" stroke-width="0" opacity=".3"/>` : `<circle cx="46" cy="18" r="8" fill="${t.orb.c}"/>`;

}

function shopRarity(price){ return price>=90?"legendary":price>=45?"epic":price>=25?"rare":"common"; }
function shopItem(id){ return SHOP.find(s=>s.id===id); }
// Free defaults are always "owned" so the player can switch back to them.
const FREE_ITEMS = { skin_classic:true, theme_meadow:true };
function owns(id){ if(FREE_ITEMS[id]) return true; return !!(store.shop && store.shop[id]); }
// Buy an item. Returns {ok, reason}.
function buyItem(id){
  const it = shopItem(id); if(!it) return {ok:false,reason:"missing"};
  if(owns(id)) return {ok:false,reason:"owned"};
  if(store.gold < it.price) return {ok:false,reason:"gold"};
  store.gold -= it.price;
  store.shop[id] = true;
  saveStore(store);
  return {ok:true};
}
// Equip a cosmetic. skin & theme are single-choice; hat/pet/trail toggle on/off.
function equipItem(id){
  const it = shopItem(id); if(!it || !owns(id)) return false;
  const single = { skin:"skin", theme:"theme" };
  const toggle = { hat:"hat", pet:"pet", trail:"trail" };
  if(single[it.type]){ store.equip[single[it.type]] = it.ref; saveStore(store); return true; }
  if(toggle[it.type]){ const k=toggle[it.type]; store.equip[k] = (store.equip[k]===it.ref)?null:it.ref; saveStore(store); return true; }
  return false;
}
// Sell one collectible from the bag for gold. Returns {ok, gold}.
function sellItem(emoji){
  if(!(store.bag && store.bag[emoji] > 0)) return {ok:false};
  const g = itemSellPrice(emoji);
  store.bag[emoji] -= 1;
  if(store.bag[emoji] <= 0) delete store.bag[emoji];
  store.gold += g;
  saveStore(store);
  return {ok:true, gold:g};
}
// Resale value of a purchased cosmetic = half its buy price (rounded down).
function cosmeticResale(id){ const it = shopItem(id); return it ? Math.floor(it.price/2) : 0; }
// Sell back an owned cosmetic for half price; unequips it if it was worn.
function resellCosmetic(id){
  const it = shopItem(id); if(!it) return {ok:false};
  if(FREE_ITEMS[id]) return {ok:false, reason:"free"};
  if(!(store.shop && store.shop[id])) return {ok:false, reason:"notowned"};
  const refund = cosmeticResale(id);
  if(store.equip[it.type] === it.ref){          // was equipped → revert to default/none
    if(it.type === "skin")       store.equip.skin  = "classic";
    else if(it.type === "theme") store.equip.theme = "meadow";
    else                         store.equip[it.type] = null;
  }
  delete store.shop[id];
  store.gold += refund;
  saveStore(store);
  return {ok:true, refund};
}

/* ============ SQUARE FOREST MAP (practice sidebar) ============ */
// A winding forest trail laid out inside a SQUARE viewBox: one numbered station
// per question. The hedgehog stands on the current station and hops to the next
// on every correct answer. Reuses #hogWrap/#hogG so hopRunner()/hogMood() work.
const SMAP_W = 240, SMAP_H = 240;   // square viewBox
const SMAP_PAD = 30;                // margin so the trail never touches the frame
function stationCount(total){ return Math.max(1, total); }
// Kept for compatibility with scrollMapToHog(); the square map is fully visible.
function stationMapHeight(total){ return SMAP_H; }
// Smooth point on the trail for fraction t (0 = start at the bottom, 1 = finish
// at the top). The trail snakes left/right ~1.5 times as it climbs the square.
function stationPointAt(t){
  const y = SMAP_H - SMAP_PAD - t * (SMAP_H - 2*SMAP_PAD);   // climb bottom → top
  const swing = SMAP_W/2 - SMAP_PAD - 4;
  const x = SMAP_W/2 + Math.sin(t * Math.PI * 3) * swing;    // winding forest path
  return { x, y };
}
// Returns {x,y} for station i (0 = start). Evenly spaced along the winding trail.
function stationXY(i, total){ return stationPointAt(i / stationCount(total)); }
// A single smooth path traced densely along the winding trail.
function stationPathD(total){
  let d = "";
  for(let k=0;k<=72;k++){ const p = stationPointAt(k/72); d += (k? "L":"M") + p.x.toFixed(1) + " " + p.y.toFixed(1) + " "; }
  return d;
}

function stationSceneHtml(steps, total, itemsAt){
  const n = stationCount(total);

  const hog = stationXY(Math.min(n, steps), total);
  let nodes = "";
  for(let i=0;i<=n;i++){
    const p = stationXY(i, total);
    const passed = i < steps;
    const current = i === steps;
    if(i===n){
      // Finish: small ring + flag + flower wreath base.
      nodes += `<g class="station-node finish-flag" data-step="${i}" transform="translate(${p.x.toFixed(1)},${p.y.toFixed(1)})">
        <circle r="8" fill="#fff" opacity=".92"/><circle r="8" fill="none" stroke="#ff5a6e" stroke-width="1.8"/>

        <g transform="translate(-1,-16)"><rect x="0" y="0" width="2" height="16" fill="#7a7a7a"/>

    }else{
      const fill = passed ? th.trail[1] : "#ffffff";
      const stroke = passed ? th.trail[1] : (current ? "#ff9f43" : th.trail[1]);
      const op = (!passed && !current) ? ".55" : "1";
      const inner = passed
        ? `<path d="M-2.4 0 L-.7 1.8 L2.4 -1.8" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`
        : `<text x="0" y="2.5" text-anchor="middle" font-size="7.5" font-weight="800" fill="${current?'#ff7a1a':th.trail[1]}">${i+1}</text>`;
      const innerCls = current ? "station-cur" : (passed ? "station-done" : "");
      const pulse = current ? `<circle class="station-pulse" r="12" fill="none" stroke="#ff9f43" stroke-width="1.5" opacity=".6"/>` : "";

  }).join("");
  const pet = petSceneArt(store.equip&&store.equip.pet, hog.x < SMAP_W*0.5 ? 1 : -1);
  return `<div class="smap" id="smapBox">
   <svg viewBox="0 0 ${SMAP_W} ${SMAP_H}" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="ssky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${th.sky[0]}"/><stop offset=".5" stop-color="${th.sky[1]}"/><stop offset="1" stop-color="${th.sky[2]}"/></linearGradient>
      <linearGradient id="strailG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${th.trail[0]}"/><stop offset="1" stop-color="${th.trail[1]}"/></linearGradient>
      <linearGradient id="fray" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fffbe0" stop-opacity=".85"/><stop offset="1" stop-color="#fffbe0" stop-opacity="0"/></linearGradient>
      <linearGradient id="rbBody" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff8fb3"/><stop offset=".5" stop-color="#ffd76b"/><stop offset="1" stop-color="#7fd0ff"/></linearGradient>
      <linearGradient id="crownG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffe58a"/><stop offset="1" stop-color="#f0a500"/></linearGradient>
      <filter id="soft"><feGaussianBlur stdDeviation="3"/></filter>
      <radialGradient id="fvig" cx="0.5" cy="0.46" r="0.68"><stop offset="0" stop-color="#000" stop-opacity="0"/><stop offset=".82" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#1c3a20" stop-opacity=".12"/></radialGradient>
    </defs>
    <rect width="${SMAP_W}" height="${SMAP_H}" fill="url(#ssky)"/>
    ${forestSceneSVG(th)}
    <path d="${stationPathD(total)}" fill="none" stroke="rgba(40,28,16,.28)" stroke-width="12" stroke-linecap="round"/>
    <path d="${stationPathD(total)}" fill="none" stroke="url(#strailG)" stroke-width="8" stroke-linecap="round"/>
    <path d="${stationPathD(total)}" fill="none" stroke="#f5e6c8" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 9" opacity=".7" class="trail-anim"/>
    <path d="${stationPathD(total)}" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="1 12" opacity=".5" class="trail-anim" style="animation-duration:9s;animation-delay:.4s"/>

// Scroll the vertical station map so the hedgehog stays comfortably in view.
function scrollMapToHog(smooth){
  const box = document.getElementById("smapBox");
  const wrap = document.getElementById("hogWrap");
  if(!box || !wrap) return;
  try{
    // Map hog's SVG y to pixel offset inside the scroll box.
    const svg = box.querySelector("svg");
    const vb = svg.viewBox.baseVal;                 // {y, height} in svg units
    const m = /translate\(([-\d.]+),([-\d.]+)\)/.exec(wrap.getAttribute("transform")||"");
    const hogY = m ? parseFloat(m[2]) : 0;
    const frac = (hogY - vb.y) / vb.height;          // 0..1 down the map
    const target = frac * box.scrollHeight - box.clientHeight * 0.55;
    box.scrollTo({ top: Math.max(0, target), behavior: smooth===false ? "auto" : "smooth" });
  }catch(e){}
}
// Move the hedgehog to its new spot on the trail, hop, and pop any item it reaches.
function hopRunner(steps, total){
  const wrap = document.getElementById("hogWrap");
  const g = document.getElementById("hogG");
  const n = Math.max(1, total);
  const vertical = !!document.getElementById("smapBox");   // practice station map
  const p = vertical ? stationXY(Math.min(n, steps), total) : trailXY(Math.min(1, steps/n));
  const dy = vertical ? 4 : 18;
  if(wrap) wrap.setAttribute("transform", `translate(${p.x.toFixed(1)},${(p.y-dy).toFixed(1)})`);
  if(vertical) scrollMapToHog(true);
  if(wrap){ wrap.classList.remove("hopping"); void wrap.offsetWidth; wrap.classList.add("hopping"); setTimeout(()=>wrap.classList.remove("hopping"),680); }
  pauseHogIdle();
  if(g){ g.classList.remove("hop"); void g.getBBox && g.getBBox(); g.classList.add("hop"); setTimeout(()=>g.classList.remove("hop"),650); }
  const pet = document.getElementById("scenePet");
  if(pet){ pet.classList.remove("hop-sync"); void pet.getBBox?.(); pet.classList.add("hop-sync"); setTimeout(()=>pet.classList.remove("hop-sync"),680); }
  if(steps > 0) popStation(steps - 1);
  emitTrailFX(wrap);   // sparkle/heart/etc particles behind the hopping hedgehog
  emitMoveFX(wrap);    // dirt + leaf puff kicked up as the hedgehog scampers on
  // If a collectible sits at this step, the hedgehog scoops it into the bag.
  const emoji = (P && P.items) ? P.items[steps] : null;
  const slot = document.querySelector('.item-slot[data-step="'+steps+'"] .item-node');
  if(slot && emoji){
    setTimeout(()=>{
      slot.classList.add("got");
      flyEmojiToBag(slot, emoji);
      const bc = document.getElementById("bagCount");
      if(bc) bc.textContent = bagCountTotal();
      const coin = document.getElementById("bagCoin");
      if(coin){ coin.classList.remove("pulse"); void coin.offsetWidth; coin.classList.add("pulse"); }
    }, 260);
  }
}

// Shared arc-and-fade flyer from a source element to a target counter.
function flyNodeToTarget(srcEl, target, innerHTML){
  try{
    if(!srcEl || !target) return;
    const src = srcEl.getBoundingClientRect();
    const tb = target.getBoundingClientRect();
    const f = document.createElement("div");
    f.className = "flyer";
    f.innerHTML = innerHTML;
    f.style.left = src.left + src.width/2 - 13 + "px";
    f.style.top  = src.top + src.height/2 - 13 + "px";
    document.body.appendChild(f);
    requestAnimationFrame(()=>{
      const dx = (tb.left+tb.width/2) - (src.left+src.width/2);
      const dy = (tb.top+tb.height/2) - (src.top+src.height/2);
      f.style.transform = `translate(${dx}px,${dy}px) scale(.7)`;
      f.style.opacity = "0.2";
    });
    setTimeout(()=>{ f.remove(); target.classList.remove("pulse"); void target.offsetWidth; target.classList.add("pulse"); }, 720);
  }catch(e){}
}

function emitTrailFX(wrapEl){

/* ================= sound engine (Web Audio, no external files) =================
   Diverse, non-repeating sound effects + a gentle procedural background melody.
   Everything is generated live so it never sounds exactly the same twice.
   All Web Audio calls are guarded so the app still works where audio is
   unavailable (e.g. headless test runners without AudioContext).           */
let audioCtx = null, masterGain = null, sfxGain = null, musicGain = null;
let musicTimer = null, musicOn = false;

function audioAvailable(){ return typeof (window.AudioContext||window.webkitAudioContext) === "function"; }

// Create the context on a user gesture (browsers block autoplay otherwise).
function initAudio(){
  if(audioCtx || !audioAvailable()) { if(audioCtx && audioCtx.state==="suspended") audioCtx.resume(); return !!audioCtx; }
  try{
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    masterGain = audioCtx.createGain(); masterGain.gain.value = 1; masterGain.connect(audioCtx.destination);
    sfxGain = audioCtx.createGain();    sfxGain.gain.value = 0.8;  sfxGain.connect(masterGain);
    musicGain = audioCtx.createGain();  musicGain.gain.value = 0.0; musicGain.connect(masterGain); // fade in later
    unlockAudio();   // must happen INSIDE the user gesture that first created the context
  }catch(e){ audioCtx = null; }
  return !!audioCtx;
}
// iOS/Safari (and Chrome autoplay) keep a new AudioContext "suspended" and only
// truly unlock it if we (a) call resume() AND (b) actually start a sound source,
// all SYNCHRONOUSLY within the tap that created the context. Playing one silent
// buffer here is the standard trick that flips the context to "running" for real.
function unlockAudio(){
  if(!audioCtx) return;
  try{
    if(audioCtx.resume) audioCtx.resume();
    const buf = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.connect(audioCtx.destination); src.start(0);
  }catch(e){}
}
function soundEnabled(){ return !!store.soundOn; }

// Play one note. wave: sine/triangle/square; t0 offset seconds; dur seconds.
function tone(freq, t0, dur, wave, peak, dest){
  if(!audioCtx) return;
  try{
    const now = audioCtx.currentTime + t0;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = wave || "sine"; o.frequency.setValueAtTime(freq, now);
    g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(peak || 0.22, now + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    o.connect(g); g.connect(dest || sfxGain);
    o.start(now); o.stop(now + dur + 0.02);
  }catch(e){}
}
// A short glide (used for "boing"/"whoosh").
function glide(f1, f2, t0, dur, wave, peak){
  if(!audioCtx) return;
  try{
    const now = audioCtx.currentTime + t0;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = wave || "sine";
    o.frequency.setValueAtTime(f1, now);
    o.frequency.exponentialRampToValueAtTime(Math.max(1,f2), now + dur);
    g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(peak || 0.2, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    o.connect(g); g.connect(sfxGain);
    o.start(now); o.stop(now + dur + 0.02);
  }catch(e){}
}
// A bright "bell/pluck": a note plus its octave+fifth harmonics with a shimmer tail.
function bell(freq, t0, dur, peak, dest){
  if(!audioCtx) return;
  tone(freq, t0, dur, "triangle", (peak||0.2), dest);
  tone(freq*2, t0, dur*0.7, "sine", (peak||0.2)*0.45, dest);
  tone(freq*3, t0, dur*0.45, "sine", (peak||0.2)*0.2, dest);
}
// Soft filtered-noise percussion (light hat / shaker) — very quiet, adds groove.
let _noiseBuf = null;
function perc(t0, dur, peak, cutoff, dest){
  if(!audioCtx) return;
  try{
    if(!_noiseBuf){
      _noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.3, audioCtx.sampleRate);
      const d = _noiseBuf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
    }
    const now = audioCtx.currentTime + t0;
    const src = audioCtx.createBufferSource(); src.buffer = _noiseBuf;
    const g = audioCtx.createGain();
    let node = src;
    if(audioCtx.createBiquadFilter){
      const f = audioCtx.createBiquadFilter(); f.type = "highpass"; f.frequency.value = cutoff || 6000;
      src.connect(f); node = f;
    }
    g.gain.setValueAtTime(peak || 0.04, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + (dur||0.06));
    node.connect(g); g.connect(dest || sfxGain);
    src.start(now); src.stop(now + (dur||0.06) + 0.02);
  }catch(e){}
}

// Shuffle-bag: returns items in random order without repeating until exhausted,
// so consecutive sounds are always different.
function makeBag(n){
  let order=[], last=-1;
  return ()=>{
    if(!order.length){
      order = shuffle([...Array(n).keys()]);
      // avoid repeating the previous draw across a reshuffle (pop() takes the last item)
      if(n>1 && order[order.length-1]===last) order.unshift(order.pop());
    }
    return (last = order.pop());
  };
}
const _correctBag = makeBag(6), _wrongBag = makeBag(4), _fanfareBag = makeBag(3);
const J = () => 0.97 + Math.random()*0.06;              // tiny pitch jitter per play
const S = { C:261.63,D:293.66,E:329.63,F:349.23,G:392,A:440,B:493.88,
            C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880,C6:1046.5 };

// Happy "correct" — bright bell arpeggios (6 patterns), escalates on a hot streak.
function sfxCorrect(streak){
  if(!soundEnabled() || !initAudio()) return;
  duckMusic();
  perc(0, 0.05, 0.05, 8000);                              // tiny sparkle transient
  if(streak && streak>=5){ // big, joyful celebration for hot streaks
    [S.C5,S.E5,S.G5,S.C6,S.E5,S.G5,S.C6].forEach((f,i)=> bell(f*J(), i*0.075, 0.34, 0.2));
    bell(S.G5*J(), 0.6, 0.5, 0.14); bell(S.C6*J(), 0.66, 0.7, 0.15);
    return;
  }
  const patterns = [
    ["C5","E5","G5"],
    ["G","C5","E5","G5"],
    ["E5","G5","C6"],
    ["C5","D5","E5","G5"],
    ["G5","E5","C6"],
    ["C5","G5","C6"],
  ];
  const p = patterns[_correctBag()];
  p.forEach((n,i)=> bell(S[n]*J(), i*0.085, 0.3, 0.2));
  bell(p.map(x=>S[x]).reduce((a,b)=>Math.max(a,b))*J()*1.0, p.length*0.085+0.02, 0.5, 0.12); // shimmer tail
}

// Gentle "not quite" — soft, cute & friendly (never harsh), 4 variants.

    case 1: glide(360, 200, 0, 0.30, "triangle", 0.16); tone(S.C*J(),0.24,0.2,"sine",0.1); break; // cute "bloop"
    case 2: tone(S.D*J(),0,0.15,"sine",0.16); tone(S.A/2*J(),0.14,0.28,"triangle",0.15); break;
    case 3: glide(300, 240, 0, 0.16, "sine", 0.15); glide(240, 300, 0.16, 0.18, "sine", 0.13); break; // playful wobble

function sfxStar(){

function sfxFanfare(win){

// Soft "pop" for taps / navigation.
function sfxTap(){ if(!soundEnabled() || !audioCtx) return; glide(520, 660, 0, 0.09, "sine", 0.10); }

// Briefly lower the music so effects stand out, then restore.
function duckMusic(mult){
  if(!audioCtx || !musicGain || !musicOn) return;
  try{
    const now = audioCtx.currentTime, base = MUSIC_VOL;
    musicGain.gain.cancelScheduledValues(now);
    musicGain.gain.setValueAtTime(base*0.35, now);
    musicGain.gain.linearRampToValueAtTime(base, now + 0.6*(mult||1));
  }catch(e){}
}

/* ---- Background music: a little "jukebox" of cheerful tunes ------------------
   Several different songs (each its own chord loop, tempo, mood & melody scale).
   A tune plays for a while, then the app smoothly switches to a DIFFERENT one —
   and switchTune() is also called whenever the child moves to a new screen, so
   every screen tends to feel musically fresh. Everything is generated live so
   no bar ever repeats exactly. Mixed a good deal LOUDER than before, but still
   ducks under the sound-effects so answers always cut through.                 */
const MUSIC_VOL = 0.5;                  // was 0.34 — raised ~50% so background music is louder
// Scales used for the melodies (all pleasant, no wrong notes possible).
const SCALE_MAJOR = [S.C,S.D,S.E,S.G,S.A,S.C5,S.D5,S.E5,S.G5,S.A5];          // bright & happy
const SCALE_MAJ7  = [S.C,S.E,S.G,S.B,S.D5,S.E5,S.G5,S.A5,S.C6];               // dreamy / floaty
const SCALE_MIXO  = [S.C,S.D,S.E,S.G,S.A,S.C5,S.D5,S.E5,S.G5];                // playful bounce
// A "song" = chord progression + tempo + which scale the melody draws from +
// how busy/long the notes are + which wave gives its melody its character.
const SONGS = [
  { name:"sunny",   eighth:0.205, scale:SCALE_MAJOR, wave:"triangle", density:0.66, swing:0.55,
    prog:[ {bass:65.41,pad:[S.C,S.G]}, {bass:98.00,pad:[S.G,S.D5]}, {bass:110.00,pad:[S.A,S.E5]}, {bass:87.31,pad:[S.F,S.C5]} ] }, // C G Am F
  { name:"skip",    eighth:0.185, scale:SCALE_MIXO,  wave:"square",   density:0.72, swing:0.62,
    prog:[ {bass:87.31,pad:[S.F,S.A]}, {bass:65.41,pad:[S.C,S.E5]}, {bass:98.00,pad:[S.G,S.D5]}, {bass:98.00,pad:[S.G,S.B]} ] },   // F C G G
  { name:"dreamy",  eighth:0.235, scale:SCALE_MAJ7,  wave:"sine",     density:0.55, swing:0.50,
    prog:[ {bass:65.41,pad:[S.E,S.G]}, {bass:110.00,pad:[S.A,S.C5]}, {bass:87.31,pad:[S.F,S.A]}, {bass:98.00,pad:[S.G,S.D5]} ] },  // C Am F G
  { name:"bounce",  eighth:0.170, scale:SCALE_MAJOR, wave:"triangle", density:0.74, swing:0.60,
    prog:[ {bass:73.42,pad:[S.D,S.A]}, {bass:98.00,pad:[S.G,S.B]}, {bass:65.41,pad:[S.C,S.E5]}, {bass:98.00,pad:[S.G,S.D5]} ] },   // D G C G
];
let _mStep = 0, _mBar = 0, _songIdx = 0, _barsThisSong = 0, _lastMel = -1;
const _songBag = makeBag(SONGS.length);
const MUSIC_EIGHTH = 0.2;               // fixed step clock (200ms) — one interval for all songs
// Switch to a fresh, different tune. Does NOT touch the interval or gain, so it
// can be called any time (including mid-song) without ever stopping the music.
function switchTune(){
  _songIdx = _songBag();
  _mBar = 0;                            // start the new tune's chord loop cleanly
}

// The core sequencer step — runs on a plain setInterval (rock-solid) at a fixed
// clock; each song just picks different notes/feel, not a different clock.
function musicStep(){
  if(!musicOn || !audioCtx) return;
  const song = SONGS[_songIdx];
  const EIGHTH = MUSIC_EIGHTH;
  const STEPS = 8;
  const pos = _mStep % STEPS;
  const bar = song.prog[_mBar % song.prog.length];
  const swingOff = (pos%2===1) ? EIGHTH*(song.swing-0.5)*0.5 : 0;
  if(pos === 0){                                    // new bar → soft pad chord
    bar.pad.forEach(f=> tone(f/2, 0, EIGHTH*7.5, "sine", 0.05, musicGain));
    tone(bar.pad[0], 0, EIGHTH*7.5, "sine", 0.03, musicGain);
  }
  // plucky bass line
  if(pos===0) bell(bar.bass, 0, EIGHTH*1.4, 0.13, musicGain);
  else if(pos===3) bell(bar.bass*1.5, swingOff, EIGHTH*0.9, 0.08, musicGain);
  else if(pos===4) bell(bar.bass, 0, EIGHTH*1.2, 0.11, musicGain);
  else if(pos===6 && Math.random()>0.5) bell(bar.bass*2, swingOff, EIGHTH*0.7, 0.06, musicGain);
  // groove: shaker on off-beats + soft "kick" on the down-beat
  if(pos%2===1) perc(swingOff, 0.05, 0.032, 9000, musicGain);
  if(pos===0 || pos===4) perc(0, 0.06, 0.04, 2600, musicGain);
  // playful melody from this song's scale
  if(Math.random() < song.density){
    const scale = song.scale;
    let mi = Math.floor(Math.random()*scale.length);
    if(mi === _lastMel) mi = (mi+1)%scale.length;
    _lastMel = mi;
    const f = scale[mi];
    const long = Math.random()>0.72;
    tone(f, swingOff, EIGHTH*(long?1.7:0.85), song.wave, 0.07, musicGain);
    if(Math.random()>0.8) tone(f*2, swingOff+EIGHTH*0.5, EIGHTH*0.6, "sine", 0.035, musicGain);
  }
  _mStep++;
  if(pos === STEPS-1){
    _mBar++; _barsThisSong++;
    if(_barsThisSong >= 8){ _barsThisSong = 0; switchTune(); }   // freshen tune every 8 bars
  }
}

function startMusic(){
  if(!soundEnabled() || !initAudio() || musicOn) return;
  musicOn = true;
  _songIdx = _songBag();                 // pick a starting tune
  _mStep = 0; _mBar = 0; _barsThisSong = 0;
  // initAudio() already called unlockAudio() (resume + a silent source) inside the
  // tap, so the context is unlocking now. Start the sequencer straight away — notes
  // are scheduled on the context clock and will sound as soon as it flips to running
  // (a few ms). We also re-resume defensively in case the browser is slow.
  if(audioCtx.state === "suspended" && audioCtx.resume){ try{ audioCtx.resume(); }catch(e){} }
  try{
    musicGain.gain.cancelScheduledValues(audioCtx.currentTime);
    musicGain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    musicGain.gain.linearRampToValueAtTime(MUSIC_VOL, audioCtx.currentTime + 0.9);
  }catch(e){}
  if(musicTimer){ clearInterval(musicTimer); musicTimer = null; }
  musicStep();
  musicTimer = setInterval(musicStep, MUSIC_EIGHTH*1000);
}
function stopMusic(){
  musicOn = false;
  if(musicTimer){ clearInterval(musicTimer); musicTimer = null; }
  if(audioCtx && musicGain){ try{
    const now = audioCtx.currentTime;
    musicGain.gain.cancelScheduledValues(now);
    musicGain.gain.linearRampToValueAtTime(0.0001, now + 0.4);
  }catch(e){} }
}
// Make sure music is playing when sound is on (called on user gestures).
// If it's already playing, just freshen the tune — never restart the engine.
function ensureMusic(){
  if(!soundEnabled()) return;
  initAudio();
  // If we think music is on but the sequencer isn't actually running (e.g. it was
  // paused when the tab was hidden), treat it as stopped so startMusic can revive it.
  if(musicOn && !musicTimer) musicOn = false;
  if(musicOn){
    if(audioCtx && audioCtx.state === "suspended" && audioCtx.resume){ try{ audioCtx.resume(); }catch(e){} }
    switchTune();                        // already playing → change song, keep it running
  }else{
    startMusic();                        // startMusic handles resume-then-begin itself
  }
}
// Save battery / be polite: pause music when the tab is hidden.

/* ================= confetti effect ================= */
// A richer burst: more pieces, varied sizes, each falls at its own speed while
// gently swaying side-to-side and spinning (fall+sway are CSS keyframes).
function confetti(big){
  const imgs = ["glowing-star","star","heart","party","sparkles","confetti","trophy","blossom"];
  const n = big ? 30 : 18;
  for(let i=0;i<n;i++){
    const el = document.createElement("img");
    el.src = "images/"+pick(imgs)+".svg";
    el.className = "confetti";
    const fall = 1.2 + Math.random()*1.6;
    el.style.left = Math.random()*100 + "vw";
    el.style.top = (-40 - Math.random()*80) + "px";
    el.style.width = (18 + Math.random()*30) + "px";
    // fall duration + a separate sway speed so pieces drift independently
    el.style.animationDuration = fall + "s, " + (0.6 + Math.random()*0.9) + "s";
    el.style.animationDelay = (Math.random()*0.5) + "s, 0s";
    el.style.opacity = (0.75 + Math.random()*0.25).toFixed(2);
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), (fall+1.2)*1000);
  }
}

function buildTest(){
  // 24 classic questions from 10 topics (evenly split), 6 reading questions (1 passage), 5 scholar questions (2 marks)
  const pools = shuffle(TOPICS).map(t => shuffle(topicPool(t).filter(q=>!q.s)).map(q=>({...q, topicName:t.nameEn})));
  const classic = [];
  let i = 0, guard = 0;
  while(classic.length < 24 && guard++ < 2000){
    const pool = pools[i % pools.length]; i++;
    if(pool.length) classic.push(pool.pop());
  }
  const passage = pick(passagePool());
  const comp = passage.questions.map(q=>({...q, topicName:"Reading", passage}));
  const scholar = shuffle(TOPICS.flatMap(t=>topicPool(t).filter(q=>q.s).map(q=>({...q, topicName:t.nameEn})))).slice(0,5);
  const qs = [
    ...shuffle(classic).map(q=>({...q, marks:1})),
    ...comp.map(q=>({...q, marks:1})),
    ...scholar.map(q=>({...q, marks:2}))
  ].map(prepQuestion);
  return qs;
}
function startTest(){
  ensureMusic();
  T = { qs: buildTest(), mode: MODE, idx:0, answers:{}, secondsLeft: TEST_MINUTES*60, timer:null, startedAt: Date.now() };
  T.timer = setInterval(()=>{
    T.secondsLeft--;
    const el = document.getElementById("timer");
    if(el){
      el.textContent = fmtTime(T.secondsLeft);
      el.parentElement.classList.toggle("timer-low", T.secondsLeft < 300);
    }
    if(T.secondsLeft <= 0){ submitTest(true); }
  }, 1000);
  renderTestQ();
}
const fmtTime = s => { s=Math.max(0,s); return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0"); };
function renderTestQ(){
  const q = T.qs[T.idx];
  const answered = Object.keys(T.answers).length;
  const passageHtml = q.passage ? `<div class="passage"><b>${esc(q.passage.title)}</b>\n${esc(q.passage.text)}</div>` : "";
  const nums = T.qs.map((_,i)=>
    `<button class="${T.answers[i]!=null?'done':''} ${i===T.idx?'cur':''}" onclick="jumpTest(${i})">${i+1}</button>`).join("");
  $app.innerHTML = `
    <div class="topbar">
      <button class="btn btn-ghost btn-small" onclick="confirmQuitTest()">${IMG("back")} Exit</button>
      <span class="pill ${T.secondsLeft<300?'timer-low':''}">${IMG("timer")} <span id="timer">${fmtTime(T.secondsLeft)}</span></span>
      <span class="pill">${answered}/${T.qs.length}</span>
    </div>
    ${trackHtml(answered, T.qs.length, runnerEmoji(), {})}
    <div class="statrow">
      <div class="progressbar"><div style="width:${answered/T.qs.length*100}%"></div></div>
    </div>
    <div class="card">
      <p class="muted" style="margin:0 0 4px">${modeBadge(T.mode)} Question ${T.idx+1} / ${T.qs.length} - ${esc(q.topicName)} ${q.marks===2?'<span class="mark2">Scholar - 2 marks</span>':''}</p>
      ${passageHtml}
      ${q.img && !q.passage ? IMG(q.img,"qimg") : ""}
      <div class="qtext">${esc(q.q)}</div>
      ${renderOptions(q,"answerTest")}
    </div>
    <div class="navrow">
      <button class="btn btn-ghost" ${T.idx===0?"disabled style='opacity:.4'":""} onclick="navTest(-1)">Previous</button>
      <button class="btn btn-purple" ${T.idx===T.qs.length-1?"disabled style='opacity:.4'":""} onclick="navTest(1)">Next</button>
    </div>
    <div class="card" style="margin-top:16px">
      <p class="muted" style="margin:0 0 6px">Tap a number to jump to a question:</p>
      <div class="testnums">${nums}</div>
      <div class="navrow"><button class="btn btn-pink" onclick="confirmSubmit()">Submit ${IMG("check")}</button></div>
    </div>`;
  const picked = T.answers[T.idx];
  if(picked != null){
    document.querySelectorAll(".opt").forEach(b=>{ if(+b.dataset.pos === picked) b.classList.add("picked"); });
  }
  window.scrollTo(0,0);
}
function answerTest(pos){
  T.answers[T.idx] = pos;
  if(T.idx < T.qs.length-1){ T.idx++; }
  renderTestQ();
}
function navTest(d){ if(d>0) sfxNext(); else sfxTap(); T.idx = Math.min(T.qs.length-1, Math.max(0, T.idx+d)); renderTestQ(); }
function jumpTest(i){ T.idx = i; renderTestQ(); }
async function confirmQuitTest(){
  const ok = await uiConfirm("Exiting will lose this attempt. Are you sure?", {
    title: "Leave test?",
    icon: "🚪",
    tone: "danger",
    confirmLabel: "Leave",
    cancelLabel: "Stay",
    confirmClass: "btn-pink",
  });
  if(ok){ clearInterval(T.timer); T=null; goHome(); }
}
async function confirmSubmit(){
  const left = T.qs.length - Object.keys(T.answers).length;
  const msg = left>0 ? `You still have ${left} unanswered question(s). Submit anyway?` : "Submit and see your score?";
  const ok = await uiConfirm(msg, {
    title: left>0 ? "Submit incomplete?" : "Submit test?",
    icon: left>0 ? "📝" : "🏁",
    confirmLabel: "Submit",
    cancelLabel: "Back",
    confirmClass: "btn-green",
  });
  if(ok) submitTest(false);
}
function submitTest(timeout){
  clearInterval(T.timer);
  let score=0, correct=0, totalMarks=0;
  const review = T.qs.map((q,i)=>{
    totalMarks += q.marks;
    const picked = T.answers[i];
    const ok = picked === q.correctPos;
    if(ok){ correct++; score += q.marks; }
    return { q, picked, ok };
  });
  const timeUsed = Math.min(TEST_MINUTES*60, Math.round((Date.now()-T.startedAt)/1000));
  store.tests.push({ date: new Date().toISOString(), mode: T.mode, score, totalMarks, correct, total: T.qs.length, timeUsed });
  // Reward: 1 star per correct answer (kept), plus gold + item drops for a good test.
  const pct = totalMarks ? score/totalMarks : 0;
  let goldWon = correct;                              // 1 gold per correct in a test
  if(pct >= 0.6) goldWon += 5;                        // pass bonus
  if(pct >= 0.85) goldWon += 10;                      // top-score bonus
  const itemsWon = [];
  const drops = 1 + (pct>=0.6?1:0) + (pct>=0.85?1:0); // 1–3 item drops by performance
  for(let d=0; d<drops; d++){ itemsWon.push(collectItem().e); }
  addStars(correct); addGold(goldWon);
  saveStore(store);
  renderTestResult({score,totalMarks,correct,total:T.qs.length,timeUsed,review,timeout,mode:T.mode,goldWon,itemsWon});
  T = null;
}
function renderTestResult(r){
  const pct = r.score / r.totalMarks;
  sfxFanfare(pct >= 0.6);
  if(pct >= 0.85){ confetti(true); setTimeout(()=>confetti(true), 550); }   // double burst for a top score
  else if(pct >= 0.6){ confetti(); }
  const msg = pct>=0.85 ? "Excellent! You're a superstar!" : pct>=0.6 ? "Great job! Keep it up!" : "Keep practicing and you'll score higher next time!";
  const reviewHtml = r.review.map((it,i)=>{
    const yourAns = it.picked==null ? "(not answered)" : it.q.o[it.q.order[it.picked]];
    return `<div class="review-item ${it.ok?'ok':''}">
      <div class="rq">Question ${i+1}: ${esc(it.q.q)}</div>
      ${it.ok ? `<div>You chose correctly: <b>${esc(it.q.o[it.q.a])}</b></div>`
              : `<div>You chose: <b>${esc(yourAns)}</b> - Correct answer: <b>${esc(it.q.o[it.q.a])}</b></div>`}
    </div>`;
  }).join("");
  $app.innerHTML = `
    <div class="card center">
      ${IMG(pct>=0.6?"trophy":"muscle","icon-xl")}
      ${r.timeout?'<p class="muted">Time is up! Your test was submitted automatically.</p>':''}
      <div class="score-big">${r.score}/${r.totalMarks} marks</div>
      <p style="font-weight:600">${msg}</p>
      <div class="coinrow" style="justify-content:center">
        <span class="coin star">${IMG("glowing-star")} +${r.correct} stars</span>
        ${r.goldWon?`<span class="coin gold">${goldSVG()} +${r.goldWon} gold</span>`:""}
      </div>
      ${(r.itemsWon&&r.itemsWon.length)?`<div class="rewardpop" style="justify-content:center">${r.itemsWon.map(e=>`<span>${e}</span>`).join("")}</div><p class="muted">Added to your bag!</p>`:""}
      <p class="muted">${modeBadge(r.mode)} &middot; ${r.correct}/${r.total} correct - Time: ${fmtTime(r.timeUsed)}</p>
      <div class="navrow">
        <button class="btn btn-purple" onclick="goTestIntro()">Try another test</button>
        <button class="btn btn-yellow" onclick="goHome()">${IMG("house")} Home</button>
      </div>
    </div>
    <div class="card">
      <h3 style="margin-top:0">${IMG("open-book")} Review your answers</h3>
      ${reviewHtml}
    </div>`;
  window.scrollTo(0,0);
}

/* ================= history / progress ================= */
function goHistory(){
  const rows = store.tests.slice().reverse().map(t=>{
    const d = new Date(t.date);
    const ds = d.toLocaleDateString("en-US") + " " + d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
    const mb = MODES[t.mode] ? modeBadge(t.mode) : modeBadge("chill");
    return `<tr><td>${ds}</td><td>${mb}</td><td><b>${t.score}/${t.totalMarks}</b></td><td>${t.correct}/${t.total}</td><td>${fmtTime(t.timeUsed)}</td></tr>`;
  }).join("");
  const pracRows = TOPICS.concat([{id:"comprehension",nameEn:"Reading",nameVi:"Reading Comprehension"}]).flatMap(t=>
    [["chill", t.id], ["master", t.id+"#master"], ["elite", t.id+"#elite"]].map(([m, key])=>{
      const p = store.practice[key];
      if(!p || !p.done) return "";
      const pct = Math.round(p.correct/p.done*100);
      return `<tr><td>${esc(t.nameEn)}</td><td>${modeBadge(m)}</td><td>${p.correct}/${p.done}</td><td><b>${pct}%</b></td></tr>`;
    })
  ).join("");
  const bagKeys = Object.keys(store.bag||{}).filter(k=>store.bag[k]>0);
  const bagHtml = bagKeys.length
    ? `<div class="bag-grid">${bagKeys.map(e=>{
         const item = ITEMS.find(it=>it.e===e) || {e, n:""};
         return `<div class="bag-item"><div class="be">${e}</div><div class="bn">${esc(item.n)}</div><div class="bc">×${store.bag[e]}</div></div>`;
       }).join("")}</div>`
    : `<p class="bag-empty">Your bag is empty. Answer questions correctly to collect items! 🦔</p>`;
  $app.innerHTML = `
    <div class="topbar"><button class="btn btn-ghost btn-small" onclick="goHome()">${IMG("back")} Home</button>
      <div class="coinrow">
        <span class="coin star">${IMG("glowing-star")} ${store.stars}</span>
        <span class="coin gold">${goldSVG()} ${store.gold}</span>
      </div></div>
    <h1>${IMG("chart")} My progress</h1>
    <div class="card">
      <h3 style="margin-top:0">🎒 My bag</h3>
      <p class="muted" style="margin:0 0 4px">Items your hedgehog collected. Spend gold in a shop coming soon!</p>
      ${bagHtml}
    </div>
    <div class="card">
      <h3 style="margin-top:0">${IMG("timer")} Test attempts</h3>
      ${rows ? `<table><tr><th>Date</th><th>Mode</th><th>Score</th><th>Correct</th><th>Time</th></tr>${rows}</table>`
             : `<p class="muted">No tests yet. Tap "Take a test" to begin!</p>`}
    </div>
    <div class="card">
      <h3 style="margin-top:0">${IMG("target")} Practice by topic</h3>
      ${pracRows ? `<table><tr><th>Topic</th><th>Mode</th><th>Correct/Total</th><th>Rate</th></tr>${pracRows}</table>`
                 : `<p class="muted">No topics practiced yet.</p>`}
    </div>
    <div class="card center">
      <button class="btn btn-ghost" onclick="resetProgress()">${IMG("reset")} Clear all progress</button>
    </div>`;
  window.scrollTo(0,0);
}
async function resetProgress(){
  const ok = await uiConfirm("Clear all scores, stars and test history? This cannot be undone!", {
    title: "Reset progress?",
    icon: "⚠️",
    tone: "danger",
    confirmLabel: "Clear all",
    cancelLabel: "Cancel",
    confirmClass: "btn-pink",
  });
  if(ok){
    // Keep gift claims (launch / daily / weekly) so gold can't be farmed by reset.
    const gifts = store.gifts || {};
    store = { practice:{}, tests:[], stars:0, gold:0, bag:{}, shop:{}, equip:{skin:"classic",decor:null}, boosters:{}, soundOn: store.soundOn, gifts };
    saveStore(store);
    goHistory();
  }
}

/* ================= sound on/off button ================= */
let soundBtn = null;
let soundDockEl = null;
function refreshSoundBtn(){
  if(!soundBtn) return;
  const on = soundEnabled();
  soundBtn.className = "sound-toggle" + (on ? "" : " off") + (soundDockEl ? " sound-in-bar" : "");
  soundBtn.setAttribute("aria-label", on ? "Sound on — tap to mute" : "Sound off — tap to turn on");
  soundBtn.title = soundBtn.getAttribute("aria-label");
  soundBtn.textContent = on ? "🔊" : "🔇";
}
function dockSoundInBar(bar){
  if(!soundBtn || !bar) return;
  soundDockEl = bar;
  bar.appendChild(soundBtn);
  refreshSoundBtn();
}
function undockSoundBtn(){
  if(!soundBtn) return;
  soundDockEl = null;
  document.body.appendChild(soundBtn);
  refreshSoundBtn();
}
function toggleSound(){
  store.soundOn = !store.soundOn;
  saveStore(store);
  refreshSoundBtn();
  if(store.soundOn){ initAudio(); ensureMusic(); sfxTap(); }
  else { stopMusic(); }
}
function mountSoundBtn(){
  if(typeof document === "undefined" || soundBtn) return;
  soundBtn = document.createElement("button");
  soundBtn.type = "button";
  soundBtn.addEventListener("click", toggleSound);
  document.body.appendChild(soundBtn);
  refreshSoundBtn();
}

/* ================= startup ================= */
// Browsers block audio until the user interacts with the page. Kick the music on
// the very first click/tap/keypress anywhere, so the user doesn't have to hunt
// for a specific button. Runs once, then removes itself.
if(typeof document !== "undefined"){
  const kickMusic = ()=>{
    if(soundEnabled()){ initAudio(); ensureMusic(); }
    ["pointerdown","keydown","touchstart"].forEach(ev=>
      document.removeEventListener(ev, kickMusic, true));
  };
  ["pointerdown","keydown","touchstart"].forEach(ev=>
    document.addEventListener(ev, kickMusic, true));
}
mountSoundBtn();
goHome();                                  // render immediately from localStorage seed
// Upgrade to the SQLite-backed store as soon as sql.js is ready, then re-render
// so any data restored from IndexedDB (stars, gold, bag, history) shows up.
initDB().then(()=>{ if(dbReady) goHome(); });
</script>
